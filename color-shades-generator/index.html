<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Shades Generator</title>
<style>
  :root { --accent:#38bdf8; }
  * { box-sizing:border-box; }
  body {
    margin:0; min-height:100vh; padding:32px;
    background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    color:#e2e8f0; font-family:system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  a { color:var(--accent); text-decoration:none; } a:hover{ text-decoration:underline; }
  h1 { font-size:1.5rem; margin:8px 0 24px; }
  h2 { font-size:1rem; color:#94a3b8; margin:24px 0 12px; }
  .wrap { max-width:920px; margin:0 auto; }
  .panel { background:#111827; border:1px solid #1f2937; border-radius:16px; padding:24px; margin-bottom:20px; }
  label { font-size:.85rem; color:#94a3b8; margin-right:8px; }
  input[type=color] { width:56px; height:40px; border:none; border-radius:8px; background:none; cursor:pointer; vertical-align:middle; }
  input[type=text] { background:#0b1120; border:1px solid #1f2937; color:#e2e8f0; border-radius:8px; padding:9px; font-family:monospace; width:120px; }
  input[type=range] { vertical-align:middle; accent-color:var(--accent); }
  .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(90px,1fr)); gap:8px; }
  .sw { border-radius:10px; padding:10px 6px; cursor:pointer; text-align:center; font-family:monospace; font-size:.75rem; border:1px solid #1f2937; height:80px; display:flex; align-items:flex-end; justify-content:center; transition:transform .1s; }
  .sw:hover { transform:scale(1.05); }
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#052e16; color:#4ade80; border:1px solid #166534; padding:10px 18px; border-radius:10px; opacity:0; transition:opacity .2s; }
  .toast.show { opacity:1; }
</style>
</head>
<body>
<div class="wrap">
  <a href="../">&larr; back</a>
  <h1>Color Shades Generator</h1>
  <div class="panel">
    <label>Base color</label>
    <input type="color" id="pick" value="#38bdf8">
    <input type="text" id="hex" value="#38bdf8">
    <label style="margin-left:16px;">Steps</label>
    <input type="range" id="steps" min="5" max="15" step="2" value="11">
    <span id="stepsVal">11</span>
    <h2>Tints (toward white)</h2>
    <div class="grid" id="tints"></div>
    <h2>Shades (toward black)</h2>
    <div class="grid" id="shades"></div>
    <h2>Tonal scale (light &rarr; dark)</h2>
    <div class="grid" id="scale"></div>
  </div>
</div>
<div class="toast" id="toast">Copied!</div>
<script>
function hexToRgb(h){ h=h.replace('#',''); if(h.length===3)h=h.split('').map(c=>c+c).join(''); const n=parseInt(h,16); return [(n>>16)&255,(n>>8)&255,n&255]; }
function rgbToHex(r){ return '#'+r.map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join(''); }
function mix(a,b,t){ return [a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t]; }
function lum(rgb){ return 0.299*rgb[0]+0.587*rgb[1]+0.114*rgb[2]; }
const pick=document.getElementById('pick'), hex=document.getElementById('hex');
const steps=document.getElementById('steps'), stepsVal=document.getElementById('stepsVal');
const toast=document.getElementById('toast');
function swatch(hexv){
  const rgb=hexToRgb(hexv);
  const d=document.createElement('div'); d.className='sw';
  d.style.background=hexv; d.style.color=lum(rgb)>140?'#000':'#fff';
  d.textContent=hexv;
  d.onclick=()=>{ navigator.clipboard.writeText(hexv); toast.textContent='Copied '+hexv; toast.classList.add('show'); setTimeout(()=>toast.classList.remove('show'),1000); };
  return d;
}
function render(){
  const n=parseInt(steps.value); stepsVal.textContent=n;
  let base; try{ base=hexToRgb(hex.value); }catch(e){ return; }
  if(hex.value.replace('#','').length<3) return;
  const white=[255,255,255], black=[0,0,0];
  const tints=document.getElementById('tints'), shades=document.getElementById('shades'), scale=document.getElementById('scale');
  tints.innerHTML=shades.innerHTML=scale.innerHTML='';
  for(let i=0;i<n;i++){ tints.appendChild(swatch(rgbToHex(mix(base,white,i/(n-1)*0.92)))); }
  for(let i=0;i<n;i++){ shades.appendChild(swatch(rgbToHex(mix(base,black,i/(n-1)*0.92)))); }
  // full tonal scale white->base->black
  const half=Math.floor(n/2);
  for(let i=0;i<n;i++){
    let c;
    if(i<half) c=mix(white,base,i/half);
    else c=mix(base,black,(i-half)/(n-1-half));
    scale.appendChild(swatch(rgbToHex(c)));
  }
}
pick.addEventListener('input',()=>{ hex.value=pick.value; render(); });
hex.addEventListener('input',()=>{ const h=hex.value; if(/^#?[0-9a-fA-F]{6}$/.test(h)) pick.value=h[0]==='#'?h:'#'+h; render(); });
steps.addEventListener('input',render);
render();
</script>
</body>
</html>
