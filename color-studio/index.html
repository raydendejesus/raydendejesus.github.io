<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Studio</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#e2e8f0;
    background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px;}
  a.back{position:fixed;top:14px;left:16px;color:#38bdf8;text-decoration:none;font-size:14px;}
  a.back:hover{text-decoration:underline;}
  h1{margin:8px 0 14px;font-size:22px;}
  .panel{background:#111827;border:1px solid #1f2937;border-radius:16px;padding:20px;width:420px;max-width:95vw;}
  .preview{height:120px;border-radius:12px;margin-bottom:16px;display:flex;align-items:flex-end;padding:10px;font-size:13px;}
  label{display:block;font-size:12px;color:#94a3b8;margin:10px 0 4px;}
  .row{display:flex;align-items:center;gap:10px;}
  input[type=range]{flex:1;}
  .val{width:42px;text-align:right;font-variant-numeric:tabular-nums;font-size:13px;}
  .codes{margin-top:16px;display:flex;flex-direction:column;gap:8px;}
  .code{display:flex;justify-content:space-between;align-items:center;background:#0b1120;border:1px solid #1f2937;border-radius:8px;padding:8px 12px;font-family:monospace;font-size:14px;cursor:pointer;}
  .code:hover{border-color:#38bdf8;}
  .code small{color:#64748b;font-family:system-ui;}
  .harmony{margin-top:18px;}
  .swatches{display:flex;gap:6px;margin-top:8px;}
  .sw{flex:1;height:46px;border-radius:8px;cursor:pointer;border:1px solid #1f2937;}
  .picker{margin-top:16px;}
  input[type=color]{width:100%;height:44px;border:none;border-radius:10px;background:none;cursor:pointer;}
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#38bdf8;color:#04222f;padding:8px 16px;border-radius:8px;font-weight:700;opacity:0;transition:opacity .2s;pointer-events:none;}
</style>
</head>
<body>
<a class="back" href="../">← back</a>
<h1>Color Studio</h1>
<div class="panel">
  <div class="preview" id="preview">click any code to copy</div>
  <label>Hue <span class="val" id="hv">0</span></label>
  <div class="row"><input type="range" id="h" min="0" max="360" value="200"></div>
  <label>Saturation <span class="val" id="sv">0</span></label>
  <div class="row"><input type="range" id="s" min="0" max="100" value="85"></div>
  <label>Lightness <span class="val" id="lv">0</span></label>
  <div class="row"><input type="range" id="l" min="0" max="100" value="55"></div>
  <div class="picker"><input type="color" id="cp" value="#38bdf8"></div>
  <div class="codes">
    <div class="code" id="cHex"><span></span><small>HEX</small></div>
    <div class="code" id="cRgb"><span></span><small>RGB</small></div>
    <div class="code" id="cHsl"><span></span><small>HSL</small></div>
  </div>
  <div class="harmony">
    <label>Complementary / triadic harmony (click to load)</label>
    <div class="swatches" id="harm"></div>
  </div>
</div>
<div id="toast">copied!</div>
<script>
const H=document.getElementById('h'),S=document.getElementById('s'),L=document.getElementById('l');
const toast=document.getElementById('toast');
function hsl2rgb(h,s,l){s/=100;l/=100;const k=n=>(n+h/30)%12;const a=s*Math.min(l,1-l);
  const f=n=>l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1)));
  return [Math.round(f(0)*255),Math.round(f(8)*255),Math.round(f(4)*255)];}
function rgb2hex(r,g,b){return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');}
function hex2hsl(hex){let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b);let h=0,s=0,l=(mx+mn)/2;
  if(mx!==mn){const d=mx-mn;s=l>.5?d/(2-mx-mn):d/(mx+mn);
    if(mx===r)h=(g-b)/d+(g<b?6:0);else if(mx===g)h=(b-r)/d+2;else h=(r-g)/d+4;h*=60;}
  return [Math.round(h),Math.round(s*100),Math.round(l*100)];}
function render(){
  const h=+H.value,s=+S.value,l=+L.value;
  document.getElementById('hv').textContent=h;
  document.getElementById('sv').textContent=s+'%';
  document.getElementById('lv').textContent=l+'%';
  const [r,g,b]=hsl2rgb(h,s,l);const hex=rgb2hex(r,g,b);
  document.getElementById('preview').style.background=hex;
  document.getElementById('preview').style.color=l>55?'#0b1120':'#e2e8f0';
  document.getElementById('cp').value=hex;
  setCode('cHex',hex.toUpperCase());
  setCode('cRgb',`rgb(${r}, ${g}, ${b})`);
  setCode('cHsl',`hsl(${h}, ${s}%, ${l}%)`);
  const harm=document.getElementById('harm');harm.innerHTML='';
  [0,30,150,180,210,330].forEach(off=>{
    const hh=(h+off)%360;const hx=rgb2hex(...hsl2rgb(hh,s,l));
    const d=document.createElement('div');d.className='sw';d.style.background=hx;d.title=hx;
    d.onclick=()=>{H.value=hh;render();};harm.appendChild(d);});
}
function setCode(id,text){const el=document.getElementById(id);el.querySelector('span').textContent=text;
  el.onclick=()=>{navigator.clipboard&&navigator.clipboard.writeText(text);showToast();};}
function showToast(){toast.style.opacity=1;setTimeout(()=>toast.style.opacity=0,900);}
[H,S,L].forEach(e=>e.oninput=render);
document.getElementById('cp').oninput=e=>{const [h,s,l]=hex2hsl(e.target.value);H.value=h;S.value=s;L.value=l;render();};
render();
</script>
</body>
</html>
