<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bytes Size Converter</title>
<style>
  :root { --accent:#38bdf8; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120); color:#e2e8f0; font-family:system-ui,-apple-system,"Segoe UI",sans-serif; padding:24px; }
  a { color:var(--accent); text-decoration:none; }
  .wrap { max-width:760px; margin:0 auto; }
  h1,h2 { font-weight:600; }
  h2 { font-size:16px; margin:0 0 10px; color:#94a3b8; }
  .panel { background:#111827; border:1px solid #1f2937; border-radius:14px; padding:18px; margin-top:16px; }
  .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  input { padding:11px 13px; border-radius:10px; border:1px solid #1f2937; background:#0b1120; color:#e2e8f0; font-size:16px; flex:1; min-width:160px; font-family:ui-monospace,monospace; }
  select { padding:11px 13px; border-radius:10px; border:1px solid #1f2937; background:#0b1120; color:#e2e8f0; font-size:16px; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
  @media(max-width:600px){.grid{grid-template-columns:1fr;}}
  table { width:100%; border-collapse:collapse; }
  td { padding:7px 8px; border-bottom:1px solid #1f2937; font-size:14px; }
  td.u { color:#94a3b8; }
  td.v { font-family:ui-monospace,monospace; color:var(--accent); text-align:right; }
</style>
</head>
<body>
<div class="wrap">
  <a href="../">← back</a>
  <h1>Bytes Size Converter</h1>
  <div class="panel">
    <div class="row">
      <input id="val" type="number" value="1024" step="any">
      <select id="unit"></select>
    </div>
    <div class="grid" style="margin-top:18px">
      <div>
        <h2>Decimal (SI, 1000)</h2>
        <table id="dec"></table>
      </div>
      <div>
        <h2>Binary (IEC, 1024)</h2>
        <table id="bin"></table>
      </div>
    </div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const DEC=[["B",1],["KB",1e3],["MB",1e6],["GB",1e9],["TB",1e12],["PB",1e15]];
const BIN=[["B",1],["KiB",1024],["MiB",1024**2],["GiB",1024**3],["TiB",1024**4],["PiB",1024**5]];
// build unit selector from both
const unitSel=$('unit');
[...DEC,...BIN.slice(1)].forEach(([name,factor])=>{
  const o=document.createElement('option');o.value=factor;o.textContent=name;unitSel.appendChild(o);
});
unitSel.value=1000;
function fmt(n){
  if(n===0)return '0';
  if(n<0.000001||n>=1e15)return n.toExponential(4);
  return (+n.toFixed(6)).toLocaleString('en-US',{maximumFractionDigits:6});
}
function fillTable(el,units,bytes){
  el.innerHTML='';
  for(const [name,factor] of units){
    const tr=document.createElement('tr');
    tr.innerHTML=`<td class="u">${name}</td><td class="v">${fmt(bytes/factor)}</td>`;
    el.appendChild(tr);
  }
}
function calc(){
  const v=parseFloat($('val').value)||0;
  const bytes=v*parseFloat(unitSel.value);
  fillTable($('dec'),DEC,bytes);
  fillTable($('bin'),BIN,bytes);
}
$('val').addEventListener('input',calc);
unitSel.addEventListener('change',calc);
calc();
</script>
</body>
</html>
