<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON to TypeScript</title>
<style>
  :root{--accent:#38bdf8;}
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
    color:#e2e8f0;background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    display:flex;flex-direction:column;align-items:center;padding:24px;}
  a.back{position:fixed;top:16px;left:16px;color:var(--accent);text-decoration:none;font-size:14px;}
  a.back:hover{text-decoration:underline;}
  h1{font-size:24px;margin:30px 0 6px;}
  .sub{color:#94a3b8;font-size:13px;margin:0 0 16px;}
  .opts{display:flex;gap:16px;flex-wrap:wrap;align-items:center;justify-content:center;margin-bottom:12px;font-size:13px;color:#94a3b8;}
  .opts input[type=text]{width:130px;background:#0b1120;border:1px solid #1f2937;color:#e2e8f0;border-radius:8px;padding:6px 8px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:min(96vw,980px);}
  @media(max-width:740px){.grid{grid-template-columns:1fr;}}
  .col{display:flex;flex-direction:column;}
  .colhead{font-size:13px;color:#94a3b8;margin-bottom:6px;}
  textarea,pre{height:50vh;min-height:300px;border-radius:12px;border:1px solid #1f2937;
    background:#0b1120;color:#e2e8f0;padding:14px;font-size:13px;outline:none;
    font-family:ui-monospace,"Cascadia Code",Consolas,monospace;line-height:1.5;}
  textarea{resize:vertical;width:100%;}
  pre{margin:0;overflow:auto;white-space:pre;tab-size:2;}
  textarea:focus{border-color:var(--accent);}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0;justify-content:center;}
  button{background:var(--accent);color:#082f49;border:none;border-radius:10px;padding:10px 16px;font-weight:600;font-size:14px;cursor:pointer;}
  button.ghost{background:#1f2937;color:#e2e8f0;}
  button:hover{filter:brightness(1.1);}
  .status{min-height:22px;font-size:14px;font-weight:600;text-align:center;margin-bottom:6px;}
  .ok{color:#4ade80;}.err{color:#f87171;}
</style>
</head>
<body>
<a class="back" href="../">← back</a>
<h1>JSON to TypeScript</h1>
<p class="sub">Generate TypeScript interfaces from a JSON sample.</p>
<div class="opts">
  <label>Root name <input id="root" type="text" value="Root"></label>
</div>
<div class="toolbar">
  <button id="convert">Generate</button>
  <button id="copy" class="ghost">Copy</button>
  <button id="clear" class="ghost">Clear</button>
</div>
<div class="status" id="status">Ready</div>
<div class="grid">
  <div class="col"><div class="colhead">JSON input</div>
    <textarea id="input" spellcheck="false" placeholder='{"id":1,"name":"Alice","tags":["a"],"meta":{"active":true}}'></textarea></div>
  <div class="col"><div class="colhead">TypeScript output</div><pre id="output"></pre></div>
</div>
<script>
const $=id=>document.getElementById(id);
function setStatus(m,cls){const s=$('status');s.textContent=m;s.className='status '+(cls||'');}
function pascal(s){ s=String(s).replace(/[^A-Za-z0-9]+/g,' ').trim(); if(!s) return 'X'; return s.split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join('').replace(/^[0-9]/,'_$&'); }
function validKey(k){ return /^[A-Za-z_$][A-Za-z0-9_$]*$/.test(k); }
function merge(a,b){ // merge two object shapes
  const keys=new Set([...Object.keys(a),...Object.keys(b)]); const o={};
  keys.forEach(k=>{ if(k in a && k in b) o[k]=combine(a[k],b[k]); else o[k]={optional:true,type:(a[k]||b[k]).type,obj:(a[k]||b[k]).obj}; });
  return o;
}
function combine(x,y){ // value descriptors
  if(x.type===y.type){ if(x.type==='object') return {type:'object',obj:merge(x.obj,y.obj),optional:x.optional||y.optional}; return {type:x.type,elem:x.elem||y.elem,optional:x.optional||y.optional}; }
  return {type:'any',optional:x.optional||y.optional};
}
function describe(v){
  if(v===null) return {type:'null'};
  if(Array.isArray(v)){
    if(v.length===0) return {type:'array',elem:{type:'any'}};
    let acc=describe(v[0]);
    for(let i=1;i<v.length;i++){ acc=combine(acc,describe(v[i])); }
    return {type:'array',elem:acc};
  }
  if(typeof v==='object'){ const o={}; Object.keys(v).forEach(k=>{o[k]=describe(v[k]);}); return {type:'object',obj:o}; }
  if(typeof v==='number') return {type:'number'};
  if(typeof v==='boolean') return {type:'boolean'};
  if(typeof v==='string') return {type:'string'};
  return {type:'any'};
}
function gen(rootName, desc){
  const interfaces=[]; const made=new Map();
  function tsType(d, nameHint){
    switch(d.type){
      case 'object':{ const nm=uniqueName(pascal(nameHint)); emit(nm,d.obj); return nm; }
      case 'array':{ const inner=tsType(d.elem, singular(nameHint)); return inner+'[]'; }
      case 'null': return 'null';
      case 'any': return 'any';
      default: return d.type;
    }
  }
  function uniqueName(nm){ let n=nm,i=2; while(made.has(n)){ n=nm+i; i++; } made.set(n,true); return n; }
  function emit(name, obj){
    let body='export interface '+name+' {\n';
    Object.keys(obj).forEach(k=>{
      const d=obj[k];
      const t=tsType(d, k);
      const key=validKey(k)?k:JSON.stringify(k);
      body+='  '+key+(d.optional?'?':'')+': '+t+';\n';
    });
    body+='}';
    interfaces.push(body);
  }
  function singular(s){ return s&&s.endsWith('s')?s.slice(0,-1):s; }
  if(desc.type==='object'){ tsType(desc, rootName); }
  else if(desc.type==='array'){ const t=tsType(desc, rootName); interfaces.push('export type '+pascal(rootName)+' = '+t+';'); }
  else { interfaces.push('export type '+pascal(rootName)+' = '+tsType(desc,rootName)+';'); }
  return interfaces.reverse().join('\n\n');
}
function convert(){
  const text=$('input').value;
  if(!text.trim()){setStatus('Nothing to convert','err');$('output').textContent='';return;}
  try{
    const data=JSON.parse(text);
    const desc=describe(data);
    const out=gen($('root').value.trim()||'Root', desc);
    $('output').textContent=out;
    setStatus('Generated','ok');
  }catch(e){ setStatus('Error: '+e.message,'err'); $('output').textContent=''; }
}
$('convert').onclick=convert;
$('clear').onclick=()=>{$('input').value='';$('output').textContent='';setStatus('Cleared');};
$('copy').onclick=async()=>{const t=$('output').textContent;if(!t){setStatus('Nothing to copy','err');return;}try{await navigator.clipboard.writeText(t);setStatus('Copied!','ok');}catch(e){setStatus('Copy failed','err');}};
$('input').addEventListener('input',()=>{if($('input').value.trim())convert();});
</script>
</body>
</html>
