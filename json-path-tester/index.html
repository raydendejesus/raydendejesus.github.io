<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Path Tester</title>
<style>
  :root{--accent:#38bdf8;}
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
    color:#e2e8f0;background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    display:flex;flex-direction:column;align-items:center;padding:24px;}
  a.back{position:fixed;top:16px;left:16px;color:var(--accent);text-decoration:none;font-size:14px;}
  a.back:hover{text-decoration:underline;}
  h1{font-size:24px;margin:30px 0 6px;}
  .sub{color:#94a3b8;font-size:13px;margin:0 0 16px;}
  .wrap{width:min(96vw,980px);display:flex;flex-direction:column;gap:14px;}
  .pathrow{display:flex;gap:8px;align-items:center;}
  #path{flex:1;background:#0b1120;border:1px solid #1f2937;color:#e2e8f0;border-radius:10px;padding:12px;font-size:14px;
    font-family:ui-monospace,"Cascadia Code",Consolas,monospace;outline:none;}
  #path:focus{border-color:var(--accent);}
  .colhead{font-size:13px;color:#94a3b8;margin-bottom:6px;}
  textarea,pre{border-radius:12px;border:1px solid #1f2937;background:#0b1120;color:#e2e8f0;padding:14px;font-size:13px;outline:none;
    font-family:ui-monospace,"Cascadia Code",Consolas,monospace;line-height:1.5;}
  textarea{height:40vh;min-height:240px;resize:vertical;width:100%;}
  textarea:focus{border-color:var(--accent);}
  pre{margin:0;overflow:auto;white-space:pre-wrap;word-break:break-word;min-height:80px;}
  button{background:var(--accent);color:#082f49;border:none;border-radius:10px;padding:12px 16px;font-weight:600;font-size:14px;cursor:pointer;}
  button.ghost{background:#1f2937;color:#e2e8f0;}
  button:hover{filter:brightness(1.1);}
  .status{min-height:22px;font-size:14px;font-weight:600;margin:4px 0;}
  .ok{color:#4ade80;}.err{color:#f87171;}
  .hint{color:#64748b;font-size:12px;}
</style>
</head>
<body>
<a class="back" href="../">← back</a>
<h1>JSON Path Tester</h1>
<p class="sub">Resolve a dot/bracket path against your JSON, live.</p>
<div class="wrap">
  <div>
    <div class="colhead">JSON</div>
    <textarea id="input" spellcheck="false" placeholder='{"user":{"name":"Alice","roles":["admin","editor"]}}'></textarea>
  </div>
  <div>
    <div class="colhead">Path <span class="hint">e.g. user.roles[0] or ["user"]["name"] or $.user.name</span></div>
    <div class="pathrow">
      <input id="path" spellcheck="false" placeholder="user.roles[0]">
      <button id="copy" class="ghost">Copy result</button>
    </div>
  </div>
  <div class="status" id="status">Ready</div>
  <div>
    <div class="colhead">Resolved value</div>
    <pre id="output"></pre>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
function setStatus(m,cls){const s=$('status');s.textContent=m;s.className='status '+(cls||'');}
function parsePath(path){
  let p=path.trim();
  if(p.startsWith('$')) p=p.slice(1);
  const tokens=[]; let i=0;
  while(i<p.length){
    const c=p[i];
    if(c==='.'){ i++; continue; }
    if(c==='['){
      const end=p.indexOf(']',i);
      if(end<0) throw new Error('Unclosed [');
      let key=p.slice(i+1,end).trim();
      if((key[0]==='"'&&key.endsWith('"'))||(key[0]==="'"&&key.endsWith("'"))) key=key.slice(1,-1);
      else if(/^-?\d+$/.test(key)) key=Number(key);
      else throw new Error('Invalid bracket key: '+key);
      tokens.push(key); i=end+1; continue;
    }
    // bare identifier until . or [
    let j=i; while(j<p.length&&p[j]!=='.'&&p[j]!=='[') j++;
    const seg=p.slice(i,j).trim();
    if(seg) tokens.push(seg);
    i=j;
  }
  return tokens;
}
function resolve(){
  const raw=$('input').value;
  if(!raw.trim()){ setStatus('Paste JSON to begin',''); $('output').textContent=''; return; }
  let data;
  try{ data=JSON.parse(raw); }catch(e){ setStatus('JSON error: '+e.message,'err'); $('output').textContent=''; return; }
  const pstr=$('path').value;
  if(!pstr.trim()){ setStatus('Showing root',''); $('output').textContent=JSON.stringify(data,null,2); return; }
  let tokens;
  try{ tokens=parsePath(pstr); }catch(e){ setStatus('Path error: '+e.message,'err'); $('output').textContent=''; return; }
  let cur=data; const trail=[];
  for(const t of tokens){
    trail.push(t);
    if(cur==null||(typeof cur!=='object')){ setStatus('No value at '+trail.join(' > '),'err'); $('output').textContent='undefined'; return; }
    cur=cur[t];
    if(cur===undefined){ setStatus('Key not found: '+t,'err'); $('output').textContent='undefined'; return; }
  }
  setStatus('Resolved ('+typeofLabel(cur)+')','ok');
  $('output').textContent=cur===undefined?'undefined':JSON.stringify(cur,null,2);
}
function typeofLabel(v){ if(v===null) return 'null'; if(Array.isArray(v)) return 'array'; return typeof v; }
$('input').addEventListener('input',resolve);
$('path').addEventListener('input',resolve);
$('copy').onclick=async()=>{const t=$('output').textContent;if(!t){setStatus('Nothing to copy','err');return;}try{await navigator.clipboard.writeText(t);setStatus('Copied!','ok');}catch(e){setStatus('Copy failed','err');}};
</script>
</body>
</html>
