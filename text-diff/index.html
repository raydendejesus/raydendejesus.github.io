<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Diff</title>
<style>
  :root{--accent:#38bdf8;}
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);color:#e2e8f0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;padding:24px;}
  a.back{color:var(--accent);text-decoration:none;}
  .wrap{max-width:1000px;margin:0 auto;}
  h1{font-size:1.6rem;margin:.3em 0 .6em;}
  .panel{background:#111827;border:1px solid #1f2937;border-radius:14px;padding:18px;margin-bottom:16px;}
  .inputs{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  textarea{width:100%;min-height:180px;background:#0b1120;color:#e2e8f0;border:1px solid #1f2937;border-radius:10px;padding:10px;font-family:ui-monospace,monospace;font-size:.9rem;resize:vertical;}
  label{display:block;margin-bottom:6px;font-size:.85rem;color:#94a3b8;}
  button{background:var(--accent);color:#04222e;border:none;border-radius:10px;padding:10px 18px;font-weight:600;cursor:pointer;margin-top:12px;}
  button:hover{filter:brightness(1.1);}
  .diff{font-family:ui-monospace,monospace;font-size:.88rem;line-height:1.6;white-space:pre-wrap;word-break:break-word;}
  .diff .add{background:rgba(34,197,94,.18);color:#86efac;display:block;padding:0 6px;border-left:3px solid #22c55e;}
  .diff .del{background:rgba(239,68,68,.18);color:#fca5a5;display:block;padding:0 6px;border-left:3px solid #ef4444;}
  .diff .same{display:block;padding:0 6px;border-left:3px solid transparent;color:#94a3b8;}
  @media(max-width:700px){.inputs{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="../">← back</a>
  <h1>Text Diff</h1>
  <div class="panel">
    <div class="inputs">
      <div><label>Original</label><textarea id="a" placeholder="Original text..."></textarea></div>
      <div><label>Changed</label><textarea id="b" placeholder="Changed text..."></textarea></div>
    </div>
    <button id="run">Compare</button>
  </div>
  <div class="panel"><div class="diff" id="out">Diff will appear here.</div></div>
</div>
<script>
  // LCS-based line diff
  function diff(aLines,bLines){
    const n=aLines.length,m=bLines.length;
    const dp=Array.from({length:n+1},()=>new Int32Array(m+1));
    for(let i=n-1;i>=0;i--)for(let j=m-1;j>=0;j--)
      dp[i][j]=aLines[i]===bLines[j]?dp[i+1][j+1]+1:Math.max(dp[i+1][j],dp[i][j+1]);
    const res=[];let i=0,j=0;
    while(i<n&&j<m){
      if(aLines[i]===bLines[j]){res.push(['same',aLines[i]]);i++;j++;}
      else if(dp[i+1][j]>=dp[i][j+1]){res.push(['del',aLines[i]]);i++;}
      else{res.push(['add',bLines[j]]);j++;}
    }
    while(i<n)res.push(['del',aLines[i++]]);
    while(j<m)res.push(['add',bLines[j++]]);
    return res;
  }
  function esc(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
  document.getElementById('run').onclick=()=>{
    const a=document.getElementById('a').value.split('\n');
    const b=document.getElementById('b').value.split('\n');
    const d=diff(a,b);
    const pre={add:'+ ',del:'- ',same:'  '};
    document.getElementById('out').innerHTML=d.map(([t,l])=>
      `<span class="${t}">${pre[t]}${esc(l)||' '}</span>`).join('');
  };
</script>
</body>
</html>
