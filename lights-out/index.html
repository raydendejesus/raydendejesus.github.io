<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lights Out</title>
<style>
  body{margin:0;min-height:100vh;background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);color:#e2e8f0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;display:flex;flex-direction:column;align-items:center;padding:20px;}
  a.back{position:fixed;top:16px;left:16px;color:#38bdf8;text-decoration:none;}
  a.back:hover{text-decoration:underline;}
  h1{margin:8px 0;}
  .panel{background:#111827;border:1px solid #1f2937;border-radius:18px;padding:20px;display:flex;flex-direction:column;align-items:center;}
  .bar{display:flex;gap:14px;align-items:center;margin-bottom:14px;}
  .bar b{color:#38bdf8;font-size:20px;}
  select,button{background:#0b1120;color:#e2e8f0;border:1px solid #1f2937;border-radius:10px;padding:8px 12px;font:inherit;cursor:pointer;}
  button:hover,select:hover{border-color:#38bdf8;}
  #grid{display:grid;gap:8px;}
  .cell{width:58px;height:58px;border-radius:12px;cursor:pointer;background:#1e293b;border:1px solid #334155;transition:background .12s,box-shadow .12s;}
  .cell.on{background:#38bdf8;border-color:#7dd3fc;box-shadow:0 0 18px rgba(56,189,248,.7);}
  #msg{margin-top:14px;min-height:24px;font-weight:700;font-size:18px;}
</style>
</head>
<body>
<a class="back" href="../">← back</a>
<h1>Lights Out</h1>
<div class="panel">
  <div class="bar">
    Moves: <b id="moves">0</b>
    <select id="size">
      <option value="4">4×4</option>
      <option value="5" selected>5×5</option>
      <option value="6">6×6</option>
    </select>
    <button id="new">New Board</button>
  </div>
  <div id="grid"></div>
  <div id="msg"></div>
</div>
<script>
const gridEl=document.getElementById('grid'),movesEl=document.getElementById('moves'),msgEl=document.getElementById('msg');
let N,state,moves,solved;
function toggle(r,c){if(r<0||r>=N||c<0||c>=N)return;state[r][c]=!state[r][c];}
function press(r,c,count=true){
  if(solved)return;
  toggle(r,c);toggle(r-1,c);toggle(r+1,c);toggle(r,c-1);toggle(r,c+1);
  if(count){moves++;movesEl.textContent=moves;}
  render();checkWin();
}
function render(){
  gridEl.style.gridTemplateColumns=`repeat(${N},58px)`;
  gridEl.innerHTML='';
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    const d=document.createElement('div');
    d.className='cell'+(state[r][c]?' on':'');
    d.addEventListener('click',()=>press(r,c));
    gridEl.appendChild(d);
  }
}
function checkWin(){
  if(state.every(row=>row.every(v=>!v))){
    solved=true;msgEl.textContent='🎉 Solved in '+moves+' moves!';msgEl.style.color='#34d399';
  }
}
function newGame(){
  N=+document.getElementById('size').value;
  state=Array.from({length:N},()=>Array(N).fill(false));
  moves=0;solved=false;movesEl.textContent='0';msgEl.textContent='';
  // scramble by random presses → guaranteed solvable
  const k=N*N;
  for(let i=0;i<k;i++)press(Math.floor(Math.random()*N),Math.floor(Math.random()*N),false);
  // if it scrambled to all-off, press once more
  if(state.every(row=>row.every(v=>!v)))press(0,0,false);
  moves=0;solved=false;movesEl.textContent='0';
  render();
}
document.getElementById('new').addEventListener('click',newGame);
document.getElementById('size').addEventListener('change',newGame);
newGame();
</script>
</body>
</html>
