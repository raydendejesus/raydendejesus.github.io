<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maze Runner</title>
<style>
  :root { --accent: #38bdf8; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    color: #e2e8f0;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  .back {
    position: fixed; top: 16px; left: 16px;
    color: var(--accent); text-decoration: none; font-size: 14px; opacity: 0.8;
  }
  .back:hover { opacity: 1; }
  .card {
    background: #111827;
    border: 1px solid #1f2937;
    border-radius: 18px;
    padding: 28px;
    width: min(94vw, 560px);
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  h1 { margin: 0 0 4px; font-size: 24px; }
  .sub { margin: 0 0 20px; color: #94a3b8; font-size: 14px; }
  canvas {
    background: #0b1120;
    border: 1px solid #1f2937;
    border-radius: 12px;
    touch-action: none;
    max-width: 100%;
  }
  .controls {
    display: flex; gap: 12px; align-items: center; justify-content: center;
    flex-wrap: wrap; margin: 18px 0 6px;
  }
  label { font-size: 14px; color: #cbd5e1; }
  select, button {
    font-family: inherit; font-size: 15px; border-radius: 10px;
    border: 1px solid #1f2937; padding: 10px 16px;
    background: #0b1120; color: #e2e8f0; cursor: pointer;
  }
  button:hover { border-color: var(--accent); }
  .win { color: #4ade80; font-weight: 600; height: 22px; margin-top: 8px; }
  .hint { color: #64748b; font-size: 13px; margin-top: 4px; }
</style>
</head>
<body>
<a class="back" href="../">&larr; back</a>
<div class="card">
  <h1>Maze Runner</h1>
  <p class="sub">Use arrow keys / WASD or swipe. Reach the green exit.</p>
  <canvas id="maze" width="480" height="480"></canvas>
  <div class="controls">
    <label for="size">Size</label>
    <select id="size">
      <option value="10">Easy (10)</option>
      <option value="16" selected>Medium (16)</option>
      <option value="24">Hard (24)</option>
      <option value="32">Insane (32)</option>
    </select>
    <button id="newGame">New Maze</button>
    <button id="solve">Show Path</button>
  </div>
  <div class="win" id="status"></div>
  <div class="hint">Moves: <span id="moves">0</span></div>
</div>
<script>
  const canvas = document.getElementById('maze');
  const ctx = canvas.getContext('2d');
  const sizeSel = document.getElementById('size');
  const statusEl = document.getElementById('status');
  const movesEl = document.getElementById('moves');
  const SIZE = 480;

  let N, cells, player, moves, won, showSolution, solutionPath;

  function idx(x, y) { return y * N + x; }

  function genMaze(n) {
    // each cell: walls [top,right,bottom,left]
    const grid = [];
    for (let i = 0; i < n * n; i++) grid.push({ walls: [true, true, true, true], visited: false });
    const stack = [{ x: 0, y: 0 }];
    grid[0].visited = true;
    const dirs = [[0,-1,0,2],[1,0,1,3],[0,1,2,0],[-1,0,3,1]]; // dx,dy,wall,opposite
    while (stack.length) {
      const cur = stack[stack.length - 1];
      const opts = [];
      for (const [dx, dy, w, ow] of dirs) {
        const nx = cur.x + dx, ny = cur.y + dy;
        if (nx >= 0 && nx < n && ny >= 0 && ny < n && !grid[ny * n + nx].visited)
          opts.push({ nx, ny, w, ow });
      }
      if (opts.length) {
        const o = opts[Math.floor(Math.random() * opts.length)];
        grid[cur.y * n + cur.x].walls[o.w] = false;
        grid[o.ny * n + o.nx].walls[o.ow] = false;
        grid[o.ny * n + o.nx].visited = true;
        stack.push({ x: o.nx, y: o.ny });
      } else {
        stack.pop();
      }
    }
    return grid;
  }

  function neighbors(x, y) {
    const res = [];
    const c = cells[idx(x, y)];
    if (!c.walls[0]) res.push([x, y - 1]);
    if (!c.walls[1]) res.push([x + 1, y]);
    if (!c.walls[2]) res.push([x, y + 1]);
    if (!c.walls[3]) res.push([x - 1, y]);
    return res;
  }

  function bfsPath() {
    const start = idx(0, 0), goal = idx(N - 1, N - 1);
    const prev = new Array(N * N).fill(-1);
    const seen = new Array(N * N).fill(false);
    const q = [[0, 0]];
    seen[start] = true;
    while (q.length) {
      const [x, y] = q.shift();
      if (idx(x, y) === goal) break;
      for (const [nx, ny] of neighbors(x, y)) {
        if (!seen[idx(nx, ny)]) {
          seen[idx(nx, ny)] = true;
          prev[idx(nx, ny)] = idx(x, y);
          q.push([nx, ny]);
        }
      }
    }
    const path = [];
    let cur = goal;
    while (cur !== -1) { path.push(cur); cur = prev[cur]; }
    return path.reverse();
  }

  function newGame() {
    N = parseInt(sizeSel.value, 10);
    cells = genMaze(N);
    player = { x: 0, y: 0 };
    moves = 0; won = false; showSolution = false;
    movesEl.textContent = '0';
    statusEl.textContent = '';
    solutionPath = bfsPath();
    draw();
  }

  function draw() {
    const cs = SIZE / N;
    ctx.clearRect(0, 0, SIZE, SIZE);
    ctx.fillStyle = '#0b1120';
    ctx.fillRect(0, 0, SIZE, SIZE);

    // exit cell highlight
    ctx.fillStyle = 'rgba(74,222,128,0.18)';
    ctx.fillRect((N - 1) * cs, (N - 1) * cs, cs, cs);

    if (showSolution) {
      ctx.strokeStyle = 'rgba(56,189,248,0.5)';
      ctx.lineWidth = Math.max(2, cs * 0.18);
      ctx.lineCap = 'round';
      ctx.beginPath();
      solutionPath.forEach((id, i) => {
        const px = (id % N) * cs + cs / 2;
        const py = Math.floor(id / N) * cs + cs / 2;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      });
      ctx.stroke();
    }

    ctx.strokeStyle = '#334155';
    ctx.lineWidth = 2;
    for (let y = 0; y < N; y++) {
      for (let x = 0; x < N; x++) {
        const c = cells[idx(x, y)];
        const px = x * cs, py = y * cs;
        ctx.beginPath();
        if (c.walls[0]) { ctx.moveTo(px, py); ctx.lineTo(px + cs, py); }
        if (c.walls[1]) { ctx.moveTo(px + cs, py); ctx.lineTo(px + cs, py + cs); }
        if (c.walls[2]) { ctx.moveTo(px + cs, py + cs); ctx.lineTo(px, py + cs); }
        if (c.walls[3]) { ctx.moveTo(px, py + cs); ctx.lineTo(px, py); }
        ctx.stroke();
      }
    }

    // player
    ctx.fillStyle = '#38bdf8';
    ctx.beginPath();
    ctx.arc(player.x * cs + cs / 2, player.y * cs + cs / 2, cs * 0.3, 0, Math.PI * 2);
    ctx.fill();
  }

  function move(dx, dy) {
    if (won) return;
    const c = cells[idx(player.x, player.y)];
    if (dx === 1 && c.walls[1]) return;
    if (dx === -1 && c.walls[3]) return;
    if (dy === 1 && c.walls[2]) return;
    if (dy === -1 && c.walls[0]) return;
    player.x += dx; player.y += dy;
    moves++; movesEl.textContent = moves;
    if (player.x === N - 1 && player.y === N - 1) {
      won = true;
      statusEl.textContent = 'Solved in ' + moves + ' moves!';
    }
    draw();
  }

  document.addEventListener('keydown', (e) => {
    const k = e.key.toLowerCase();
    if (k === 'arrowup' || k === 'w') { move(0, -1); e.preventDefault(); }
    else if (k === 'arrowdown' || k === 's') { move(0, 1); e.preventDefault(); }
    else if (k === 'arrowleft' || k === 'a') { move(-1, 0); e.preventDefault(); }
    else if (k === 'arrowright' || k === 'd') { move(1, 0); e.preventDefault(); }
  });

  // swipe
  let ts = null;
  canvas.addEventListener('touchstart', (e) => { ts = e.touches[0]; }, { passive: true });
  canvas.addEventListener('touchend', (e) => {
    if (!ts) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - ts.clientX, dy = t.clientY - ts.clientY;
    if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 1 : -1, 0);
    else move(0, dy > 0 ? 1 : -1);
    ts = null;
  });

  document.getElementById('newGame').addEventListener('click', newGame);
  sizeSel.addEventListener('change', newGame);
  document.getElementById('solve').addEventListener('click', () => {
    showSolution = !showSolution; draw();
  });

  newGame();
</script>
</body>
</html>
