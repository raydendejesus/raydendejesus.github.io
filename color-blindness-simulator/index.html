<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Blindness Simulator</title>
<style>
  :root { --accent:#38bdf8; }
  * { box-sizing:border-box; }
  body {
    margin:0; min-height:100vh; padding:32px;
    background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    color:#e2e8f0; font-family:system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  a { color:var(--accent); text-decoration:none; } a:hover{ text-decoration:underline; }
  h1 { font-size:1.5rem; margin:8px 0 24px; }
  .wrap { max-width:900px; margin:0 auto; }
  .panel { background:#111827; border:1px solid #1f2937; border-radius:16px; padding:24px; margin-bottom:20px; }
  label { font-size:.85rem; color:#94a3b8; margin-right:8px; }
  input[type=color] { width:48px; height:36px; border:none; border-radius:8px; background:none; cursor:pointer; vertical-align:middle; }
  input[type=text] { background:#0b1120; border:1px solid #1f2937; color:#e2e8f0; border-radius:8px; padding:8px; font-family:monospace; }
  button { background:#1f2937; color:#e2e8f0; border:1px solid #374151; border-radius:8px; padding:8px 12px; cursor:pointer; }
  button:hover { border-color:var(--accent); }
  .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(180px,1fr)); gap:16px; }
  .card { border:1px solid #1f2937; border-radius:12px; overflow:hidden; }
  .swatch { height:90px; }
  .meta { padding:10px; font-size:.8rem; }
  .meta .t { color:#94a3b8; }
  .meta .h { font-family:monospace; }
  .palrow { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:8px; }
</style>
</head>
<body>
<div class="wrap">
  <a href="../">&larr; back</a>
  <h1>Color Blindness Simulator</h1>
  <div class="panel">
    <div class="palrow">
      <label>Add color</label>
      <input type="color" id="pick" value="#38bdf8">
      <button id="add">Add</button>
      <button id="loadDemo">Load demo palette</button>
      <button id="clear">Clear</button>
    </div>
    <div id="chips" class="palrow"></div>
  </div>
  <div class="panel">
    <div class="grid" id="out"></div>
  </div>
</div>
<script>
// Color-blindness simulation matrices (Machado et al. / common LMS approximations)
const M = {
  Normal:       [1,0,0, 0,1,0, 0,0,1],
  Protanopia:   [0.567,0.433,0, 0.558,0.442,0, 0,0.242,0.758],
  Deuteranopia: [0.625,0.375,0, 0.7,0.3,0, 0,0.3,0.7],
  Tritanopia:   [0.95,0.05,0, 0,0.433,0.567, 0,0.475,0.525]
};
function hexToRgb(h){ h=h.replace('#',''); if(h.length===3)h=h.split('').map(c=>c+c).join(''); const n=parseInt(h,16); return [(n>>16)&255,(n>>8)&255,n&255]; }
function rgbToHex(r){ return '#'+r.map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join(''); }
function apply(rgb,m){ return [
  m[0]*rgb[0]+m[1]*rgb[1]+m[2]*rgb[2],
  m[3]*rgb[0]+m[4]*rgb[1]+m[5]*rgb[2],
  m[6]*rgb[0]+m[7]*rgb[1]+m[8]*rgb[2]
]; }
let palette=['#38bdf8','#22c55e','#ef4444','#eab308'];
const out=document.getElementById('out'), chips=document.getElementById('chips');
function render(){
  chips.innerHTML='';
  palette.forEach((c,i)=>{
    const b=document.createElement('button');
    b.textContent=c; b.style.background=c; b.style.color='#000'; b.style.fontFamily='monospace';
    b.title='Remove'; b.onclick=()=>{ palette.splice(i,1); render(); };
    chips.appendChild(b);
  });
  out.innerHTML='';
  Object.keys(M).forEach(name=>{
    const card=document.createElement('div'); card.className='card';
    const bars=palette.map(c=>{
      const sim=rgbToHex(apply(hexToRgb(c),M[name]));
      return `<div style="flex:1;background:${sim}"></div>`;
    }).join('');
    card.innerHTML=`<div class="swatch" style="display:flex">${bars||'<div style="flex:1;background:#1f2937"></div>'}</div><div class="meta"><div class="t">${name}</div></div>`;
    out.appendChild(card);
  });
}
document.getElementById('add').onclick=()=>{ palette.push(document.getElementById('pick').value); render(); };
document.getElementById('clear').onclick=()=>{ palette=[]; render(); };
document.getElementById('loadDemo').onclick=()=>{ palette=['#38bdf8','#22c55e','#ef4444','#eab308','#a855f7','#f97316']; render(); };
render();
</script>
</body>
</html>
