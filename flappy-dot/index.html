<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Dot</title>
<style>
  body{margin:0;min-height:100vh;background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);color:#e2e8f0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;display:flex;flex-direction:column;align-items:center;padding:20px;}
  a.back{position:fixed;top:16px;left:16px;color:#38bdf8;text-decoration:none;}
  a.back:hover{text-decoration:underline;}
  h1{margin:8px 0;}
  .panel{background:#111827;border:1px solid #1f2937;border-radius:18px;padding:16px;}
  canvas{display:block;border-radius:12px;background:#0b1120;cursor:pointer;}
  .hint{text-align:center;margin-top:10px;color:#94a3b8;}
</style>
</head>
<body>
<a class="back" href="../">← back</a>
<h1>Flappy Dot</h1>
<div class="panel"><canvas id="c" width="400" height="560"></canvas></div>
<p class="hint">Tap / click / press <b>Space</b> to flap</p>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const W=cv.width,H=cv.height;
const GAP=140,PIPE_W=58,SPEED=2.3,GRAV=0.45,FLAP=-7.6;
let dot,pipes,score,best=0,state; // state: ready, play, dead
function reset(){
  dot={x:90,y:H/2,vy:0,r:13};
  pipes=[];score=0;state='ready';
  spawnPipe(W+100);spawnPipe(W+100+220);
}
function spawnPipe(x){
  const top=60+Math.random()*(H-GAP-160);
  pipes.push({x,top,passed:false});
}
function flap(){
  if(state==='ready')state='play';
  if(state==='dead'){reset();return;}
  dot.vy=FLAP;
}
function update(){
  if(state==='play'){
    dot.vy+=GRAV;dot.y+=dot.vy;
    for(const p of pipes){
      p.x-=SPEED;
      if(!p.passed&&p.x+PIPE_W<dot.x){p.passed=true;score++;}
    }
    if(pipes[0].x+PIPE_W<0)pipes.shift();
    const last=pipes[pipes.length-1];
    if(last.x<W-220)spawnPipe(last.x+220);
    // collisions
    if(dot.y+dot.r>H||dot.y-dot.r<0)die();
    for(const p of pipes){
      if(dot.x+dot.r>p.x&&dot.x-dot.r<p.x+PIPE_W){
        if(dot.y-dot.r<p.top||dot.y+dot.r>p.top+GAP)die();
      }
    }
  }
}
function die(){if(state==='play'){state='dead';best=Math.max(best,score);}}
function draw(){
  ctx.clearRect(0,0,W,H);
  // pipes
  for(const p of pipes){
    ctx.fillStyle='#1f8a5a';
    ctx.fillRect(p.x,0,PIPE_W,p.top);
    ctx.fillRect(p.x,p.top+GAP,PIPE_W,H-p.top-GAP);
    ctx.fillStyle='#34d399';
    ctx.fillRect(p.x-3,p.top-16,PIPE_W+6,16);
    ctx.fillRect(p.x-3,p.top+GAP,PIPE_W+6,16);
  }
  // dot
  ctx.beginPath();ctx.arc(dot.x,dot.y,dot.r,0,7);
  ctx.fillStyle='#38bdf8';ctx.fill();
  ctx.fillStyle='#0b1120';
  ctx.beginPath();ctx.arc(dot.x+5,dot.y-4,3,0,7);ctx.fill();
  // score
  ctx.fillStyle='#e2e8f0';ctx.font='bold 42px system-ui';ctx.textAlign='center';
  ctx.fillText(score,W/2,70);
  if(state==='ready'){
    ctx.font='18px system-ui';ctx.fillText('Tap to start',W/2,H/2+60);
  }
  if(state==='dead'){
    ctx.fillStyle='rgba(11,17,32,.7)';ctx.fillRect(0,H/2-90,W,180);
    ctx.fillStyle='#f87171';ctx.font='bold 34px system-ui';ctx.fillText('Game Over',W/2,H/2-20);
    ctx.fillStyle='#e2e8f0';ctx.font='18px system-ui';
    ctx.fillText('Score: '+score+'   Best: '+best,W/2,H/2+14);
    ctx.fillText('Tap to retry',W/2,H/2+48);
  }
}
function loop(){update();draw();requestAnimationFrame(loop);}
cv.addEventListener('mousedown',flap);
cv.addEventListener('touchstart',e=>{e.preventDefault();flap();},{passive:false});
window.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();flap();}});
reset();loop();
</script>
</body>
</html>
