<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gradient Generator</title>
<style>
  :root{--accent:#38bdf8;}
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);color:#e2e8f0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;padding:24px;}
  a.back{color:var(--accent);text-decoration:none;}
  .wrap{max-width:820px;margin:0 auto;}
  h1{font-size:1.6rem;margin:.3em 0 .6em;}
  .panel{background:#111827;border:1px solid #1f2937;border-radius:14px;padding:18px;margin-bottom:16px;}
  #preview{height:200px;border-radius:14px;border:1px solid #1f2937;margin-bottom:16px;}
  .stop{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .stop input[type=color]{width:46px;height:36px;border:none;background:none;cursor:pointer;}
  .stop input[type=range]{flex:1;accent-color:var(--accent);}
  .stop .pct{width:48px;text-align:right;color:#94a3b8;font-size:.9rem;}
  .stop button{background:#7f1d1d;color:#fee2e2;border:none;border-radius:8px;padding:6px 10px;cursor:pointer;}
  .controls{display:flex;gap:16px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
  .controls label{font-size:.85rem;color:#94a3b8;display:flex;gap:8px;align-items:center;}
  select,input[type=range]{accent-color:var(--accent);}
  select{background:#0b1120;color:#e2e8f0;border:1px solid #1f2937;border-radius:8px;padding:6px;}
  button.act{background:var(--accent);color:#04222e;border:none;border-radius:10px;padding:10px 16px;font-weight:600;cursor:pointer;}
  button.act:hover{filter:brightness(1.1);}
  code{display:block;background:#0b1120;border:1px solid #1f2937;border-radius:10px;padding:12px;font-family:ui-monospace,monospace;font-size:.9rem;word-break:break-all;margin-bottom:12px;}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="../">← back</a>
  <h1>Gradient Generator</h1>
  <div id="preview"></div>
  <div class="panel">
    <div class="controls">
      <label>Type
        <select id="type"><option value="linear">Linear</option><option value="radial">Radial</option></select>
      </label>
      <label id="angWrap">Angle <input type="range" id="angle" min="0" max="360" value="90"> <span id="angVal">90°</span></label>
    </div>
    <div id="stops"></div>
    <button class="act" id="addStop">+ Add color stop</button>
  </div>
  <div class="panel">
    <code id="css"></code>
    <button class="act" id="copy">Copy CSS</button>
  </div>
</div>
<script>
  let stops=[{c:'#38bdf8',p:0},{c:'#a855f7',p:100}];
  const stopsEl=document.getElementById('stops');
  const type=document.getElementById('type');
  const angle=document.getElementById('angle');
  function render(){
    stopsEl.innerHTML='';
    stops.forEach((s,i)=>{
      const d=document.createElement('div');d.className='stop';
      d.innerHTML=`<input type="color" value="${s.c}"><input type="range" min="0" max="100" value="${s.p}"><span class="pct">${s.p}%</span><button>✕</button>`;
      d.querySelector('input[type=color]').oninput=e=>{s.c=e.target.value;update();};
      const r=d.querySelector('input[type=range]');
      r.oninput=e=>{s.p=+e.target.value;d.querySelector('.pct').textContent=s.p+'%';update();};
      d.querySelector('button').onclick=()=>{if(stops.length>2){stops.splice(i,1);render();update();}};
      stopsEl.appendChild(d);
    });
  }
  function gradCss(){
    const sorted=[...stops].sort((a,b)=>a.p-b.p);
    const parts=sorted.map(s=>`${s.c} ${s.p}%`).join(', ');
    if(type.value==='linear')return `linear-gradient(${angle.value}deg, ${parts})`;
    return `radial-gradient(circle, ${parts})`;
  }
  function update(){
    const g=gradCss();
    document.getElementById('preview').style.background=g;
    document.getElementById('css').textContent='background: '+g+';';
    document.getElementById('angWrap').style.display=type.value==='linear'?'flex':'none';
    document.getElementById('angVal').textContent=angle.value+'°';
  }
  document.getElementById('addStop').onclick=()=>{stops.push({c:'#22d3ee',p:50});render();update();};
  type.onchange=update;angle.oninput=update;
  document.getElementById('copy').onclick=async()=>{
    const t=document.getElementById('css').textContent;
    try{await navigator.clipboard.writeText(t);}catch(e){}
    const b=document.getElementById('copy');b.textContent='Copied!';setTimeout(()=>b.textContent='Copy CSS',1200);
  };
  render();update();
</script>
</body>
</html>
