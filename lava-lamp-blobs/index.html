<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lava Lamp Blobs</title>
<style>
  :root{--accent:#38bdf8;}
  html,body{margin:0;height:100%;overflow:hidden;background:#0b1120;color:#e2e8f0;
    font-family:system-ui,-apple-system,"Segoe UI",sans-serif;}
  a.back{position:fixed;top:14px;left:16px;color:var(--accent);text-decoration:none;font-size:15px;z-index:10;
    background:rgba(17,24,39,.7);padding:4px 10px;border-radius:8px;}
  a.back:hover{text-decoration:underline;}
  canvas{display:block;cursor:pointer;}
  .panel{position:fixed;top:14px;right:16px;background:rgba(17,24,39,.85);border:1px solid #1f2937;border-radius:12px;
    padding:14px;z-index:10;display:flex;flex-direction:column;gap:10px;width:200px;}
  .panel label{font-size:12px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;display:flex;justify-content:space-between;}
  input[type=range]{width:100%;accent-color:var(--accent);}
  .swatches{display:flex;gap:8px;flex-wrap:wrap;}
  .sw{width:26px;height:26px;border-radius:7px;cursor:pointer;border:2px solid transparent;}
  .sw.sel{border-color:#fff;}
  .hint{position:fixed;bottom:14px;left:0;right:0;text-align:center;color:#475569;font-size:13px;z-index:10;}
</style>
</head>
<body>
<a class="back" href="../">← back</a>
<div class="panel">
  <label>Blobs <span id="cntv">10</span></label>
  <input type="range" id="count" min="4" max="22" step="1" value="10">
  <label>Speed <span id="spdv">1.0×</span></label>
  <input type="range" id="speed" min="0.2" max="3" step="0.1" value="1">
  <label>Goo <span id="goov">18</span></label>
  <input type="range" id="goo" min="6" max="34" step="1" value="18">
  <label>Palette</label>
  <div class="swatches" id="sw"></div>
</div>
<div class="hint">Click anywhere to spawn a blob that drifts toward your cursor</div>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H,blobs=[],count=10,speed=1,goo=18;
const PALETTES=[
  {name:'lava',a:'#ff4d6d',b:'#ff9a3d',bg:['#2a0a14','#120308']},
  {name:'ocean',a:'#38bdf8',b:'#22d3ee',bg:['#06283d','#021019']},
  {name:'toxic',a:'#a3e635',b:'#22c55e',bg:['#0f2417','#04120a']},
  {name:'grape',a:'#a78bfa',b:'#f472b6',bg:['#1e1033','#0a0418']},
];
let pal=PALETTES[0];
const swEl=document.getElementById('sw');
PALETTES.forEach((p,i)=>{const d=document.createElement('div');d.className='sw'+(i===0?' sel':'');
  d.style.background=`linear-gradient(135deg,${p.a},${p.b})`;
  d.onclick=()=>{pal=p;document.querySelectorAll('.sw').forEach(s=>s.classList.remove('sel'));d.classList.add('sel');paint();};
  swEl.appendChild(d);});
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;paint();}
addEventListener('resize',resize);
function mkBlob(x,y){return{x:x??Math.random()*W,y:y??Math.random()*H,
  r:30+Math.random()*60,vx:(Math.random()-0.5)*0.6,vy:(Math.random()-0.5)*0.6,
  ph:Math.random()*Math.PI*2,seek:false};}
function build(){blobs=Array.from({length:count},()=>mkBlob());}
let mx=-1,my=-1;
canvas.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
canvas.addEventListener('click',e=>{const b=mkBlob(e.clientX,e.clientY);b.seek=true;b.r=20+Math.random()*30;blobs.push(b);
  if(blobs.length>40)blobs.shift();document.getElementById('count').value=Math.min(22,blobs.length);
  document.getElementById('cntv').textContent=blobs.length;});
let off;
function paint(){
  off=document.createElement('canvas');off.width=W;off.height=H;
}
resize();build();
function step(){
  const t=performance.now()/1000;
  // background gradient
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,pal.bg[0]);g.addColorStop(1,pal.bg[1]);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // render blobs to offscreen for metaball threshold
  const o=off.getContext('2d');o.clearRect(0,0,W,H);
  for(const b of blobs){
    b.ph+=0.01*speed;
    if(b.seek&&mx>=0){const dx=mx-b.x,dy=my-b.y,d=Math.hypot(dx,dy)||1;b.vx+=dx/d*0.04*speed;b.vy+=dy/d*0.04*speed;}
    b.vx+=Math.cos(b.ph)*0.01*speed;b.vy+=Math.sin(b.ph*1.3)*0.01*speed;
    b.vx*=0.985;b.vy*=0.985;
    b.x+=b.vx*speed*1.4;b.y+=b.vy*speed*1.4;
    const rr=b.r;
    if(b.x<rr){b.x=rr;b.vx=Math.abs(b.vx);}if(b.x>W-rr){b.x=W-rr;b.vx=-Math.abs(b.vx);}
    if(b.y<rr){b.y=rr;b.vy=Math.abs(b.vy);}if(b.y>H-rr){b.y=H-rr;b.vy=-Math.abs(b.vy);}
    const rad=o.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r*1.6);
    rad.addColorStop(0,'rgba(255,255,255,1)');rad.addColorStop(0.5,'rgba(255,255,255,0.5)');
    rad.addColorStop(1,'rgba(255,255,255,0)');
    o.fillStyle=rad;o.beginPath();o.arc(b.x,b.y,b.r*1.6,0,7);o.fill();
  }
  // threshold the alpha into goo
  const img=o.getImageData(0,0,W,H),d=img.data;
  const ca=hex(pal.a),cb=hex(pal.b),thr=goo*7;
  for(let i=0;i<d.length;i+=4){
    const a=d[i+3];
    if(a>thr){
      const mix=Math.min(1,(a-thr)/(255-thr));
      d[i]=ca[0]+(cb[0]-ca[0])*mix;d[i+1]=ca[1]+(cb[1]-ca[1])*mix;d[i+2]=ca[2]+(cb[2]-ca[2])*mix;
      d[i+3]=Math.min(255,a*1.4);
    }else d[i+3]=0;
  }
  o.putImageData(img,0,0);
  ctx.drawImage(off,0,0);
  requestAnimationFrame(step);
}
function hex(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
document.getElementById('count').oninput=e=>{count=+e.target.value;document.getElementById('cntv').textContent=count;build();};
document.getElementById('speed').oninput=e=>{speed=+e.target.value;document.getElementById('spdv').textContent=speed.toFixed(1)+'×';};
document.getElementById('goo').oninput=e=>{goo=+e.target.value;document.getElementById('goov').textContent=goo;};
step();
</script>
</body>
</html>
