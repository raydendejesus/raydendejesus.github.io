<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Favicon Preview Generator</title>
<style>
  :root { --accent:#38bdf8; }
  * { box-sizing:border-box; }
  body {
    margin:0; min-height:100vh; padding:32px;
    background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    color:#e2e8f0; font-family:system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  a { color:var(--accent); text-decoration:none; } a:hover{ text-decoration:underline; }
  h1 { font-size:1.5rem; margin:8px 0 24px; }
  .wrap { max-width:860px; margin:0 auto; }
  .panel { background:#111827; border:1px solid #1f2937; border-radius:16px; padding:24px; margin-bottom:20px; }
  label { display:block; font-size:.85rem; color:#94a3b8; margin:10px 0 4px; }
  input[type=color] { width:48px; height:36px; border:none; border-radius:8px; background:none; cursor:pointer; vertical-align:middle; }
  input[type=text], select { background:#0b1120; border:1px solid #1f2937; color:#e2e8f0; border-radius:8px; padding:8px; font-family:inherit; }
  input[type=range] { accent-color:var(--accent); vertical-align:middle; }
  button { background:#1f2937; color:#e2e8f0; border:1px solid #374151; border-radius:8px; padding:9px 14px; cursor:pointer; }
  button:hover { border-color:var(--accent); }
  .controls { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .sizes { display:flex; gap:24px; align-items:flex-end; flex-wrap:wrap; margin-top:8px; }
  .sizes figure { margin:0; text-align:center; }
  .sizes figcaption { font-size:.75rem; color:#94a3b8; margin-top:6px; }
  canvas { image-rendering:pixelated; border:1px solid #1f2937; border-radius:8px; background:#0b1120; }
</style>
</head>
<body>
<div class="wrap">
  <a href="../">&larr; back</a>
  <h1>Favicon Preview Generator</h1>
  <div class="panel controls">
    <div>
      <label>Text / Emoji (1-2 chars)</label>
      <input type="text" id="text" value="R" maxlength="2" style="width:80px">
      <label>Shape</label>
      <select id="shape"><option value="rounded">Rounded square</option><option value="circle">Circle</option><option value="square">Square</option></select>
    </div>
    <div>
      <label>Background</label>
      <input type="color" id="bg" value="#38bdf8">
      <label>Text color</label>
      <input type="color" id="fg" value="#0b1120">
      <label>Font scale <span id="fsv">0.6</span></label>
      <input type="range" id="fs" min="0.3" max="0.9" step="0.05" value="0.6">
    </div>
  </div>
  <div class="panel">
    <div class="sizes">
      <figure><canvas id="c64" width="64" height="64" style="width:64px;height:64px"></canvas><figcaption>64px</figcaption></figure>
      <figure><canvas id="c32" width="32" height="32" style="width:32px;height:32px"></canvas><figcaption>32px</figcaption></figure>
      <figure><canvas id="c16" width="16" height="16" style="width:16px;height:16px"></canvas><figcaption>16px</figcaption></figure>
      <button id="dl">Download 64px PNG</button>
    </div>
  </div>
</div>
<script>
const ids=['c64','c32','c16'];
function draw(cv){
  const ctx=cv.getContext('2d'); const s=cv.width;
  ctx.clearRect(0,0,s,s);
  ctx.fillStyle=document.getElementById('bg').value;
  const shape=document.getElementById('shape').value;
  if(shape==='circle'){ ctx.beginPath(); ctx.arc(s/2,s/2,s/2,0,Math.PI*2); ctx.fill(); }
  else if(shape==='rounded'){ const r=s*0.22; ctx.beginPath(); ctx.moveTo(r,0); ctx.arcTo(s,0,s,s,r); ctx.arcTo(s,s,0,s,r); ctx.arcTo(0,s,0,0,r); ctx.arcTo(0,0,s,0,r); ctx.fill(); }
  else ctx.fillRect(0,0,s,s);
  const t=document.getElementById('text').value||'';
  ctx.fillStyle=document.getElementById('fg').value;
  ctx.font=`bold ${s*parseFloat(document.getElementById('fs').value)}px system-ui, sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(t, s/2, s*0.54);
}
function renderAll(){
  document.getElementById('fsv').textContent=document.getElementById('fs').value;
  ids.forEach(id=>draw(document.getElementById(id)));
}
['text','shape','bg','fg','fs'].forEach(id=>document.getElementById(id).addEventListener('input',renderAll));
document.getElementById('dl').onclick=()=>{
  const a=document.createElement('a');
  a.download='favicon-64.png';
  a.href=document.getElementById('c64').toDataURL('image/png');
  a.click();
};
renderAll();
</script>
</body>
</html>
