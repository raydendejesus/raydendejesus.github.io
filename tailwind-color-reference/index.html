<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tailwind Color Reference</title>
<style>
  :root { --accent:#38bdf8; }
  * { box-sizing:border-box; }
  body {
    margin:0; min-height:100vh; padding:32px;
    background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    color:#e2e8f0; font-family:system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  a { color:var(--accent); text-decoration:none; } a:hover{ text-decoration:underline; }
  h1 { font-size:1.5rem; margin:8px 0 16px; }
  .wrap { max-width:1100px; margin:0 auto; }
  input[type=text] { background:#111827; border:1px solid #1f2937; color:#e2e8f0; border-radius:10px; padding:10px 14px; width:260px; margin-bottom:20px; font-family:inherit; }
  .family { margin-bottom:20px; }
  .fname { font-size:.9rem; color:#94a3b8; text-transform:capitalize; margin:0 0 8px; }
  .row { display:grid; grid-template-columns:repeat(11, 1fr); gap:6px; }
  .sw { border-radius:8px; height:64px; cursor:pointer; position:relative; border:1px solid rgba(255,255,255,.06); display:flex; flex-direction:column; justify-content:flex-end; padding:4px; font-size:.6rem; font-family:monospace; transition:transform .1s; }
  .sw:hover { transform:scale(1.08); z-index:2; }
  .sw .k { opacity:.85; }
  @media(max-width:700px){ .row{ grid-template-columns:repeat(4,1fr); } }
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#052e16; color:#4ade80; border:1px solid #166534; padding:10px 18px; border-radius:10px; opacity:0; transition:opacity .2s; }
  .toast.show { opacity:1; }
</style>
</head>
<body>
<div class="wrap">
  <a href="../">&larr; back</a>
  <h1>Tailwind Color Reference</h1>
  <input type="text" id="search" placeholder="Search e.g. blue, 500, sky...">
  <div id="grid"></div>
</div>
<div class="toast" id="toast">Copied!</div>
<script>
const shades=['50','100','200','300','400','500','600','700','800','900','950'];
const colors={
slate:['#f8fafc','#f1f5f9','#e2e8f0','#cbd5e1','#94a3b8','#64748b','#475569','#334155','#1e293b','#0f172a','#020617'],
gray:['#f9fafb','#f3f4f6','#e5e7eb','#d1d5db','#9ca3af','#6b7280','#4b5563','#374151','#1f2937','#111827','#030712'],
zinc:['#fafafa','#f4f4f5','#e4e4e7','#d4d4d8','#a1a1aa','#71717a','#52525b','#3f3f46','#27272a','#18181b','#09090b'],
neutral:['#fafafa','#f5f5f5','#e5e5e5','#d4d4d4','#a3a3a3','#737373','#525252','#404040','#262626','#171717','#0a0a0a'],
stone:['#fafaf9','#f5f5f4','#e7e5e4','#d6d3d1','#a8a29e','#78716c','#57534e','#44403c','#292524','#1c1917','#0c0a09'],
red:['#fef2f2','#fee2e2','#fecaca','#fca5a5','#f87171','#ef4444','#dc2626','#b91c1c','#991b1b','#7f1d1d','#450a0a'],
orange:['#fff7ed','#ffedd5','#fed7aa','#fdba74','#fb923c','#f97316','#ea580c','#c2410c','#9a3412','#7c2d12','#431407'],
amber:['#fffbeb','#fef3c7','#fde68a','#fcd34d','#fbbf24','#f59e0b','#d97706','#b45309','#92400e','#78350f','#451a03'],
yellow:['#fefce8','#fef9c3','#fef08a','#fde047','#facc15','#eab308','#ca8a04','#a16207','#854d0e','#713f12','#422006'],
lime:['#f7fee7','#ecfccb','#d9f99d','#bef264','#a3e635','#84cc16','#65a30d','#4d7c0f','#3f6212','#365314','#1a2e05'],
green:['#f0fdf4','#dcfce7','#bbf7d0','#86efac','#4ade80','#22c55e','#16a34a','#15803d','#166534','#14532d','#052e16'],
emerald:['#ecfdf5','#d1fae5','#a7f3d0','#6ee7b7','#34d399','#10b981','#059669','#047857','#065f46','#064e3b','#022c22'],
teal:['#f0fdfa','#ccfbf1','#99f6e4','#5eead4','#2dd4bf','#14b8a6','#0d9488','#0f766e','#115e59','#134e4a','#042f2e'],
cyan:['#ecfeff','#cffafe','#a5f3fc','#67e8f9','#22d3ee','#06b6d4','#0891b2','#0e7490','#155e75','#164e63','#083344'],
sky:['#f0f9ff','#e0f2fe','#bae6fd','#7dd3fc','#38bdf8','#0ea5e9','#0284c7','#0369a1','#075985','#0c4a6e','#082f49'],
blue:['#eff6ff','#dbeafe','#bfdbfe','#93c5fd','#60a5fa','#3b82f6','#2563eb','#1d4ed8','#1e40af','#1e3a8a','#172554'],
indigo:['#eef2ff','#e0e7ff','#c7d2fe','#a5b4fc','#818cf8','#6366f1','#4f46e5','#4338ca','#3730a3','#312e81','#1e1b4b'],
violet:['#f5f3ff','#ede9fe','#ddd6fe','#c4b5fd','#a78bfa','#8b5cf6','#7c3aed','#6d28d9','#5b21b6','#4c1d95','#2e1065'],
purple:['#faf5ff','#f3e8ff','#e9d5ff','#d8b4fe','#c084fc','#a855f7','#9333ea','#7e22ce','#6b21a8','#581c87','#3b0764'],
fuchsia:['#fdf4ff','#fae8ff','#f5d0fe','#f0abfc','#e879f9','#d946ef','#c026d3','#a21caf','#86198f','#701a75','#4a044e'],
pink:['#fdf2f8','#fce7f3','#fbcfe8','#f9a8d4','#f472b6','#ec4899','#db2777','#be185d','#9d174d','#831843','#500724'],
rose:['#fff1f2','#ffe4e6','#fecdd3','#fda4af','#fb7185','#f43f5e','#e11d48','#be123c','#9f1239','#881337','#4c0519']
};
const grid=document.getElementById('grid'), toast=document.getElementById('toast');
function dark(hex){ const n=parseInt(hex.slice(1),16); return (0.299*((n>>16)&255)+0.587*((n>>8)&255)+0.114*(n&255))>140; }
function render(q){
  q=(q||'').toLowerCase().trim();
  grid.innerHTML='';
  Object.keys(colors).forEach(fam=>{
    const matchFam = !q || fam.includes(q);
    const row=shades.map((sh,i)=>({sh,hex:colors[fam][i]}))
      .filter(o=> matchFam || sh.includes(q) || o.hex.toLowerCase().includes(q));
    if(!row.length) return;
    const wrap=document.createElement('div'); wrap.className='family';
    wrap.innerHTML=`<div class="fname">${fam}</div>`;
    const r=document.createElement('div'); r.className='row';
    row.forEach(o=>{
      const d=document.createElement('div'); d.className='sw'; d.style.background=o.hex;
      d.style.color=dark(o.hex)?'#000':'#fff';
      d.innerHTML=`<span class="k">${o.sh}</span><span>${o.hex}</span>`;
      const cls=`${fam}-${o.sh}`;
      d.title=`Click: copy hex · Shift-click: copy class (${cls})`;
      d.onclick=e=>{ const v=e.shiftKey?cls:o.hex; navigator.clipboard.writeText(v); toast.textContent='Copied '+v; toast.classList.add('show'); setTimeout(()=>toast.classList.remove('show'),1000); };
      r.appendChild(d);
    });
    wrap.appendChild(r); grid.appendChild(wrap);
  });
  if(!grid.children.length) grid.innerHTML='<p style="color:#94a3b8">No matches.</p>';
}
document.getElementById('search').addEventListener('input',e=>render(e.target.value));
render('');
</script>
</body>
</html>
