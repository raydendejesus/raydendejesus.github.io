<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hex ↔ Text Converter</title>
<style>
  :root{--accent:#38bdf8;}
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);color:#e2e8f0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;padding:24px;}
  a.back{color:var(--accent);text-decoration:none;}
  .wrap{max-width:760px;margin:0 auto;}
  h1{font-size:1.6rem;margin:.3em 0 .6em;}
  .panel{background:#111827;border:1px solid #1f2937;border-radius:14px;padding:18px;margin-bottom:16px;}
  textarea{width:100%;min-height:120px;background:#0b1120;color:#e2e8f0;border:1px solid #1f2937;border-radius:10px;padding:10px;font-family:ui-monospace,monospace;font-size:.95rem;resize:vertical;}
  .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;align-items:center;}
  button{background:var(--accent);color:#04222e;border:none;border-radius:10px;padding:10px 16px;font-weight:600;cursor:pointer;font-size:.95rem;}
  button.alt{background:#1f2937;color:#e2e8f0;}
  button:hover{filter:brightness(1.1);}
  .err{color:#f87171;min-height:1.2em;margin-top:8px;font-size:.9rem;}
  label{display:block;margin-bottom:6px;font-size:.85rem;color:#94a3b8;}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="../">← back</a>
  <h1>Hex ↔ Text Converter</h1>
  <div class="panel">
    <label>Text</label>
    <textarea id="text" placeholder="Type text here..."></textarea>
    <div class="row">
      <button id="enc">Encode to Hex ↓</button>
      <button class="alt" id="copyText">Copy</button>
    </div>
  </div>
  <div class="panel">
    <label>Hex (space or unspaced)</label>
    <textarea id="hex" placeholder="48 65 6c 6c 6f"></textarea>
    <div class="row">
      <button id="dec">↑ Decode to Text</button>
      <button class="alt" id="copyHex">Copy</button>
    </div>
    <div class="err" id="err"></div>
  </div>
</div>
<script>
  const text=document.getElementById('text');
  const hex=document.getElementById('hex');
  const err=document.getElementById('err');
  function setErr(m){err.textContent=m||'';}
  function encode(){
    setErr('');
    const bytes=new TextEncoder().encode(text.value);
    hex.value=Array.from(bytes).map(b=>b.toString(16).padStart(2,'0')).join(' ');
  }
  function decode(){
    setErr('');
    try{
      const clean=hex.value.replace(/0x/gi,'').replace(/[\s,]+/g,'');
      if(clean.length%2!==0)throw new Error('odd number of hex digits');
      if(/[^0-9a-fA-F]/.test(clean))throw new Error('invalid hex characters');
      const bytes=new Uint8Array(clean.length/2);
      for(let i=0;i<bytes.length;i++)bytes[i]=parseInt(clean.substr(i*2,2),16);
      text.value=new TextDecoder().decode(bytes);
    }catch(e){setErr('Could not decode: '+e.message);}
  }
  function copy(el,btn){
    navigator.clipboard.writeText(el.value).then(()=>{
      const o=btn.textContent;btn.textContent='Copied!';setTimeout(()=>btn.textContent=o,1200);
    });
  }
  document.getElementById('enc').onclick=encode;
  document.getElementById('dec').onclick=decode;
  document.getElementById('copyText').onclick=e=>copy(text,e.target);
  document.getElementById('copyHex').onclick=e=>copy(hex,e.target);
</script>
</body>
</html>
