<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Classic</title>
<style>
  :root { --accent: #38bdf8; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    color: #e2e8f0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  .back { position: fixed; top: 16px; left: 16px; color: var(--accent);
    text-decoration: none; font-size: 14px; opacity: 0.8; }
  .back:hover { opacity: 1; }
  .card { background: #111827; border: 1px solid #1f2937; border-radius: 18px;
    padding: 24px; width: min(94vw, 480px); text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
  h1 { margin: 0 0 4px; font-size: 22px; }
  .sub { margin: 0 0 16px; color: #94a3b8; font-size: 13px; }
  .hud { display: flex; justify-content: space-between; font-size: 14px;
    color: #cbd5e1; margin-bottom: 10px; padding: 0 4px; }
  .hud b { color: var(--accent); }
  canvas { background: #0b1120; border: 1px solid #1f2937; border-radius: 12px;
    width: 100%; image-rendering: pixelated; display: block; }
  .msg { margin-top: 14px; font-size: 15px; color: #94a3b8; min-height: 22px; }
  .row { display: flex; gap: 10px; justify-content: center; align-items: center;
    flex-wrap: wrap; margin-top: 12px; }
  button, select { font-family: inherit; font-size: 15px; border-radius: 10px;
    border: 1px solid #1f2937; padding: 10px 16px; background: #0b1120; color: #e2e8f0;
    cursor: pointer; }
  button.start { background: var(--accent); color: #04293b; font-weight: 700; border: none; }
  button.start:hover { filter: brightness(1.1); }
  button:active { transform: scale(0.97); }
</style>
</head>
<body>
<a class="back" href="../">&larr; back</a>
<div class="card">
  <h1>🐍 Snake Classic</h1>
  <p class="sub">Arrow keys / WASD or swipe to steer. Eat the apples, don't bite yourself.</p>
  <div class="hud"><span>Score: <b id="score">0</b></span><span>Best: <b id="best">0</b></span></div>
  <canvas id="game" width="400" height="400"></canvas>
  <div class="msg" id="msg">Choose a speed and press Start</div>
  <div class="row">
    <label style="font-size:14px;color:#cbd5e1;">Speed:
      <select id="speed">
        <option value="140">Chill</option>
        <option value="100" selected>Normal</option>
        <option value="65">Fast</option>
      </select>
    </label>
    <button class="start" id="startBtn">Start</button>
  </div>
</div>
<script>
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const GRID = 20, CELL = canvas.width / GRID;
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const msgEl = document.getElementById('msg');
  const startBtn = document.getElementById('startBtn');
  const speedEl = document.getElementById('speed');

  let snake, dir, nextDir, food, score, best = 0, timer, running, tickMs;

  function placeFood() {
    while (true) {
      const f = { x: (Math.random() * GRID) | 0, y: (Math.random() * GRID) | 0 };
      if (!snake.some(s => s.x === f.x && s.y === f.y)) { food = f; return; }
    }
  }

  function start() {
    snake = [{ x: 9, y: 10 }, { x: 8, y: 10 }, { x: 7, y: 10 }];
    dir = { x: 1, y: 0 }; nextDir = dir;
    score = 0; scoreEl.textContent = 0;
    tickMs = parseInt(speedEl.value, 10);
    placeFood();
    running = true;
    msgEl.textContent = '';
    startBtn.style.display = 'none';
    clearInterval(timer);
    timer = setInterval(tick, tickMs);
    draw();
  }

  function gameOver() {
    running = false; clearInterval(timer);
    if (score > best) { best = score; bestEl.textContent = best; }
    msgEl.textContent = '💀 Game Over — you scored ' + score;
    startBtn.textContent = 'Play Again';
    startBtn.style.display = 'inline-block';
  }

  function tick() {
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
    if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID ||
        snake.some(s => s.x === head.x && s.y === head.y)) {
      gameOver(); return;
    }
    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) {
      score += 10; scoreEl.textContent = score;
      placeFood();
    } else {
      snake.pop();
    }
    draw();
  }

  function draw() {
    ctx.fillStyle = '#0b1120';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    // food
    ctx.fillStyle = '#f472b6';
    ctx.beginPath();
    ctx.arc(food.x * CELL + CELL / 2, food.y * CELL + CELL / 2, CELL / 2 - 2, 0, Math.PI * 2);
    ctx.fill();
    // snake
    for (let i = 0; i < snake.length; i++) {
      ctx.fillStyle = i === 0 ? '#38bdf8' : '#0ea5e9';
      const s = snake[i];
      ctx.fillRect(s.x * CELL + 1, s.y * CELL + 1, CELL - 2, CELL - 2);
    }
  }

  function setDir(x, y) {
    if (!running) return;
    if (x === -dir.x && y === -dir.y) return; // no reverse
    nextDir = { x, y };
  }

  document.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    if (k === 'arrowup' || k === 'w') { setDir(0, -1); e.preventDefault(); }
    else if (k === 'arrowdown' || k === 's') { setDir(0, 1); e.preventDefault(); }
    else if (k === 'arrowleft' || k === 'a') { setDir(-1, 0); e.preventDefault(); }
    else if (k === 'arrowright' || k === 'd') { setDir(1, 0); e.preventDefault(); }
  });

  let touchStart = null;
  canvas.addEventListener('touchstart', e => { touchStart = e.touches[0]; }, { passive: true });
  canvas.addEventListener('touchmove', e => {
    if (!touchStart) return;
    const t = e.touches[0];
    const dx = t.clientX - touchStart.clientX, dy = t.clientY - touchStart.clientY;
    if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
    if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 1 : -1, 0);
    else setDir(0, dy > 0 ? 1 : -1);
    touchStart = t;
    e.preventDefault();
  }, { passive: false });

  startBtn.addEventListener('click', start);
  draw.call(null);
  // idle frame
  snake = [{ x: 9, y: 10 }]; food = { x: 14, y: 10 }; draw();
</script>
</body>
</html>
