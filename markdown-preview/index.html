<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Preview</title>
<style>
  :root { --accent: #38bdf8; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh;
    background: radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    color: #e2e8f0;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    display: flex; flex-direction: column; align-items: center;
    padding: 56px 18px 24px;
  }
  .back {
    position: fixed; top: 16px; left: 16px;
    color: var(--accent); text-decoration: none; font-size: 14px; opacity: 0.8;
  }
  .back:hover { opacity: 1; }
  h1 { margin: 0 0 4px; font-size: 24px; }
  .sub { margin: 0 0 18px; color: #94a3b8; font-size: 14px; }
  .wrap {
    display: flex; gap: 16px; width: min(96vw, 1100px);
    height: 70vh; min-height: 420px;
  }
  .pane {
    flex: 1; background: #111827; border: 1px solid #1f2937;
    border-radius: 14px; overflow: hidden; display: flex; flex-direction: column;
  }
  .pane > .label {
    padding: 8px 14px; font-size: 12px; color: #64748b;
    border-bottom: 1px solid #1f2937; text-transform: uppercase; letter-spacing: 1px;
  }
  textarea {
    flex: 1; resize: none; border: none; outline: none;
    background: transparent; color: #e2e8f0; padding: 16px;
    font-family: ui-monospace, "Cascadia Code", monospace; font-size: 14px;
    line-height: 1.6;
  }
  #out { flex: 1; overflow-y: auto; padding: 16px 20px; line-height: 1.6; }
  #out h1, #out h2, #out h3 { border-bottom: 1px solid #1f2937; padding-bottom: 6px; }
  #out h1 { font-size: 24px; } #out h2 { font-size: 20px; } #out h3 { font-size: 17px; }
  #out a { color: var(--accent); }
  #out code {
    background: #0b1120; padding: 2px 6px; border-radius: 5px;
    font-family: ui-monospace, monospace; font-size: 0.9em;
  }
  #out pre {
    background: #0b1120; padding: 12px 14px; border-radius: 10px;
    overflow-x: auto; border: 1px solid #1f2937;
  }
  #out pre code { background: none; padding: 0; }
  #out blockquote {
    border-left: 3px solid var(--accent); margin: 12px 0;
    padding: 4px 14px; color: #94a3b8;
  }
  #out table { border-collapse: collapse; margin: 12px 0; }
  #out th, #out td { border: 1px solid #1f2937; padding: 6px 12px; }
  #out img { max-width: 100%; border-radius: 8px; }
  #out hr { border: none; border-top: 1px solid #1f2937; }
  .toolbar { margin-top: 14px; display: flex; gap: 10px; }
  button {
    font-family: inherit; font-size: 14px; border-radius: 10px;
    border: 1px solid #1f2937; padding: 8px 14px;
    background: #0b1120; color: #e2e8f0; cursor: pointer;
  }
  button:hover { border-color: var(--accent); }
  @media (max-width: 720px) { .wrap { flex-direction: column; height: auto; } .pane { min-height: 280px; } }
</style>
</head>
<body>
<a class="back" href="../">&larr; back</a>
<h1>Markdown Preview</h1>
<p class="sub">Type Markdown on the left, see rendered HTML live on the right.</p>
<div class="wrap">
  <div class="pane">
    <div class="label">Markdown</div>
    <textarea id="in" spellcheck="false"></textarea>
  </div>
  <div class="pane">
    <div class="label">Preview</div>
    <div id="out"></div>
  </div>
</div>
<div class="toolbar">
  <button id="copyHtml">Copy HTML</button>
  <button id="clear">Clear</button>
  <button id="sample">Load Sample</button>
</div>
<script>
  const input = document.getElementById('in');
  const out = document.getElementById('out');

  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function inline(s) {
    // escape first, then apply inline patterns
    s = escapeHtml(s);
    s = s.replace(/`([^`]+)`/g, (_, c) => '<code>' + c + '</code>');
    s = s.replace(/!\[([^\]]*)\]\(([^)\s]+)\)/g, '<img alt="$1" src="$2">');
    s = s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/__([^_]+)__/g, '<strong>$1</strong>');
    s = s.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    s = s.replace(/_([^_]+)_/g, '<em>$1</em>');
    s = s.replace(/~~([^~]+)~~/g, '<del>$1</del>');
    return s;
  }

  function render(md) {
    const lines = md.replace(/\r\n/g, '\n').split('\n');
    let html = '', i = 0;
    while (i < lines.length) {
      let line = lines[i];

      // code fence
      if (/^```/.test(line)) {
        const buf = [];
        i++;
        while (i < lines.length && !/^```/.test(lines[i])) { buf.push(escapeHtml(lines[i])); i++; }
        i++;
        html += '<pre><code>' + buf.join('\n') + '</code></pre>';
        continue;
      }
      // headings
      const h = line.match(/^(#{1,6})\s+(.*)$/);
      if (h) { html += '<h' + h[1].length + '>' + inline(h[2]) + '</h' + h[1].length + '>'; i++; continue; }
      // hr
      if (/^(\s*[-*_]){3,}\s*$/.test(line)) { html += '<hr>'; i++; continue; }
      // blockquote
      if (/^>\s?/.test(line)) {
        const buf = [];
        while (i < lines.length && /^>\s?/.test(lines[i])) { buf.push(inline(lines[i].replace(/^>\s?/, ''))); i++; }
        html += '<blockquote>' + buf.join('<br>') + '</blockquote>';
        continue;
      }
      // tables
      if (/\|/.test(line) && i + 1 < lines.length && /^\s*\|?[\s:|-]+\|?\s*$/.test(lines[i + 1]) && /-/.test(lines[i+1])) {
        const parseRow = r => r.replace(/^\s*\|/, '').replace(/\|\s*$/, '').split('|').map(c => c.trim());
        const header = parseRow(line);
        i += 2;
        let t = '<table><thead><tr>' + header.map(c => '<th>' + inline(c) + '</th>').join('') + '</tr></thead><tbody>';
        while (i < lines.length && /\|/.test(lines[i]) && lines[i].trim() !== '') {
          const cells = parseRow(lines[i]);
          t += '<tr>' + cells.map(c => '<td>' + inline(c) + '</td>').join('') + '</tr>';
          i++;
        }
        html += t + '</tbody></table>';
        continue;
      }
      // unordered list
      if (/^\s*[-*+]\s+/.test(line)) {
        let lst = '<ul>';
        while (i < lines.length && /^\s*[-*+]\s+/.test(lines[i])) {
          lst += '<li>' + inline(lines[i].replace(/^\s*[-*+]\s+/, '')) + '</li>'; i++;
        }
        html += lst + '</ul>';
        continue;
      }
      // ordered list
      if (/^\s*\d+\.\s+/.test(line)) {
        let lst = '<ol>';
        while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) {
          lst += '<li>' + inline(lines[i].replace(/^\s*\d+\.\s+/, '')) + '</li>'; i++;
        }
        html += lst + '</ol>';
        continue;
      }
      // blank line
      if (line.trim() === '') { i++; continue; }
      // paragraph (gather consecutive non-blank, non-special lines)
      const buf = [];
      while (i < lines.length && lines[i].trim() !== '' &&
             !/^```|^#{1,6}\s|^>\s?|^\s*[-*+]\s|^\s*\d+\.\s/.test(lines[i]) &&
             !/^(\s*[-*_]){3,}\s*$/.test(lines[i])) {
        buf.push(inline(lines[i])); i++;
      }
      if (buf.length) html += '<p>' + buf.join('<br>') + '</p>';
    }
    return html;
  }

  function update() { out.innerHTML = render(input.value); }
  input.addEventListener('input', update);

  document.getElementById('clear').addEventListener('click', () => { input.value = ''; update(); });
  document.getElementById('copyHtml').addEventListener('click', () => {
    navigator.clipboard?.writeText(out.innerHTML);
  });

  const SAMPLE = `# Markdown Preview

A **live** editor with _no dependencies_.

## Features
- Headings, **bold**, *italic*, ~~strike~~
- \`inline code\` and fenced blocks
- Links, images, lists, tables

> Blockquotes look like this.

\`\`\`js
function hello(name) {
  return "Hi, " + name;
}
\`\`\`

| Lang | Stars |
| ---- | ----- |
| JS   | 100   |
| HTML | 80    |

1. First
2. Second
3. Third

[Made with Claude Code](https://claude.com/claude-code)

---
`;

  document.getElementById('sample').addEventListener('click', () => { input.value = SAMPLE; update(); });
  input.value = SAMPLE;
  update();
</script>
</body>
</html>
