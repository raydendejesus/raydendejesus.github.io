<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unicode Explorer</title>
<style>
  :root{--accent:#38bdf8;}
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);color:#e2e8f0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;padding:24px;}
  a.back{color:var(--accent);text-decoration:none;}
  .wrap{max-width:840px;margin:0 auto;}
  h1{font-size:1.6rem;margin:.3em 0 .6em;}
  .panel{background:#111827;border:1px solid #1f2937;border-radius:14px;padding:18px;margin-bottom:16px;}
  textarea,input[type=text]{width:100%;background:#0b1120;color:#e2e8f0;border:1px solid #1f2937;border-radius:10px;padding:10px;font-family:ui-monospace,monospace;font-size:.95rem;}
  textarea{min-height:80px;resize:vertical;}
  table{width:100%;border-collapse:collapse;font-family:ui-monospace,monospace;font-size:.9rem;margin-top:6px;}
  th,td{padding:7px 10px;text-align:left;border-bottom:1px solid #1f2937;vertical-align:top;}
  th{color:#94a3b8;font-weight:600;}
  .big{font-size:1.4rem;color:var(--accent);}
  label{display:block;margin-bottom:6px;font-size:.85rem;color:#94a3b8;}
  .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;align-items:center;}
  button{background:var(--accent);color:#04222e;border:none;border-radius:10px;padding:10px 16px;font-weight:600;cursor:pointer;font-size:.95rem;}
  button.alt{background:#1f2937;color:#e2e8f0;}
  button:hover{filter:brightness(1.1);}
  .result{font-size:2.2rem;margin:10px 0;}
  .err{color:#f87171;font-size:.9rem;min-height:1.2em;}
  .meta{color:#94a3b8;font-size:.88rem;}
  .tablewrap{max-height:50vh;overflow:auto;}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="../">← back</a>
  <h1>Unicode Explorer</h1>
  <div class="panel">
    <label>Type or paste characters to inspect</label>
    <textarea id="input" placeholder="Type here... e.g. Héllo 😀">Héllo 😀</textarea>
    <div class="tablewrap">
      <table>
        <thead><tr><th>Char</th><th>Code point</th><th>Decimal</th><th>UTF-8 bytes</th><th>HTML entity</th></tr></thead>
        <tbody id="body"></tbody>
      </table>
    </div>
  </div>
  <div class="panel">
    <label>Look up by code point (e.g. U+1F600, 0x41, 65)</label>
    <div class="row">
      <input id="cp" type="text" placeholder="U+1F600" style="flex:1;min-width:200px;">
      <button id="lookup">Look up</button>
      <button class="alt" id="copyCp">Copy char</button>
    </div>
    <div class="result" id="cpResult"></div>
    <div class="meta" id="cpMeta"></div>
    <div class="err" id="err"></div>
  </div>
</div>
<script>
  const input=document.getElementById('input');
  const body=document.getElementById('body');
  function utf8bytes(cp){
    return Array.from(new TextEncoder().encode(String.fromCodePoint(cp)))
      .map(b=>b.toString(16).toUpperCase().padStart(2,'0')).join(' ');
  }
  function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function render(){
    body.innerHTML='';
    for(const ch of Array.from(input.value)){
      const cp=ch.codePointAt(0);
      const hex=cp.toString(16).toUpperCase().padStart(4,'0');
      const tr=document.createElement('tr');
      tr.innerHTML=`<td class="big">${esc(ch)}</td><td>U+${hex}</td><td>${cp}</td><td>${utf8bytes(cp)}</td><td>&amp;#${cp};</td>`;
      body.appendChild(tr);
    }
  }
  input.addEventListener('input',render);
  render();

  const cpInput=document.getElementById('cp');
  const cpResult=document.getElementById('cpResult');
  const cpMeta=document.getElementById('cpMeta');
  const err=document.getElementById('err');
  let lastChar='';
  function lookup(){
    err.textContent='';cpResult.textContent='';cpMeta.textContent='';lastChar='';
    let raw=cpInput.value.trim();
    if(!raw)return;
    let cp;
    try{
      if(/^u\+/i.test(raw))cp=parseInt(raw.slice(2),16);
      else if(/^0x/i.test(raw))cp=parseInt(raw.slice(2),16);
      else if(/^[0-9]+$/.test(raw))cp=parseInt(raw,10);
      else cp=parseInt(raw,16);
      if(isNaN(cp)||cp<0||cp>0x10FFFF)throw new Error('out of range');
      lastChar=String.fromCodePoint(cp);
      cpResult.textContent=lastChar;
      const hex=cp.toString(16).toUpperCase().padStart(4,'0');
      cpMeta.innerHTML=`U+${hex} · decimal ${cp} · UTF-8 ${utf8bytes(cp)} · HTML &amp;#${cp};`;
    }catch(e){err.textContent='Invalid code point: '+e.message;}
  }
  document.getElementById('lookup').onclick=lookup;
  cpInput.addEventListener('keydown',e=>{if(e.key==='Enter')lookup();});
  document.getElementById('copyCp').onclick=e=>{
    if(!lastChar){err.textContent='Look up a character first.';return;}
    navigator.clipboard.writeText(lastChar).then(()=>{
      const o=e.target.textContent;e.target.textContent='Copied!';setTimeout(()=>e.target.textContent=o,1200);
    });
  };
</script>
</body>
</html>
