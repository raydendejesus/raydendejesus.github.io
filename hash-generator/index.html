<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hash Generator</title>
<style>
  :root{--accent:#38bdf8;}
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);color:#e2e8f0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;padding:24px;}
  a.back{color:var(--accent);text-decoration:none;}
  .wrap{max-width:780px;margin:0 auto;}
  h1{font-size:1.6rem;margin:.3em 0 .6em;}
  .panel{background:#111827;border:1px solid #1f2937;border-radius:14px;padding:18px;margin-bottom:16px;}
  textarea{width:100%;min-height:120px;background:#0b1120;color:#e2e8f0;border:1px solid #1f2937;border-radius:10px;padding:10px;font-size:1rem;resize:vertical;}
  .hash{margin-bottom:14px;}
  .hash .lbl{font-size:.8rem;color:#94a3b8;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
  .hash .val{background:#0b1120;border:1px solid #1f2937;border-radius:10px;padding:10px;font-family:ui-monospace,monospace;font-size:.85rem;word-break:break-all;min-height:1.2em;}
  .copy{background:var(--accent);color:#04222e;border:none;border-radius:8px;padding:4px 12px;font-size:.8rem;cursor:pointer;font-weight:600;}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="../">← back</a>
  <h1>Hash Generator</h1>
  <div class="panel">
    <textarea id="input" placeholder="Type text to hash..."></textarea>
  </div>
  <div class="panel">
    <div class="hash"><div class="lbl">SHA-1 <button class="copy" data-a="SHA-1">Copy</button></div><div class="val" id="SHA-1"></div></div>
    <div class="hash"><div class="lbl">SHA-256 <button class="copy" data-a="SHA-256">Copy</button></div><div class="val" id="SHA-256"></div></div>
    <div class="hash"><div class="lbl">SHA-512 <button class="copy" data-a="SHA-512">Copy</button></div><div class="val" id="SHA-512"></div></div>
  </div>
</div>
<script>
  const input=document.getElementById('input');
  const algos=['SHA-1','SHA-256','SHA-512'];
  function hex(buf){return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');}
  async function update(){
    const data=new TextEncoder().encode(input.value);
    for(const a of algos){
      try{
        const buf=await crypto.subtle.digest(a,data);
        document.getElementById(a).textContent=hex(buf);
      }catch(e){document.getElementById(a).textContent='Error: '+e.message;}
    }
  }
  let t;
  input.addEventListener('input',()=>{clearTimeout(t);t=setTimeout(update,150);});
  document.querySelectorAll('.copy').forEach(b=>{
    b.onclick=async()=>{
      const v=document.getElementById(b.dataset.a).textContent;
      try{await navigator.clipboard.writeText(v);}catch(e){}
      b.textContent='Copied!';setTimeout(()=>b.textContent='Copy',1000);
    };
  });
  update();
</script>
</body>
</html>
