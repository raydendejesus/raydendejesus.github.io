<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bullet Storm Dodge</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#e2e8f0;
    background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px;}
  a.back{position:fixed;top:14px;left:16px;color:#38bdf8;text-decoration:none;font-size:14px;}
  a.back:hover{text-decoration:underline;}
  h1{margin:8px 0 4px;font-size:22px;}
  .hud{display:flex;gap:20px;margin-bottom:10px;font-size:15px;}
  .hud b{color:#38bdf8;}
  canvas{background:#0b1120;border:1px solid #1f2937;border-radius:16px;cursor:none;touch-action:none;}
  .panel{background:#111827;border:1px solid #1f2937;border-radius:14px;padding:10px 16px;margin-top:10px;font-size:13px;color:#94a3b8;}
</style>
</head>
<body>
<a class="back" href="../">← back</a>
<h1>Bullet Storm Dodge</h1>
<div class="hud"><div>Time <b id="time">0.0</b>s</div><div>Best <b id="best">0.0</b>s</div></div>
<canvas id="c" width="520" height="520"></canvas>
<div class="panel">Move your ship with the mouse. Survive the bullet patterns as long as you can — your hitbox is the tiny bright core.</div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const W=cv.width,H=cv.height;
let ship,bullets,particles,emitters,t,best=+localStorage.bulletBest||0,alive,started,shake;
document.getElementById('best').textContent=best.toFixed(1);
function init(){
  ship={x:W/2,y:H-70};bullets=[];particles=[];t=0;alive=true;started=false;shake=0;
  emitters=[
    {x:W/2,y:60,ang:0,spin:0.04,n:5,sp:2.2,rate:18,timer:0},
    {x:80,y:80,ang:0,spin:-0.07,n:1,sp:2.6,rate:8,timer:0},
    {x:W-80,y:80,ang:Math.PI,spin:0.07,n:1,sp:2.6,rate:8,timer:0},
  ];
}
cv.addEventListener('mousemove',e=>{const r=cv.getBoundingClientRect();
  ship.x=e.clientX-r.left;ship.y=e.clientY-r.top;started=true;});
cv.addEventListener('touchmove',e=>{e.preventDefault();const r=cv.getBoundingClientRect();
  ship.x=e.touches[0].clientX-r.left;ship.y=e.touches[0].clientY-r.top;started=true;},{passive:false});
cv.addEventListener('click',()=>{if(!alive)init();});
function fire(em){
  const base=em.ang;
  for(let i=0;i<em.n;i++){const a=base+i*(Math.PI*2/em.n);
    const hue=(t*40+i*60)%360;
    bullets.push({x:em.x,y:em.y,vx:Math.cos(a)*em.sp,vy:Math.sin(a)*em.sp,r:6,c:'hsl('+hue+',90%,65%)'});}
}
function burst(x,y){for(let i=0;i<30;i++){const a=Math.random()*7,s=Math.random()*6+1;
  particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,c:'hsl('+Math.random()*60+','+'90%,60%)'});}}
function update(dt){
  if(!started||!alive)return;
  t+=dt;document.getElementById('time').textContent=t.toFixed(1);
  const diff=1+t/20;
  for(const em of emitters){em.ang+=em.spin*diff;em.timer-=1;
    if(em.timer<=0){fire(em);em.timer=Math.max(6,em.rate/diff);}}
  for(const b of bullets){b.x+=b.vx*diff*0.7;b.y+=b.vy*diff*0.7;}
  bullets=bullets.filter(b=>b.x>-20&&b.x<W+20&&b.y>-20&&b.y<H+20);
  for(const b of bullets){const dx=b.x-ship.x,dy=b.y-ship.y;
    if(dx*dx+dy*dy<(b.r+4)*(b.r+4)){alive=false;shake=22;burst(ship.x,ship.y);
      if(t>best){best=t;localStorage.bulletBest=best;document.getElementById('best').textContent=best.toFixed(1);}}}
  for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.life-=0.02;}
  particles=particles.filter(p=>p.life>0);
  if(shake>0.5)shake*=0.85;
}
function draw(){
  ctx.save();
  if(shake>0.5)ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);
  ctx.clearRect(-30,-30,W+60,H+60);
  for(const em of emitters){ctx.fillStyle='#475569';ctx.beginPath();ctx.arc(em.x,em.y,10,0,7);ctx.fill();}
  for(const b of bullets){ctx.fillStyle=b.c;ctx.shadowColor=b.c;ctx.shadowBlur=10;
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,7);ctx.fill();}
  ctx.shadowBlur=0;
  for(const p of particles){ctx.globalAlpha=p.life;ctx.fillStyle=p.c;ctx.fillRect(p.x,p.y,3,3);}
  ctx.globalAlpha=1;
  if(alive){
    ctx.fillStyle='rgba(56,189,248,.25)';ctx.beginPath();ctx.arc(ship.x,ship.y,12,0,7);ctx.fill();
    ctx.fillStyle='#fff';ctx.shadowColor='#38bdf8';ctx.shadowBlur=12;
    ctx.beginPath();ctx.arc(ship.x,ship.y,3.5,0,7);ctx.fill();ctx.shadowBlur=0;
  }
  ctx.restore();
  if(!started&&alive){ctx.fillStyle='#e2e8f0';ctx.font='18px system-ui';ctx.textAlign='center';
    ctx.fillText('Move mouse into the arena to begin',W/2,H/2);ctx.textAlign='left';}
  if(!alive){ctx.fillStyle='rgba(11,17,32,.78)';ctx.fillRect(0,H/2-50,W,100);
    ctx.fillStyle='#f87171';ctx.font='bold 30px system-ui';ctx.textAlign='center';ctx.fillText('Hit!',W/2,H/2-4);
    ctx.fillStyle='#e2e8f0';ctx.font='15px system-ui';ctx.fillText('Survived '+t.toFixed(1)+'s — click to retry',W/2,H/2+24);ctx.textAlign='left';}
}
let last=performance.now();
function loop(now){const dt=Math.min(.05,(now-last)/1000);last=now;update(dt);draw();requestAnimationFrame(loop);}
init();loop(performance.now());
</script>
</body>
</html>
