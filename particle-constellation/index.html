<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Constellation</title>
<style>
  :root { --accent: #38bdf8; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    min-height: 100vh; overflow: hidden;
    background: radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    color: #e2e8f0;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  .back {
    position: fixed; top: 16px; left: 16px; z-index: 5;
    color: var(--accent); text-decoration: none; font-size: 14px; opacity: 0.8;
  }
  .back:hover { opacity: 1; }
  canvas { position: fixed; inset: 0; display: block; }
  .panel {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    z-index: 5; background: rgba(17,24,39,0.82); backdrop-filter: blur(6px);
    border: 1px solid #1f2937; border-radius: 14px; padding: 14px 18px;
    display: flex; gap: 18px; align-items: center; flex-wrap: wrap;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4); max-width: 94vw;
  }
  .panel h1 { margin: 0; font-size: 16px; white-space: nowrap; }
  .ctl { display: flex; flex-direction: column; gap: 2px; font-size: 12px; color: #94a3b8; }
  input[type=range] { width: 110px; accent-color: var(--accent); }
  button {
    font-family: inherit; font-size: 14px; border-radius: 10px;
    border: 1px solid #1f2937; padding: 8px 14px;
    background: #0b1120; color: #e2e8f0; cursor: pointer;
  }
  button:hover { border-color: var(--accent); }
  .tip { position: fixed; top: 16px; right: 16px; z-index: 5; color: #64748b; font-size: 13px; }
</style>
</head>
<body>
<a class="back" href="../">&larr; back</a>
<div class="tip">Move the mouse &middot; click to burst</div>
<canvas id="c"></canvas>
<div class="panel">
  <h1>Particle Constellation</h1>
  <div class="ctl"><span>Particles: <b id="cntLbl">90</b></span>
    <input type="range" id="count" min="20" max="220" value="90"></div>
  <div class="ctl"><span>Link distance: <b id="distLbl">130</b></span>
    <input type="range" id="dist" min="60" max="240" value="130"></div>
  <div class="ctl"><span>Speed: <b id="spdLbl">1.0</b></span>
    <input type="range" id="speed" min="2" max="30" value="10"></div>
  <button id="hue">Cycle Color</button>
</div>
<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];
  let linkDist = 130, speed = 1.0, baseHue = 200;
  const mouse = { x: -9999, y: -9999 };

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function makeParticle() {
    return {
      x: Math.random() * W, y: Math.random() * H,
      vx: (Math.random() - 0.5), vy: (Math.random() - 0.5),
      r: 1.4 + Math.random() * 1.8
    };
  }

  function setCount(n) {
    particles = [];
    for (let i = 0; i < n; i++) particles.push(makeParticle());
  }

  function step() {
    ctx.clearRect(0, 0, W, H);

    for (const p of particles) {
      p.x += p.vx * speed; p.y += p.vy * speed;
      if (p.x < 0 || p.x > W) p.vx *= -1;
      if (p.y < 0 || p.y > H) p.vy *= -1;
      p.x = Math.max(0, Math.min(W, p.x));
      p.y = Math.max(0, Math.min(H, p.y));

      // gentle pull toward mouse
      const mdx = mouse.x - p.x, mdy = mouse.y - p.y;
      const md = Math.hypot(mdx, mdy);
      if (md < 180 && md > 1) {
        p.vx += (mdx / md) * 0.012 * speed;
        p.vy += (mdy / md) * 0.012 * speed;
      }
      // damping
      const sp = Math.hypot(p.vx, p.vy);
      if (sp > 2.2) { p.vx *= 0.96; p.vy *= 0.96; }
    }

    // links
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const a = particles[i], b = particles[j];
        const dx = a.x - b.x, dy = a.y - b.y;
        const d = Math.hypot(dx, dy);
        if (d < linkDist) {
          const alpha = (1 - d / linkDist) * 0.6;
          ctx.strokeStyle = `hsla(${baseHue}, 90%, 65%, ${alpha})`;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }
      }
    }
    // link to mouse
    for (const p of particles) {
      const d = Math.hypot(p.x - mouse.x, p.y - mouse.y);
      if (d < linkDist) {
        ctx.strokeStyle = `hsla(${(baseHue + 40) % 360}, 90%, 70%, ${(1 - d / linkDist) * 0.7})`;
        ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(mouse.x, mouse.y); ctx.stroke();
      }
    }

    // nodes
    for (const p of particles) {
      ctx.fillStyle = `hsl(${baseHue}, 90%, 72%)`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }

    requestAnimationFrame(step);
  }

  window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
  window.addEventListener('mouseout', () => { mouse.x = -9999; mouse.y = -9999; });
  window.addEventListener('touchmove', e => {
    const t = e.touches[0]; mouse.x = t.clientX; mouse.y = t.clientY;
  }, { passive: true });

  window.addEventListener('click', e => {
    for (let i = 0; i < 12; i++) {
      const ang = (i / 12) * Math.PI * 2;
      const p = makeParticle();
      p.x = e.clientX; p.y = e.clientY;
      p.vx = Math.cos(ang) * 3; p.vy = Math.sin(ang) * 3;
      particles.push(p);
    }
    if (particles.length > 320) particles.splice(0, particles.length - 320);
  });

  const countEl = document.getElementById('count');
  const distEl = document.getElementById('dist');
  const speedEl = document.getElementById('speed');
  countEl.addEventListener('input', () => {
    document.getElementById('cntLbl').textContent = countEl.value;
    setCount(+countEl.value);
  });
  distEl.addEventListener('input', () => {
    linkDist = +distEl.value;
    document.getElementById('distLbl').textContent = distEl.value;
  });
  speedEl.addEventListener('input', () => {
    speed = (+speedEl.value) / 10;
    document.getElementById('spdLbl').textContent = speed.toFixed(1);
  });
  document.getElementById('hue').addEventListener('click', () => {
    baseHue = (baseHue + 60) % 360;
  });

  setCount(90);
  step();
</script>
</body>
</html>
