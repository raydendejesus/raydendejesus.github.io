<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Maker</title>
<style>
  :root { --accent: #38bdf8; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    color: #e2e8f0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  .back { position: fixed; top: 16px; left: 16px; color: var(--accent);
    text-decoration: none; font-size: 14px; opacity: 0.8; }
  .back:hover { opacity: 1; }
  .card { background: #111827; border: 1px solid #1f2937; border-radius: 18px;
    padding: 28px; width: min(94vw, 440px); text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
  h1 { margin: 0 0 4px; font-size: 22px; }
  .sub { margin: 0 0 20px; color: #94a3b8; font-size: 13px; }
  textarea { font-family: inherit; font-size: 15px; border-radius: 10px;
    border: 1px solid #1f2937; padding: 12px; background: #0b1120; color: #e2e8f0;
    width: 100%; resize: vertical; min-height: 70px; }
  textarea:focus { outline: none; border-color: var(--accent); }
  .opts { display: flex; gap: 14px; justify-content: center; align-items: center;
    flex-wrap: wrap; margin: 16px 0; font-size: 13px; color: #cbd5e1; }
  select { font-family: inherit; font-size: 14px; border-radius: 8px;
    border: 1px solid #1f2937; padding: 6px 10px; background: #0b1120; color: #e2e8f0; cursor: pointer; }
  #qrwrap { display: flex; justify-content: center; margin: 8px 0 16px; min-height: 60px; }
  canvas { background: #fff; border-radius: 10px; padding: 12px; max-width: 100%; }
  button { font-family: inherit; font-size: 15px; border-radius: 10px; border: none;
    padding: 10px 20px; background: var(--accent); color: #04293b; font-weight: 700; cursor: pointer; }
  button:hover { filter: brightness(1.1); }
  button:active { transform: scale(0.97); }
  .err { color: #f472b6; font-size: 13px; min-height: 18px; }
</style>
</head>
<body>
<a class="back" href="../">&larr; back</a>
<div class="card">
  <h1>🔳 QR Code Maker</h1>
  <p class="sub">Type a URL or text — a scannable QR code is generated offline.</p>
  <textarea id="text" placeholder="https://example.com">https://github.com</textarea>
  <div class="opts">
    <label>Error correction
      <select id="ecc">
        <option value="L">L (7%)</option>
        <option value="M" selected>M (15%)</option>
        <option value="Q">Q (25%)</option>
        <option value="H">H (30%)</option>
      </select>
    </label>
  </div>
  <div class="err" id="err"></div>
  <div id="qrwrap"><canvas id="qr"></canvas></div>
  <button id="dl">Download PNG</button>
</div>
<script>
/* Compact QR encoder (byte mode, versions 1-10) with Reed-Solomon ECC. */
(function(){
  // Galois field tables
  const EXP = new Array(256), LOG = new Array(256);
  for (let i = 0, x = 1; i < 256; i++) { EXP[i] = x; LOG[x] = i; x <<= 1; if (x & 0x100) x ^= 0x11d; }
  function gfMul(a, b){ return (a === 0 || b === 0) ? 0 : EXP[(LOG[a] + LOG[b]) % 255]; }
  function rsGenerator(n){
    let g = [1];
    for (let i = 0; i < n; i++){
      const ng = new Array(g.length + 1).fill(0);
      for (let j = 0; j < g.length; j++){
        ng[j] ^= gfMul(g[j], EXP[i]);
        ng[j + 1] ^= g[j];
      }
      g = ng;
    }
    return g;
  }
  function rsEncode(data, ecLen){
    const gen = rsGenerator(ecLen);
    const res = new Array(ecLen).fill(0);
    for (const d of data){
      const factor = d ^ res[0];
      res.shift(); res.push(0);
      if (factor !== 0) for (let i = 0; i < gen.length; i++) res[i] ^= gfMul(gen[i], factor);
    }
    return res;
  }

  // Capacity (byte mode data codewords) & EC params per version 1-10, by ECC level
  // [ecCodewordsPerBlock, numBlocksGroup1, dataCwGroup1, numBlocksGroup2, dataCwGroup2]
  const EC = {
    L: [[7,1,19,0,0],[10,1,34,0,0],[15,1,55,0,0],[20,1,80,0,0],[26,1,108,0,0],[18,2,68,0,0],[20,2,78,0,0],[24,2,97,0,0],[30,2,116,0,0],[18,2,68,2,69]],
    M: [[10,1,16,0,0],[16,1,28,0,0],[26,1,44,0,0],[18,2,32,0,0],[24,2,43,0,0],[16,4,27,0,0],[18,4,31,0,0],[22,2,38,2,39],[22,3,36,2,37],[26,4,43,1,44]],
    Q: [[13,1,13,0,0],[22,1,22,0,0],[18,2,17,0,0],[26,2,24,0,0],[18,2,15,2,16],[24,4,19,0,0],[18,2,14,4,15],[22,4,18,2,19],[20,4,16,4,17],[24,6,19,2,20]],
    H: [[17,1,9,0,0],[28,1,16,0,0],[22,2,13,0,0],[16,4,9,0,0],[22,2,11,2,12],[28,4,15,0,0],[26,4,13,1,14],[26,4,14,2,15],[24,4,12,4,13],[28,6,15,2,16]]
  };

  function totalDataCw(level, ver){
    const p = EC[level][ver - 1];
    return p[1] * p[2] + p[3] * p[4];
  }

  function chooseVersion(level, byteLen){
    for (let v = 1; v <= 10; v++){
      // byte-mode overhead: 4 bits mode + 8 or 16 bit count + 4 terminator
      const countBits = v < 10 ? 8 : 16;
      const need = 4 + countBits + byteLen * 8;
      if (totalDataCw(level, v) * 8 >= need) return v;
    }
    return null;
  }

  // BCH for format/version handled via lookup of format info
  function bitsToBytes(bits){
    const out = [];
    for (let i = 0; i < bits.length; i += 8){
      let b = 0;
      for (let j = 0; j < 8; j++) b = (b << 1) | (bits[i + j] || 0);
      out.push(b);
    }
    return out;
  }

  function buildData(level, ver, bytes){
    const countBits = ver < 10 ? 8 : 16;
    const bits = [];
    const push = (val, len) => { for (let i = len - 1; i >= 0; i--) bits.push((val >> i) & 1); };
    push(4, 4); // byte mode
    push(bytes.length, countBits);
    for (const b of bytes) push(b, 8);
    const cap = totalDataCw(level, ver) * 8;
    // terminator
    for (let i = 0; i < 4 && bits.length < cap; i++) bits.push(0);
    while (bits.length % 8 !== 0) bits.push(0);
    let dataCw = bitsToBytes(bits);
    const pad = [0xEC, 0x11];
    let pi = 0;
    while (dataCw.length < totalDataCw(level, ver)) dataCw.push(pad[pi++ % 2]);

    // split into blocks, compute EC, interleave
    const p = EC[level][ver - 1];
    const ecLen = p[0];
    const blocks = [];
    let idx = 0;
    for (let g = 0; g < 2; g++){
      const nb = g === 0 ? p[1] : p[3];
      const dc = g === 0 ? p[2] : p[4];
      for (let b = 0; b < nb; b++){
        const data = dataCw.slice(idx, idx + dc); idx += dc;
        blocks.push({ data, ec: rsEncode(data, ecLen) });
      }
    }
    const result = [];
    const maxData = Math.max(...blocks.map(b => b.data.length));
    for (let i = 0; i < maxData; i++)
      for (const b of blocks) if (i < b.data.length) result.push(b.data[i]);
    for (let i = 0; i < ecLen; i++)
      for (const b of blocks) result.push(b.ec[i]);
    return result;
  }

  // matrix placement
  function makeMatrix(ver){
    const size = ver * 4 + 17;
    const m = []; const reserved = [];
    for (let r = 0; r < size; r++){ m.push(new Array(size).fill(0)); reserved.push(new Array(size).fill(false)); }
    function finder(r, c){
      for (let i = -1; i <= 7; i++) for (let j = -1; j <= 7; j++){
        const rr = r + i, cc = c + j;
        if (rr < 0 || rr >= size || cc < 0 || cc >= size) continue;
        const on = (i >= 0 && i <= 6 && (j === 0 || j === 6)) ||
                   (j >= 0 && j <= 6 && (i === 0 || i === 6)) ||
                   (i >= 2 && i <= 4 && j >= 2 && j <= 4);
        m[rr][cc] = on ? 1 : 0; reserved[rr][cc] = true;
      }
    }
    finder(0, 0); finder(0, size - 7); finder(size - 7, 0);
    // timing patterns
    for (let i = 8; i < size - 8; i++){
      if (!reserved[6][i]) { m[6][i] = i % 2 === 0 ? 1 : 0; reserved[6][i] = true; }
      if (!reserved[i][6]) { m[i][6] = i % 2 === 0 ? 1 : 0; reserved[i][6] = true; }
    }
    // alignment pattern (versions >=2): center positions
    const alignPos = { 2:[6,18],3:[6,22],4:[6,26],5:[6,30],6:[6,34],
      7:[6,22,38],8:[6,24,42],9:[6,26,46],10:[6,28,50] };
    if (ver >= 2){
      const pos = alignPos[ver];
      for (const r of pos) for (const c of pos){
        if (reserved[r][c]) continue; // skip overlap with finders
        for (let i = -2; i <= 2; i++) for (let j = -2; j <= 2; j++){
          const on = Math.max(Math.abs(i), Math.abs(j)) !== 1;
          m[r + i][c + j] = on ? 1 : 0; reserved[r + i][c + j] = true;
        }
      }
    }
    // dark module
    m[size - 8][8] = 1; reserved[size - 8][8] = true;
    // reserve format info areas
    for (let i = 0; i < 9; i++){
      if (i !== 6){ reserved[8][i] = true; reserved[i][8] = true; }
    }
    for (let i = 0; i < 8; i++){ reserved[8][size - 1 - i] = true; reserved[size - 1 - i][8] = true; }
    return { m, reserved, size };
  }

  function placeData(mat, data){
    const { m, reserved, size } = mat;
    let bitIdx = 0;
    const totalBits = data.length * 8;
    const getBit = () => {
      if (bitIdx >= totalBits) return 0;
      const byte = data[bitIdx >> 3];
      const bit = (byte >> (7 - (bitIdx & 7))) & 1;
      bitIdx++; return bit;
    };
    let upward = true;
    for (let col = size - 1; col > 0; col -= 2){
      if (col === 6) col--; // skip timing column
      for (let i = 0; i < size; i++){
        const row = upward ? size - 1 - i : i;
        for (let c = 0; c < 2; c++){
          const cc = col - c;
          if (reserved[row][cc]) continue;
          m[row][cc] = getBit();
        }
      }
      upward = !upward;
    }
  }

  function applyMask(mat, maskNum){
    const { m, reserved, size } = mat;
    const masked = m.map(r => r.slice());
    const fn = [
      (r,c) => (r + c) % 2 === 0,
      (r,c) => r % 2 === 0,
      (r,c) => c % 3 === 0,
      (r,c) => (r + c) % 3 === 0,
      (r,c) => (Math.floor(r/2) + Math.floor(c/3)) % 2 === 0,
      (r,c) => (r*c)%2 + (r*c)%3 === 0,
      (r,c) => ((r*c)%2 + (r*c)%3) % 2 === 0,
      (r,c) => ((r+c)%2 + (r*c)%3) % 2 === 0
    ][maskNum];
    for (let r = 0; r < size; r++) for (let c = 0; c < size; c++)
      if (!reserved[r][c] && fn(r, c)) masked[r][c] ^= 1;
    return masked;
  }

  const FORMAT_EC_BITS = { L:0b01, M:0b00, Q:0b11, H:0b10 };
  function formatBits(level, mask){
    const data = (FORMAT_EC_BITS[level] << 3) | mask;
    let rem = data << 10;
    const g = 0b10100110111;
    for (let i = 14; i >= 10; i--) if ((rem >> i) & 1) rem ^= g << (i - 10);
    let bits = ((data << 10) | rem) ^ 0b101010000010010;
    return bits & 0x7fff;
  }

  function placeFormat(matrix, masked, level, mask){
    const { reserved, size } = matrix;
    const bits = formatBits(level, mask);
    const get = i => (bits >> i) & 1;
    // around top-left
    for (let i = 0; i <= 5; i++) masked[8][i] = get(i);
    masked[8][7] = get(6); masked[8][8] = get(7); masked[7][8] = get(8);
    for (let i = 9; i <= 14; i++) masked[14 - i][8] = get(i);
    // around top-right / bottom-left
    for (let i = 0; i <= 7; i++) masked[8][size - 1 - i] = get(i);
    for (let i = 8; i <= 14; i++) masked[size - 15 + i][8] = get(i);
    masked[size - 8][8] = 1; // dark module
  }

  function penalty(grid){
    const n = grid.length; let score = 0;
    // rule 1: runs >=5
    for (let r = 0; r < n; r++){
      let runC = 1, runR = 1;
      for (let c = 1; c < n; c++){
        if (grid[r][c] === grid[r][c-1]){ runC++; if (runC === 5) score += 3; else if (runC > 5) score++; } else runC = 1;
        if (grid[c][r] === grid[c-1][r]){ runR++; if (runR === 5) score += 3; else if (runR > 5) score++; } else runR = 1;
      }
    }
    // rule 2: 2x2 blocks
    for (let r = 0; r < n-1; r++) for (let c = 0; c < n-1; c++)
      if (grid[r][c] === grid[r+1][c] && grid[r][c] === grid[r][c+1] && grid[r][c] === grid[r+1][c+1]) score += 3;
    return score;
  }

  window.generateQR = function(text, level){
    const bytes = unescape(encodeURIComponent(text)).split('').map(c => c.charCodeAt(0));
    const ver = chooseVersion(level, bytes.length);
    if (!ver) throw new Error('Text too long (max ~ depends on level). Try shorter text or lower ECC.');
    const data = buildData(level, ver, bytes);
    const matrix = makeMatrix(ver);
    placeData(matrix, data);
    // pick best mask
    let best = null, bestScore = Infinity;
    for (let mask = 0; mask < 8; mask++){
      const masked = applyMask(matrix, mask);
      placeFormat(matrix, masked, level, mask);
      const s = penalty(masked);
      if (s < bestScore){ bestScore = s; best = masked; }
    }
    return best;
  };
})();

  const textEl = document.getElementById('text');
  const eccEl = document.getElementById('ecc');
  const canvas = document.getElementById('qr');
  const errEl = document.getElementById('err');
  const dlBtn = document.getElementById('dl');

  function render(){
    errEl.textContent = '';
    const text = textEl.value;
    if (!text){ canvas.width = 0; canvas.height = 0; return; }
    let grid;
    try { grid = window.generateQR(text, eccEl.value); }
    catch(e){ errEl.textContent = e.message; return; }
    const n = grid.length;
    const scale = Math.max(2, Math.floor(280 / n));
    const px = n * scale;
    canvas.width = px; canvas.height = px;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, px, px);
    ctx.fillStyle = '#0b1120';
    for (let r = 0; r < n; r++) for (let c = 0; c < n; c++)
      if (grid[r][c]) ctx.fillRect(c * scale, r * scale, scale, scale);
  }

  dlBtn.addEventListener('click', () => {
    if (!canvas.width) return;
    const a = document.createElement('a');
    a.download = 'qrcode.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  });

  textEl.addEventListener('input', render);
  eccEl.addEventListener('change', render);
  render();
</script>
</body>
</html>
