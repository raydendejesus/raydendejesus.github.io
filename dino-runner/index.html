<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dino Runner</title>
<style>
  :root { --accent: #38bdf8; }
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    color: #e2e8f0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
  .back { position: fixed; top: 16px; left: 16px; color: var(--accent); text-decoration: none; font-size: 14px; opacity: 0.8; }
  .back:hover { opacity: 1; }
  .card { background: #111827; border: 1px solid #1f2937; border-radius: 18px; padding: 24px;
    width: min(94vw, 560px); text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
  h1 { margin: 0 0 4px; font-size: 22px; }
  .sub { margin: 0 0 16px; color: #94a3b8; font-size: 13px; }
  .hud { display: flex; justify-content: space-between; font-size: 14px; color: #cbd5e1; margin-bottom: 10px; padding: 0 4px; }
  .hud b { color: var(--accent); }
  canvas { background: #0b1120; border: 1px solid #1f2937; border-radius: 12px; width: 100%; display: block; cursor: pointer; }
  .msg { margin-top: 14px; font-size: 15px; color: #94a3b8; min-height: 22px; }
  .row { display: flex; gap: 10px; justify-content: center; margin-top: 12px; }
  button { font-family: inherit; font-size: 15px; border-radius: 10px; border: 1px solid #1f2937; padding: 10px 16px; background: #0b1120; color: #e2e8f0; cursor: pointer; }
  button.start { background: var(--accent); color: #04293b; font-weight: 700; border: none; }
  button.start:hover { filter: brightness(1.1); }
  button:active { transform: scale(0.97); }
</style>
</head>
<body>
<a class="back" href="../">&larr; back</a>
<div class="card">
  <h1>🦖 Dino Runner</h1>
  <p class="sub">Space / Up / click to jump cacti. Down / S to duck under birds. It gets faster — go far!</p>
  <div class="hud"><span>Score: <b id="score">0</b></span><span>Best: <b id="best">0</b></span></div>
  <canvas id="game" width="540" height="260"></canvas>
  <div class="msg" id="msg">Press Start</div>
  <div class="row"><button class="start" id="startBtn">Start</button></div>
</div>
<script>
const canvas = document.getElementById('game'), ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height, GROUND = H - 40;
const scoreEl = document.getElementById('score'), bestEl = document.getElementById('best'),
  msgEl = document.getElementById('msg'), startBtn = document.getElementById('startBtn');
let best = 0;
let dino, obs, speed, score, ducking, running, raf, spawnTimer;
const DW = 30, DH = 40, DUCK_H = 22, JUMP = -11, GRAV = 0.6, DX = 60;

function start() {
  dino = { y: GROUND - DH, vy: 0, onGround: true };
  obs = []; speed = 5; score = 0; ducking = false; spawnTimer = 40;
  scoreEl.textContent = 0;
  running = true; msgEl.textContent = ''; startBtn.style.display = 'none';
  cancelAnimationFrame(raf); loop();
}
function gameOver() {
  running = false; cancelAnimationFrame(raf);
  if (score > best) { best = score; bestEl.textContent = best; }
  msgEl.textContent = '💀 Game Over — score ' + score;
  startBtn.textContent = 'Play Again'; startBtn.style.display = 'inline-block';
}
function jump() { if (running && dino.onGround) { dino.vy = JUMP; dino.onGround = false; } }
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.key.toLowerCase() === 'w') { jump(); e.preventDefault(); }
  if (e.code === 'ArrowDown' || e.key.toLowerCase() === 's') { ducking = true; e.preventDefault(); }
});
document.addEventListener('keyup', e => { if (e.code === 'ArrowDown' || e.key.toLowerCase() === 's') ducking = false; });
canvas.addEventListener('mousedown', jump);
canvas.addEventListener('touchstart', e => { jump(); e.preventDefault(); }, { passive: false });

function spawn() {
  if (Math.random() < 0.3 && score > 100) {
    // bird at duck height or jump height
    const high = Math.random() < 0.5;
    obs.push({ x: W + 20, y: high ? GROUND - 70 : GROUND - 34, w: 34, h: 20, type: 'bird', wing: 0 });
  } else {
    const big = Math.random() < 0.4;
    obs.push({ x: W + 20, y: GROUND - (big ? 44 : 30), w: big ? 26 : 18, h: big ? 44 : 30, type: 'cactus' });
  }
}
function update() {
  speed += 0.0025; score += 0.2; scoreEl.textContent = Math.floor(score);
  const h = ducking && dino.onGround ? DUCK_H : DH;
  dino.vy += GRAV; dino.y += dino.vy;
  if (dino.y >= GROUND - h) { dino.y = GROUND - h; dino.vy = 0; dino.onGround = true; }
  spawnTimer--;
  if (spawnTimer <= 0) { spawn(); spawnTimer = (60 + Math.random() * 50) * (5 / speed); }
  for (const o of obs) { o.x -= speed; if (o.type === 'bird') o.wing = (o.wing + 0.2) % 2; }
  obs = obs.filter(o => o.x > -40);
  const dh = ducking && dino.onGround ? DUCK_H : DH;
  const dy = dino.onGround ? GROUND - dh : dino.y;
  for (const o of obs) {
    if (DX + DW - 4 > o.x && DX + 4 < o.x + o.w && dy + dh > o.y + 2 && dy < o.y + o.h - 2) { gameOver(); return; }
  }
}
function draw() {
  ctx.fillStyle = '#0b1120'; ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = '#1f2937'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(0, GROUND); ctx.lineTo(W, GROUND); ctx.stroke();
  // dino
  const dh = ducking && dino.onGround ? DUCK_H : DH;
  const dy = dino.onGround ? GROUND - dh : dino.y;
  ctx.font = dh + 'px serif'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText(ducking && dino.onGround ? '🦎' : '🦖', DX, dy);
  // obstacles
  for (const o of obs) {
    if (o.type === 'cactus') { ctx.font = o.h + 'px serif'; ctx.fillText('🌵', o.x, o.y); }
    else { ctx.font = o.h + 4 + 'px serif'; ctx.fillText(o.wing < 1 ? '🐦' : '🕊️', o.x, o.y); }
  }
}
function loop() { if (!running) return; update(); if (!running) return; draw(); raf = requestAnimationFrame(loop); }
function idle() { dino = { y: GROUND - DH, vy: 0, onGround: true }; obs = []; draw(); }
startBtn.addEventListener('click', start);
idle();
</script>
</body>
</html>
