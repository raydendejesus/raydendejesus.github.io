<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Column Extractor</title>
<style>
  :root { --accent:#38bdf8; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; padding:24px;
    background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    color:#e2e8f0; font-family:system-ui, -apple-system, "Segoe UI", sans-serif; }
  a { color:var(--accent); text-decoration:none; }
  a:hover { text-decoration:underline; }
  h1 { font-size:1.4rem; margin:.4rem 0 1rem; }
  .panel { background:#111827; border:1px solid #1f2937; border-radius:14px; padding:16px; margin-bottom:16px; }
  textarea { width:100%; min-height:160px; resize:vertical; background:#0b1120; color:#e2e8f0;
    border:1px solid #1f2937; border-radius:10px; padding:10px; font-family:ui-monospace,Consolas,monospace; font-size:13px; }
  label { display:inline-flex; align-items:center; gap:6px; margin-right:16px; font-size:14px; }
  input, select { background:#0b1120; color:#e2e8f0; border:1px solid #1f2937; border-radius:8px; padding:6px; font-family:inherit; }
  input[type=text] { width:80px; }
  input#col { width:60px; }
  button { background:var(--accent); color:#06283d; border:none; border-radius:10px; padding:9px 16px; font-weight:600; cursor:pointer; font-size:14px; }
  button:hover { filter:brightness(1.08); }
  button.secondary { background:#1f2937; color:#e2e8f0; }
  .row { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin:12px 0; }
  .hint { font-size:12px; color:#94a3b8; }
</style>
</head>
<body>
  <a href="../">&larr; back</a>
  <h1>Column Extractor</h1>
  <div class="panel">
    <label>Delimiter
      <select id="delim">
        <option value=",">Comma</option>
        <option value="\t">Tab</option>
        <option value=" ">Space</option>
        <option value=";">Semicolon</option>
        <option value="|">Pipe</option>
        <option value="custom">Custom...</option>
      </select>
    </label>
    <label>Custom <input type="text" id="custom" placeholder="regex/char"></label>
    <label>Column # <input type="number" id="col" value="1" min="1"></label>
    <div class="hint">Columns are 1-based. Custom delimiter is treated as a regular expression.</div>
  </div>
  <div class="panel">
    <textarea id="input" placeholder="a,b,c&#10;1,2,3"></textarea>
    <div class="row">
      <button id="go">Extract column</button>
      <button class="secondary" id="clear">Clear</button>
    </div>
  </div>
  <div class="panel">
    <textarea id="output" placeholder="Result..." readonly></textarea>
    <div class="row"><button class="secondary" id="copy">Copy</button></div>
  </div>
<script>
  const $ = id => document.getElementById(id);
  function getDelim() {
    const v = $('delim').value;
    if (v === 'custom') return new RegExp($('custom').value || ',');
    if (v === '\\t') return /\t/;
    return new RegExp(v.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  }
  function run() {
    const re = getDelim();
    const idx = (parseInt($('col').value, 10) || 1) - 1;
    const out = $('input').value.split(/\r?\n/).map(line => {
      const parts = line.split(re);
      return idx < parts.length ? parts[idx] : '';
    });
    $('output').value = out.join('\n');
  }
  $('go').onclick = run;
  $('clear').onclick = () => { $('input').value=''; $('output').value=''; };
  $('copy').onclick = async () => {
    await navigator.clipboard.writeText($('output').value);
    const b=$('copy'); b.textContent='Copied!'; setTimeout(()=>b.textContent='Copy',1200);
  };
</script>
</body>
</html>
