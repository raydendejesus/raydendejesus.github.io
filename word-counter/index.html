<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Counter</title>
<style>
  :root{--accent:#38bdf8;}
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);color:#e2e8f0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;padding:24px;}
  a.back{color:var(--accent);text-decoration:none;}
  .wrap{max-width:820px;margin:0 auto;}
  h1{font-size:1.6rem;margin:.3em 0 .6em;}
  .panel{background:#111827;border:1px solid #1f2937;border-radius:14px;padding:18px;margin-bottom:16px;}
  textarea{width:100%;min-height:240px;background:#0b1120;color:#e2e8f0;border:1px solid #1f2937;border-radius:10px;padding:12px;font-size:1rem;resize:vertical;line-height:1.5;}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;}
  .stat{background:#0b1120;border:1px solid #1f2937;border-radius:12px;padding:14px;text-align:center;}
  .stat .num{font-size:1.8rem;font-weight:700;color:var(--accent);}
  .stat .lbl{font-size:.8rem;color:#94a3b8;margin-top:4px;}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="../">← back</a>
  <h1>Word Counter</h1>
  <div class="panel">
    <textarea id="txt" placeholder="Paste or type your text..."></textarea>
  </div>
  <div class="panel stats">
    <div class="stat"><div class="num" id="words">0</div><div class="lbl">Words</div></div>
    <div class="stat"><div class="num" id="chars">0</div><div class="lbl">Characters</div></div>
    <div class="stat"><div class="num" id="charsNoSp">0</div><div class="lbl">Chars (no spaces)</div></div>
    <div class="stat"><div class="num" id="sentences">0</div><div class="lbl">Sentences</div></div>
    <div class="stat"><div class="num" id="paras">0</div><div class="lbl">Paragraphs</div></div>
    <div class="stat"><div class="num" id="reading">0s</div><div class="lbl">Reading time</div></div>
  </div>
</div>
<script>
  const txt=document.getElementById('txt');
  function update(){
    const t=txt.value;
    const words=(t.match(/\S+/g)||[]).length;
    const chars=t.length;
    const charsNoSp=t.replace(/\s/g,'').length;
    const sentences=(t.match(/[^.!?]+[.!?]+/g)||[]).length || (t.trim()?(t.match(/[.!?]/g)?0:1):0);
    const paras=t.split(/\n\s*\n/).filter(p=>p.trim()).length;
    document.getElementById('words').textContent=words;
    document.getElementById('chars').textContent=chars;
    document.getElementById('charsNoSp').textContent=charsNoSp;
    document.getElementById('sentences').textContent=sentences;
    document.getElementById('paras').textContent=paras;
    const secs=Math.round(words/200*60);
    document.getElementById('reading').textContent=secs<60?secs+'s':Math.floor(secs/60)+'m '+(secs%60)+'s';
  }
  txt.addEventListener('input',update);
  update();
</script>
</body>
</html>
