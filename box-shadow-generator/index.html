<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Box Shadow Generator</title>
<style>
  :root{--accent:#38bdf8;}
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);color:#e2e8f0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;padding:24px;}
  a.back{color:var(--accent);text-decoration:none;}
  .wrap{max-width:820px;margin:0 auto;}
  h1{font-size:1.6rem;margin:.3em 0 .6em;}
  .panel{background:#111827;border:1px solid #1f2937;border-radius:14px;padding:18px;margin-bottom:16px;}
  #stage{display:flex;align-items:center;justify-content:center;height:240px;border-radius:14px;border:1px solid #1f2937;background:#0b1120;margin-bottom:16px;}
  #box{width:140px;height:140px;border-radius:14px;background:#1e293b;}
  .row{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
  .row label{width:90px;font-size:.85rem;color:#94a3b8;}
  .row input[type=range]{flex:1;accent-color:var(--accent);}
  .row .val{width:54px;text-align:right;color:#94a3b8;font-size:.9rem;}
  input[type=color]{width:46px;height:36px;border:none;background:none;cursor:pointer;}
  label.chk{display:flex;gap:8px;align-items:center;font-size:.9rem;color:#94a3b8;}
  button.act{background:var(--accent);color:#04222e;border:none;border-radius:10px;padding:10px 16px;font-weight:600;cursor:pointer;}
  button.act:hover{filter:brightness(1.1);}
  code{display:block;background:#0b1120;border:1px solid #1f2937;border-radius:10px;padding:12px;font-family:ui-monospace,monospace;font-size:.9rem;word-break:break-all;margin-bottom:12px;}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="../">← back</a>
  <h1>Box Shadow Generator</h1>
  <div id="stage"><div id="box"></div></div>
  <div class="panel">
    <div class="row"><label>Offset X</label><input type="range" id="x" min="-100" max="100" value="6"><span class="val" id="xv"></span></div>
    <div class="row"><label>Offset Y</label><input type="range" id="y" min="-100" max="100" value="8"><span class="val" id="yv"></span></div>
    <div class="row"><label>Blur</label><input type="range" id="blur" min="0" max="150" value="24"><span class="val" id="blurv"></span></div>
    <div class="row"><label>Spread</label><input type="range" id="spread" min="-60" max="60" value="0"><span class="val" id="spreadv"></span></div>
    <div class="row"><label>Opacity</label><input type="range" id="op" min="0" max="100" value="45"><span class="val" id="opv"></span></div>
    <div class="row"><label>Color</label><input type="color" id="color" value="#000000"><label class="chk"><input type="checkbox" id="inset"> Inset</label></div>
    <div class="row"><label>Box color</label><input type="color" id="bc" value="#1e293b"></div>
  </div>
  <div class="panel">
    <code id="css"></code>
    <button class="act" id="copy">Copy CSS</button>
  </div>
</div>
<script>
  const $=id=>document.getElementById(id);
  const ids=['x','y','blur','spread','op','color','inset','bc'];
  function hex2rgb(h){const n=parseInt(h.slice(1),16);return [n>>16&255,n>>8&255,n&255];}
  function update(){
    const x=$('x').value,y=$('y').value,blur=$('blur').value,spread=$('spread').value,op=$('op').value;
    $('xv').textContent=x+'px';$('yv').textContent=y+'px';$('blurv').textContent=blur+'px';$('spreadv').textContent=spread+'px';$('opv').textContent=op+'%';
    const [r,g,b]=hex2rgb($('color').value);
    const inset=$('inset').checked?'inset ':'';
    const val=`${inset}${x}px ${y}px ${blur}px ${spread}px rgba(${r}, ${g}, ${b}, ${(op/100).toFixed(2)})`;
    $('box').style.boxShadow=val;
    $('box').style.background=$('bc').value;
    $('css').textContent='box-shadow: '+val+';';
  }
  ids.forEach(i=>$(i).addEventListener('input',update));
  $('copy').addEventListener('click',()=>{navigator.clipboard.writeText($('css').textContent);const b=$('copy');b.textContent='Copied!';setTimeout(()=>b.textContent='Copy CSS',1200);});
  update();
</script>
</body>
</html>
