<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Picker</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#e2e8f0;
    background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px;}
  a.back{position:fixed;top:14px;left:16px;color:#38bdf8;text-decoration:none;font-size:14px;}
  a.back:hover{text-decoration:underline;}
  h1{margin:8px 0 14px;font-size:22px;}
  .layout{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;align-items:flex-start;}
  .panel{background:#111827;border:1px solid #1f2937;border-radius:16px;padding:18px;width:320px;}
  label{font-size:13px;color:#94a3b8;display:block;margin-bottom:6px;}
  textarea{width:100%;height:220px;background:#0b1120;border:1px solid #1f2937;border-radius:10px;padding:12px;color:#e2e8f0;font-size:14px;resize:vertical;line-height:1.6;}
  .opts{display:flex;align-items:center;gap:10px;margin:14px 0;font-size:14px;}
  input[type=number]{width:60px;background:#0b1120;border:1px solid #1f2937;border-radius:8px;padding:8px;color:#e2e8f0;}
  button{background:#38bdf8;color:#04222f;border:none;border-radius:10px;padding:11px 18px;font-weight:700;cursor:pointer;width:100%;}
  button.sec{background:#1f2937;color:#e2e8f0;margin-top:8px;}
  .teams{display:flex;flex-direction:column;gap:12px;min-width:300px;}
  .team{background:#0b1120;border:1px solid #1f2937;border-radius:12px;padding:14px;animation:pop .35s ease;}
  @keyframes pop{from{opacity:0;transform:translateY(10px) scale(.97);}to{opacity:1;transform:none;}}
  .team h3{font-size:15px;margin-bottom:8px;}
  .team li{list-style:none;padding:4px 0;border-bottom:1px solid #131c2e;font-size:14px;}
  .team li:last-child{border:none;}
  .count{color:#64748b;font-size:13px;margin-bottom:10px;}
  .empty{color:#64748b;font-size:14px;}
</style>
</head>
<body>
<a class="back" href="../">← back</a>
<h1>Random Team Picker</h1>
<div class="layout">
  <div class="panel">
    <label>Names (one per line)</label>
    <textarea id="names">Alice
Bob
Carol
Dave
Eve
Frank
Grace
Heidi</textarea>
    <div class="opts">
      <label style="margin:0">Number of teams</label>
      <input type="number" id="num" min="2" max="12" value="2">
    </div>
    <button id="shuffle">🎲 Shuffle Into Teams</button>
    <button class="sec" id="pickone">🎯 Pick One Winner</button>
  </div>
  <div class="teams" id="teams"><div class="empty">Enter names and click shuffle.</div></div>
</div>
<script>
const COLORS=['#38bdf8','#f87171','#fbbf24','#34d399','#a78bfa','#f472b6','#fb923c','#22d3ee','#4ade80','#e879f9','#facc15','#94a3b8'];
function getNames(){return document.getElementById('names').value.split('\n').map(s=>s.trim()).filter(Boolean);}
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
document.getElementById('shuffle').onclick=()=>{
  const names=shuffle(getNames());const n=Math.max(2,Math.min(12,+document.getElementById('num').value||2));
  const teams=document.getElementById('teams');teams.innerHTML='';
  if(names.length<n){teams.innerHTML='<div class="empty">Need at least as many names as teams.</div>';return;}
  const buckets=Array.from({length:n},()=>[]);
  names.forEach((name,i)=>buckets[i%n].push(name));
  buckets.forEach((b,i)=>{
    const div=document.createElement('div');div.className='team';div.style.borderColor=COLORS[i%COLORS.length];
    div.style.animationDelay=(i*0.06)+'s';
    div.innerHTML='<h3 style="color:'+COLORS[i%COLORS.length]+'">Team '+(i+1)+'</h3><div class="count">'+b.length+' member'+(b.length===1?'':'s')+'</div><ul>'+
      b.map(m=>'<li>'+escapeHtml(m)+'</li>').join('')+'</ul>';
    teams.appendChild(div);
  });
};
document.getElementById('pickone').onclick=()=>{
  const names=getNames();const teams=document.getElementById('teams');
  if(!names.length){teams.innerHTML='<div class="empty">Enter some names first.</div>';return;}
  teams.innerHTML='<div class="team" style="border-color:#fbbf24"><div class="count">spinning...</div><h3 id="spin" style="color:#fbbf24;font-size:24px"> </h3></div>';
  const spin=document.getElementById('spin');let ticks=0;const total=22+Math.floor(Math.random()*10);
  const iv=setInterval(()=>{spin.textContent=names[Math.floor(Math.random()*names.length)];ticks++;
    if(ticks>=total){clearInterval(iv);const w=names[Math.floor(Math.random()*names.length)];
      teams.innerHTML='<div class="team" style="border-color:#fbbf24"><h3 style="color:#fbbf24">🏆 Winner</h3><div style="font-size:26px;font-weight:700;padding:8px 0">'+escapeHtml(w)+'</div></div>';}
  },60);
};
function escapeHtml(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
</script>
</body>
</html>
