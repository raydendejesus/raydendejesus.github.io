<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Button Styler</title>
<style>
  :root { --accent: #38bdf8; }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 24px;
    background: radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    color: #e2e8f0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    min-height: 100vh;
  }
  a { color: var(--accent); text-decoration: none; }
  h1 { font-size: 1.4rem; margin: 8px 0 20px; }
  .wrap { max-width: 1000px; margin: 0 auto; }
  .row { display: grid; grid-template-columns: 320px 1fr; gap: 20px; align-items: start; }
  .panel { background: #111827; border: 1px solid #1f2937; border-radius: 14px; padding: 18px; }
  label { display: block; font-size: .85rem; margin: 12px 0 6px; color: #94a3b8; }
  .val { float: right; color: var(--accent); }
  input[type=range] { width: 100%; accent-color: var(--accent); }
  input[type=color] { width: 100%; height: 34px; border: none; background: none; }
  input[type=text] { width: 100%; background:#0b1120; border:1px solid #1f2937; color:#e2e8f0; border-radius:8px; padding:8px; }
  .two { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .stage { min-height: 240px; display: flex; align-items: center; justify-content: center; background:#0b1120; border-radius:10px; }
  pre { background: #0b1120; border: 1px solid #1f2937; border-radius: 10px; padding: 14px; font-size: .85rem; margin-top: 14px; overflow-x:auto; white-space:pre-wrap; }
  .copybtn { background: var(--accent); color: #0b1120; border: none; font-weight: 600; padding: 10px 16px; border-radius: 8px; cursor: pointer; margin-top: 10px; }
  .copybtn:hover { filter: brightness(1.1); }
</style>
</head>
<body>
<div class="wrap">
  <a href="../">&larr; back</a>
  <h1>Button Styler</h1>
  <div class="row">
    <div class="panel">
      <label>Label</label>
      <input type="text" id="text" value="Click me">
      <div class="two">
        <div><label>Background</label><input type="color" id="bg" value="#38bdf8"></div>
        <div><label>Text color</label><input type="color" id="fg" value="#0b1120"></div>
      </div>
      <div class="two">
        <div><label>Hover bg</label><input type="color" id="hbg" value="#0ea5e9"></div>
        <div><label>Hover text</label><input type="color" id="hfg" value="#ffffff"></div>
      </div>
      <label>Padding Y (px) <span class="val" id="pyV">12</span></label>
      <input type="range" id="py" min="0" max="40" value="12">
      <label>Padding X (px) <span class="val" id="pxV">24</span></label>
      <input type="range" id="px" min="0" max="60" value="24">
      <label>Border radius (px) <span class="val" id="radV">10</span></label>
      <input type="range" id="rad" min="0" max="50" value="10">
      <label>Font size (px) <span class="val" id="fsV">16</span></label>
      <input type="range" id="fs" min="10" max="32" value="16">
      <label>Font weight <span class="val" id="fwV">600</span></label>
      <input type="range" id="fw" min="300" max="800" step="100" value="600">
      <label>Border width (px) <span class="val" id="bwV">0</span></label>
      <input type="range" id="bw" min="0" max="8" value="0">
      <label>Border color</label>
      <input type="color" id="bc" value="#38bdf8">
      <label>Shadow strength <span class="val" id="shV">0.3</span></label>
      <input type="range" id="sh" min="0" max="1" step="0.05" value="0.3">
    </div>
    <div>
      <div class="panel"><div class="stage"><button id="btn">Click me</button></div></div>
      <pre id="css"></pre>
      <button class="copybtn" id="copy">Copy CSS</button>
    </div>
  </div>
</div>
<style id="dyn"></style>
<script>
  const $ = id => document.getElementById(id);
  const ids = ['text','bg','fg','hbg','hfg','py','px','rad','fs','fw','bw','bc','sh'];
  function render(){
    ['py','px','rad','fs','fw','bw','sh'].forEach(k=>$(k+'V').textContent=$(k).value);
    const v = id => $(id).value;
    $('btn').textContent = v('text');
    const css = `.btn {
  background: ${v('bg')};
  color: ${v('fg')};
  padding: ${v('py')}px ${v('px')}px;
  border: ${v('bw')}px solid ${v('bc')};
  border-radius: ${v('rad')}px;
  font-size: ${v('fs')}px;
  font-weight: ${v('fw')};
  font-family: inherit;
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(0, 0, 0, ${v('sh')});
  transition: all 0.2s ease;
}
.btn:hover {
  background: ${v('hbg')};
  color: ${v('hfg')};
  transform: translateY(-2px);
}`;
    $('css').textContent = css;
    $('dyn').textContent = css.replace(/\.btn/g, '#btn');
  }
  ids.forEach(i=>$(i).addEventListener('input',render));
  $('copy').addEventListener('click',()=>navigator.clipboard.writeText($('css').textContent).then(()=>{const b=$('copy'),t=b.textContent;b.textContent='Copied!';setTimeout(()=>b.textContent=t,1200);}));
  render();
</script>
</body>
</html>
