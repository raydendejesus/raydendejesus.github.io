<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Add Line Numbers</title>
<style>
  :root { --accent:#38bdf8; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; padding:24px;
    background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    color:#e2e8f0; font-family:system-ui, -apple-system, "Segoe UI", sans-serif; }
  a { color:var(--accent); text-decoration:none; }
  a:hover { text-decoration:underline; }
  h1 { font-size:1.4rem; margin:.4rem 0 1rem; }
  .panel { background:#111827; border:1px solid #1f2937; border-radius:14px; padding:16px; margin-bottom:16px; }
  textarea { width:100%; min-height:180px; resize:vertical; background:#0b1120; color:#e2e8f0;
    border:1px solid #1f2937; border-radius:10px; padding:10px; font-family:ui-monospace,Consolas,monospace; font-size:13px; }
  label { display:inline-flex; align-items:center; gap:6px; margin-right:16px; font-size:14px; }
  input[type=number], input[type=text] { background:#0b1120; color:#e2e8f0; border:1px solid #1f2937; border-radius:8px; padding:6px; width:90px; font-family:inherit; }
  input[type=text] { width:140px; font-family:ui-monospace,Consolas,monospace; }
  button { background:var(--accent); color:#06283d; border:none; border-radius:10px; padding:9px 16px; font-weight:600; cursor:pointer; font-size:14px; }
  button:hover { filter:brightness(1.08); }
  button.secondary { background:#1f2937; color:#e2e8f0; }
  .row { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin:12px 0; }
  .hint { font-size:12px; color:#94a3b8; }
</style>
</head>
<body>
  <a href="../">&larr; back</a>
  <h1>Add Line Numbers</h1>
  <div class="panel">
    <label>Start at <input type="number" id="start" value="1"></label>
    <label>Step <input type="number" id="step" value="1"></label>
    <label><input type="checkbox" id="pad" checked> Pad numbers</label>
    <div style="margin-top:10px">
      <label>Format <input type="text" id="format" value="{n}. {line}"></label>
      <div class="hint">Use <code>{n}</code> for the number and <code>{line}</code> for the line content.</div>
    </div>
  </div>
  <div class="panel">
    <textarea id="input" placeholder="Paste lines..."></textarea>
    <div class="row">
      <button id="go">Number lines</button>
      <button class="secondary" id="clear">Clear</button>
    </div>
  </div>
  <div class="panel">
    <textarea id="output" placeholder="Result..." readonly></textarea>
    <div class="row"><button class="secondary" id="copy">Copy</button></div>
  </div>
<script>
  const $ = id => document.getElementById(id);
  function run() {
    const lines = $('input').value.split(/\r?\n/);
    const start = parseInt($('start').value, 10) || 0;
    const step = parseInt($('step').value, 10) || 1;
    const fmt = $('format').value || '{n}. {line}';
    const pad = $('pad').checked;
    const nums = lines.map((_, i) => start + i * step);
    const width = pad ? Math.max(1, ...nums.map(n => String(n).length)) : 0;
    const out = lines.map((line, i) => {
      let n = String(nums[i]);
      if (pad) n = n.padStart(width, ' ');
      return fmt.replace(/\{n\}/g, n).replace(/\{line\}/g, line);
    });
    $('output').value = out.join('\n');
  }
  $('go').onclick = run;
  $('clear').onclick = () => { $('input').value=''; $('output').value=''; };
  $('copy').onclick = async () => {
    await navigator.clipboard.writeText($('output').value);
    const b=$('copy'); b.textContent='Copied!'; setTimeout(()=>b.textContent='Copy',1200);
  };
</script>
</body>
</html>
