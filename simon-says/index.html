<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simon Says</title>
<style>
  body{margin:0;min-height:100vh;background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);color:#e2e8f0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;display:flex;flex-direction:column;align-items:center;padding:20px;}
  a.back{position:fixed;top:16px;left:16px;color:#38bdf8;text-decoration:none;}
  a.back:hover{text-decoration:underline;}
  h1{margin:8px 0;}
  .panel{background:#111827;border:1px solid #1f2937;border-radius:18px;padding:24px;display:flex;flex-direction:column;align-items:center;}
  .board{display:grid;grid-template-columns:repeat(2,120px);gap:14px;}
  .pad{width:120px;height:120px;border-radius:18px;cursor:pointer;opacity:.55;transition:opacity .1s,transform .1s;border:2px solid rgba(255,255,255,.1);}
  .pad.lit{opacity:1;transform:scale(1.04);box-shadow:0 0 30px currentColor;}
  #g{background:#22c55e;color:#22c55e;}
  #r{background:#ef4444;color:#ef4444;}
  #y{background:#eab308;color:#eab308;}
  #b{background:#3b82f6;color:#3b82f6;}
  .info{margin-top:18px;display:flex;gap:18px;align-items:center;}
  .info b{color:#38bdf8;font-size:22px;}
  #msg{margin-top:12px;min-height:24px;font-weight:600;}
  button{background:#0b1120;color:#e2e8f0;border:1px solid #1f2937;border-radius:10px;padding:10px 18px;font:inherit;cursor:pointer;margin-top:14px;}
  button:hover{border-color:#38bdf8;}
</style>
</head>
<body>
<a class="back" href="../">← back</a>
<h1>Simon Says</h1>
<div class="panel">
  <div class="board">
    <div class="pad" id="g" data-i="0"></div>
    <div class="pad" id="r" data-i="1"></div>
    <div class="pad" id="y" data-i="2"></div>
    <div class="pad" id="b" data-i="3"></div>
  </div>
  <div class="info">Score: <b id="score">0</b> &nbsp; Best: <b id="best">0</b></div>
  <div id="msg">Press Start</div>
  <button id="start">Start</button>
</div>
<script>
const pads=[...document.querySelectorAll('.pad')];
const FREQ=[329.63,440,277.18,164.81];
const scoreEl=document.getElementById('score'),bestEl=document.getElementById('best'),msgEl=document.getElementById('msg');
let seq=[],input=[],playing=false,accepting=false,best=0,ac;
function beep(i,dur=320){
  ac=ac||new(window.AudioContext||window.webkitAudioContext)();
  const o=ac.createOscillator(),g=ac.createGain();
  o.frequency.value=FREQ[i];o.type='sine';
  o.connect(g);g.connect(ac.destination);
  g.gain.setValueAtTime(.0001,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(.3,ac.currentTime+.02);
  g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+dur/1000);
  o.start();o.stop(ac.currentTime+dur/1000);
}
function light(i,dur=320){
  pads[i].classList.add('lit');beep(i,dur);
  setTimeout(()=>pads[i].classList.remove('lit'),dur-40);
}
function failBeep(){
  ac=ac||new(window.AudioContext||window.webkitAudioContext)();
  const o=ac.createOscillator(),g=ac.createGain();
  o.frequency.value=110;o.type='sawtooth';o.connect(g);g.connect(ac.destination);
  g.gain.setValueAtTime(.3,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+.6);
  o.start();o.stop(ac.currentTime+.6);
}
function start(){
  seq=[];input=[];playing=true;scoreEl.textContent='0';
  msgEl.textContent='Watch...';msgEl.style.color='#e2e8f0';
  nextRound();
}
function nextRound(){
  input=[];accepting=false;
  seq.push(Math.floor(Math.random()*4));
  scoreEl.textContent=seq.length-1;
  msgEl.textContent='Watch the sequence';
  let i=0;
  const iv=setInterval(()=>{
    light(seq[i]);i++;
    if(i>=seq.length){clearInterval(iv);setTimeout(()=>{accepting=true;msgEl.textContent='Your turn';},500);}
  },650);
}
function handle(i){
  if(!accepting||!playing)return;
  light(i,250);input.push(i);
  const idx=input.length-1;
  if(input[idx]!==seq[idx]){fail();return;}
  if(input.length===seq.length){
    accepting=false;scoreEl.textContent=seq.length;
    best=Math.max(best,seq.length);bestEl.textContent=best;
    msgEl.textContent='Nice! ✓';msgEl.style.color='#34d399';
    setTimeout(nextRound,900);
  }
}
function fail(){
  playing=false;accepting=false;failBeep();
  msgEl.textContent='✗ Wrong! Score: '+(seq.length-1);msgEl.style.color='#f87171';
}
pads.forEach(p=>p.addEventListener('click',()=>handle(+p.dataset.i)));
document.getElementById('start').addEventListener('click',start);
</script>
</body>
</html>
