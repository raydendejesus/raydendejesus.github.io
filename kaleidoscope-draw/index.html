<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaleidoscope Draw</title>
<style>
  :root { --accent: #38bdf8; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; }
  body {
    background: radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    color: #e2e8f0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    display: flex; align-items: center; justify-content: center;
  }
  .back { position: fixed; top: 16px; left: 16px; color: var(--accent);
    text-decoration: none; font-size: 14px; opacity: 0.8; z-index: 10; }
  .back:hover { opacity: 1; }
  canvas { background: #0b1120; border: 1px solid #1f2937; border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5); touch-action: none; cursor: crosshair; }
  .panel { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(17,24,39,0.85); border: 1px solid #1f2937; border-radius: 14px;
    padding: 12px 16px; display: flex; gap: 14px; align-items: center; flex-wrap: wrap;
    backdrop-filter: blur(6px); z-index: 10; font-size: 13px; color: #cbd5e1; }
  .panel label { display: flex; align-items: center; gap: 6px; }
  input[type=range] { accent-color: var(--accent); width: 90px; }
  button { font-family: inherit; font-size: 13px; border-radius: 9px; border: 1px solid #1f2937;
    padding: 7px 12px; background: #0b1120; color: #e2e8f0; cursor: pointer; }
  button:hover { border-color: var(--accent); }
  button.on { background: var(--accent); color: #04293b; font-weight: 700; border-color: var(--accent); }
  .hint { position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    color: #94a3b8; font-size: 13px; z-index: 10; pointer-events: none; }
</style>
</head>
<body>
<a class="back" href="../">&larr; back</a>
<div class="hint">Drag on the canvas to paint symmetric art ✨</div>
<canvas id="c" width="640" height="640"></canvas>
<div class="panel">
  <label>Symmetry <input id="sym" type="range" min="2" max="24" value="8"><b id="symv">8</b></label>
  <label>Brush <input id="size" type="range" min="1" max="20" value="4"></label>
  <button id="rainbow" class="on">Rainbow: ON</button>
  <button id="mirror" class="on">Mirror: ON</button>
  <button id="save">Save PNG</button>
  <button id="clear">Clear</button>
</div>
<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2;

  const symEl = document.getElementById('sym');
  const symvEl = document.getElementById('symv');
  const sizeEl = document.getElementById('size');
  const rainbowBtn = document.getElementById('rainbow');
  const mirrorBtn = document.getElementById('mirror');
  const saveBtn = document.getElementById('save');
  const clearBtn = document.getElementById('clear');

  // responsive sizing
  function fit(){
    const s = Math.min(innerWidth - 32, innerHeight - 120, 680);
    canvas.style.width = s + 'px'; canvas.style.height = s + 'px';
  }
  addEventListener('resize', fit); fit();

  let drawing = false, last = null, hue = 200, rainbow = true, mirror = true;

  function bg(){ ctx.fillStyle = '#0b1120'; ctx.fillRect(0, 0, W, H); }
  bg();

  function pos(e){
    const r = canvas.getBoundingClientRect();
    const p = e.touches ? e.touches[0] : e;
    return { x: (p.clientX - r.left) * (W / r.width), y: (p.clientY - r.top) * (H / r.height) };
  }

  function paint(from, to){
    const sym = +symEl.value;
    const size = +sizeEl.value;
    const color = rainbow ? 'hsl(' + (hue % 360) + ',90%,60%)' : '#38bdf8';
    ctx.strokeStyle = color;
    ctx.lineWidth = size;
    ctx.lineCap = 'round';
    ctx.globalCompositeOperation = 'lighter';

    const fx = from.x - cx, fy = from.y - cy;
    const tx = to.x - cx, ty = to.y - cy;
    for (let i = 0; i < sym; i++){
      const a = (i / sym) * Math.PI * 2;
      const cos = Math.cos(a), sin = Math.sin(a);
      const r1 = { x: fx * cos - fy * sin, y: fx * sin + fy * cos };
      const r2 = { x: tx * cos - ty * sin, y: tx * sin + ty * cos };
      seg(r1, r2);
      if (mirror){
        seg({ x: -r1.x, y: r1.y }, { x: -r2.x, y: r2.y });
      }
    }
    ctx.globalCompositeOperation = 'source-over';
    if (rainbow) hue += 1.5;
  }
  function seg(a, b){
    ctx.beginPath();
    ctx.moveTo(cx + a.x, cy + a.y);
    ctx.lineTo(cx + b.x, cy + b.y);
    ctx.stroke();
  }

  function down(e){ drawing = true; last = pos(e); e.preventDefault(); }
  function move(e){
    if (!drawing) return;
    const p = pos(e);
    paint(last, p);
    last = p;
    e.preventDefault();
  }
  function up(){ drawing = false; last = null; }

  canvas.addEventListener('mousedown', down);
  canvas.addEventListener('mousemove', move);
  addEventListener('mouseup', up);
  canvas.addEventListener('touchstart', down, { passive: false });
  canvas.addEventListener('touchmove', move, { passive: false });
  addEventListener('touchend', up);

  symEl.addEventListener('input', () => symvEl.textContent = symEl.value);
  rainbowBtn.addEventListener('click', () => {
    rainbow = !rainbow;
    rainbowBtn.textContent = 'Rainbow: ' + (rainbow ? 'ON' : 'OFF');
    rainbowBtn.classList.toggle('on', rainbow);
  });
  mirrorBtn.addEventListener('click', () => {
    mirror = !mirror;
    mirrorBtn.textContent = 'Mirror: ' + (mirror ? 'ON' : 'OFF');
    mirrorBtn.classList.toggle('on', mirror);
  });
  clearBtn.addEventListener('click', bg);
  saveBtn.addEventListener('click', () => {
    const a = document.createElement('a');
    a.download = 'kaleidoscope.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  });
</script>
</body>
</html>
