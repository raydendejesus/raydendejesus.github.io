<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Placeholder Image Generator</title>
<style>
  :root { --accent:#38bdf8; }
  * { box-sizing:border-box; }
  body { margin:0; padding:24px; background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120); color:#e2e8f0; font-family:system-ui,-apple-system,"Segoe UI",sans-serif; min-height:100vh; }
  a.back { color:var(--accent); text-decoration:none; font-size:14px; }
  a.back:hover { text-decoration:underline; }
  h1 { font-size:24px; margin:12px 0 4px; }
  p.sub { color:#94a3b8; margin:0 0 20px; }
  .wrap { max-width:1000px; margin:0 auto; display:grid; grid-template-columns:320px 1fr; gap:18px; align-items:start; }
  @media(max-width:740px){ .wrap{ grid-template-columns:1fr; } }
  .head { grid-column:1/-1; }
  .panel { background:#111827; border:1px solid #1f2937; border-radius:14px; padding:18px; }
  label { display:block; font-size:13px; color:#94a3b8; margin:12px 0 5px; }
  label:first-child { margin-top:0; }
  input[type=number],input[type=text],select { width:100%; background:#0b1120; color:#e2e8f0; border:1px solid #1f2937; border-radius:8px; padding:8px 10px; font-size:14px; }
  input[type=color] { width:100%; height:38px; background:#0b1120; border:1px solid #1f2937; border-radius:8px; padding:2px; }
  .two { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .preview { display:flex; align-items:center; justify-content:center; background:#0b1120; border:1px solid #1f2937; border-radius:8px; padding:16px; min-height:240px; overflow:auto; }
  canvas { max-width:100%; height:auto; image-rendering:auto; }
  button { background:var(--accent); color:#04263a; border:none; border-radius:10px; padding:10px 16px; font-weight:600; cursor:pointer; font-size:14px; margin-top:14px; width:100%; }
  button.ghost { background:transparent; color:var(--accent); border:1px solid var(--accent); }
  button:active { transform:translateY(1px); }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <a class="back" href="../">&larr; back</a>
    <h1>Placeholder Image Generator</h1>
    <p class="sub">Pick size, colors, and text; download a PNG or SVG.</p>
  </div>
  <div class="panel">
    <div class="two">
      <div><label>Width</label><input type="number" id="w" value="600" min="1" max="4000"></div>
      <div><label>Height</label><input type="number" id="h" value="400" min="1" max="4000"></div>
    </div>
    <div class="two">
      <div><label>Background</label><input type="color" id="bg" value="#1f2937"></div>
      <div><label>Text color</label><input type="color" id="fg" value="#38bdf8"></div>
    </div>
    <label>Text (blank = WxH)</label>
    <input type="text" id="text" placeholder="600 x 400">
    <label>Font size</label>
    <input type="number" id="fs" value="48" min="6" max="400">
    <button id="dlPng">Download PNG</button>
    <button class="ghost" id="dlSvg">Download SVG</button>
  </div>
  <div class="panel">
    <div class="preview"><canvas id="cv"></canvas></div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
function vals(){
  const w=Math.max(1,Math.min(4000,+$('w').value||1));
  const h=Math.max(1,Math.min(4000,+$('h').value||1));
  const txt=$('text').value || `${w} x ${h}`;
  return { w,h, bg:$('bg').value, fg:$('fg').value, txt, fs:Math.max(6,+$('fs').value||48) };
}
function draw(){
  const {w,h,bg,fg,txt,fs}=vals();
  const cv=$('cv'); cv.width=w; cv.height=h;
  const ctx=cv.getContext('2d');
  ctx.fillStyle=bg; ctx.fillRect(0,0,w,h);
  ctx.fillStyle=fg; ctx.font=`bold ${fs}px system-ui, sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(txt, w/2, h/2);
}
['w','h','bg','fg','text','fs'].forEach(id=>{ $(id).addEventListener('input',draw); });
$('dlPng').addEventListener('click',()=>{
  draw();
  const a=document.createElement('a');
  a.href=$('cv').toDataURL('image/png');
  a.download=`placeholder-${$('cv').width}x${$('cv').height}.png`; a.click();
});
$('dlSvg').addEventListener('click',()=>{
  const {w,h,bg,fg,txt,fs}=vals();
  const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><rect width="100%" height="100%" fill="${bg}"/><text x="50%" y="50%" font-family="system-ui, sans-serif" font-weight="bold" font-size="${fs}" fill="${fg}" text-anchor="middle" dominant-baseline="central">${esc(txt)}</text></svg>`;
  const blob=new Blob([svg],{type:'image/svg+xml'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=`placeholder-${w}x${h}.svg`; a.click();
  URL.revokeObjectURL(a.href);
});
draw();
</script>
</body>
</html>
