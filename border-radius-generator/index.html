<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Border Radius Generator</title>
<style>
  :root{--accent:#38bdf8;}
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);color:#e2e8f0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;padding:24px;}
  a.back{color:var(--accent);text-decoration:none;}
  .wrap{max-width:820px;margin:0 auto;}
  h1{font-size:1.6rem;margin:.3em 0 .6em;}
  .panel{background:#111827;border:1px solid #1f2937;border-radius:14px;padding:18px;margin-bottom:16px;}
  #stage{display:flex;align-items:center;justify-content:center;height:260px;border-radius:14px;border:1px solid #1f2937;background:#0b1120;margin-bottom:16px;}
  #box{width:180px;height:180px;background:linear-gradient(135deg,#38bdf8,#a855f7);}
  .row{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
  .row label{width:130px;font-size:.85rem;color:#94a3b8;}
  .row input[type=range]{flex:1;accent-color:var(--accent);}
  .row .val{width:54px;text-align:right;color:#94a3b8;font-size:.9rem;}
  button.act{background:var(--accent);color:#04222e;border:none;border-radius:10px;padding:10px 16px;font-weight:600;cursor:pointer;}
  button.act:hover{filter:brightness(1.1);}
  code{display:block;background:#0b1120;border:1px solid #1f2937;border-radius:10px;padding:12px;font-family:ui-monospace,monospace;font-size:.9rem;word-break:break-all;margin-bottom:12px;}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="../">← back</a>
  <h1>Border Radius Generator</h1>
  <div id="stage"><div id="box"></div></div>
  <div class="panel">
    <div class="row"><label>Top Left</label><input type="range" id="tl" min="0" max="100" value="20"><span class="val" id="tlv"></span></div>
    <div class="row"><label>Top Right</label><input type="range" id="tr" min="0" max="100" value="20"><span class="val" id="trv"></span></div>
    <div class="row"><label>Bottom Right</label><input type="range" id="br" min="0" max="100" value="20"><span class="val" id="brv"></span></div>
    <div class="row"><label>Bottom Left</label><input type="range" id="bl" min="0" max="100" value="20"><span class="val" id="blv"></span></div>
  </div>
  <div class="panel">
    <code id="css"></code>
    <button class="act" id="copy">Copy CSS</button>
  </div>
</div>
<script>
  const $=id=>document.getElementById(id);
  const c=['tl','tr','br','bl'];
  function update(){
    c.forEach(k=>$(k+'v').textContent=$(k).value+'%');
    const val=`${$('tl').value}% ${$('tr').value}% ${$('br').value}% ${$('bl').value}%`;
    $('box').style.borderRadius=val;
    $('css').textContent='border-radius: '+val+';';
  }
  c.forEach(k=>$(k).addEventListener('input',update));
  $('copy').addEventListener('click',()=>{navigator.clipboard.writeText($('css').textContent);const b=$('copy');b.textContent='Copied!';setTimeout(()=>b.textContent='Copy CSS',1200);});
  update();
</script>
</body>
</html>
