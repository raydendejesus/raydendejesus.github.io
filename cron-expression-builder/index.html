<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cron Expression Builder</title>
<style>
  :root { --accent:#38bdf8; }
  * { box-sizing:border-box; }
  body { margin:0; padding:24px; background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120); color:#e2e8f0; font-family:system-ui,-apple-system,"Segoe UI",sans-serif; min-height:100vh; }
  a.back { color:var(--accent); text-decoration:none; font-size:14px; }
  a.back:hover { text-decoration:underline; }
  h1 { font-size:24px; margin:12px 0 4px; }
  p.sub { color:#94a3b8; margin:0 0 20px; }
  .wrap { max-width:820px; margin:0 auto; }
  .panel { background:#111827; border:1px solid #1f2937; border-radius:14px; padding:18px; margin-bottom:18px; }
  .grid { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; }
  @media(max-width:680px){ .grid{ grid-template-columns:1fr 1fr; } }
  .grid > div > label { display:block; font-size:12px; color:#94a3b8; margin-bottom:5px; text-transform:uppercase; letter-spacing:.04em; }
  input[type=text] { width:100%; background:#0b1120; color:#e2e8f0; border:1px solid #1f2937; border-radius:6px; padding:8px 10px; font-size:15px; font-family:ui-monospace,monospace; text-align:center; }
  .hint { font-size:11px; color:#64748b; margin-top:4px; }
  .cron { font-family:ui-monospace,monospace; font-size:26px; color:var(--accent); text-align:center; padding:14px; background:#0b1120; border:1px solid #1f2937; border-radius:8px; letter-spacing:.08em; }
  .desc { margin-top:14px; font-size:15px; color:#cbd5e1; }
  button { background:var(--accent); color:#04263a; border:none; border-radius:10px; padding:10px 16px; font-weight:600; cursor:pointer; font-size:14px; margin-top:14px; }
  button:active { transform:translateY(1px); }
  .presets { display:flex; gap:8px; flex-wrap:wrap; margin-top:14px; }
  .presets button { background:transparent; color:var(--accent); border:1px solid #1f2937; margin:0; padding:6px 12px; font-weight:500; font-size:13px; }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="../">&larr; back</a>
  <h1>Cron Expression Builder</h1>
  <p class="sub">Edit each field; get the cron string plus a plain-English description.</p>
  <div class="panel">
    <div class="grid">
      <div><label>Minute</label><input type="text" id="min" value="*"><div class="hint">0-59</div></div>
      <div><label>Hour</label><input type="text" id="hour" value="*"><div class="hint">0-23</div></div>
      <div><label>Day (month)</label><input type="text" id="dom" value="*"><div class="hint">1-31</div></div>
      <div><label>Month</label><input type="text" id="month" value="*"><div class="hint">1-12</div></div>
      <div><label>Day (week)</label><input type="text" id="dow" value="*"><div class="hint">0-6 (Sun=0)</div></div>
    </div>
    <div class="presets">
      <button data-c="* * * * *">Every minute</button>
      <button data-c="0 * * * *">Hourly</button>
      <button data-c="0 0 * * *">Daily midnight</button>
      <button data-c="0 9 * * 1-5">Weekdays 9am</button>
      <button data-c="0 0 1 * *">Monthly</button>
      <button data-c="*/15 * * * *">Every 15 min</button>
    </div>
  </div>
  <div class="panel">
    <div class="cron" id="cron">* * * * *</div>
    <div class="desc" id="desc"></div>
    <button id="copyBtn">Copy</button>
  </div>
</div>
<script>
const ids=['min','hour','dom','month','dow'];
const MONTHS=['','January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
function pad(n){ return String(n).padStart(2,'0'); }
function fieldDesc(val, type){
  // returns descriptive phrase or null for '*'
  if(val==='*') return null;
  const stepMatch=val.match(/^\*\/(\d+)$/);
  if(stepMatch){ return `every ${stepMatch[1]} ${type}`; }
  if(/^\d+(-\d+)?(,\d+(-\d+)?)*$/.test(val) || /^[A-Za-z0-9,\-\/]+$/.test(val)) return val;
  return val;
}
function describe(m,h,dom,mon,dow){
  // time portion
  let timePart;
  const mStep=m.match(/^\*\/(\d+)$/), hStep=h.match(/^\*\/(\d+)$/);
  if(m==='*'&&h==='*') timePart='every minute';
  else if(mStep&&h==='*') timePart=`every ${mStep[1]} minutes`;
  else if(m!=='*'&&h==='*'&&/^\d+$/.test(m)) timePart=`at minute ${m} of every hour`;
  else if(/^\d+$/.test(m)&&/^\d+$/.test(h)) timePart=`at ${pad(h)}:${pad(m)}`;
  else if(h!=='*'&&m!=='*') timePart=`at minute ${m}, hour ${h}`;
  else if(hStep) timePart=`every ${hStep[1]} hours at minute ${m==='*'?0:m}`;
  else timePart=`at minute ${m}, hour ${h}`;

  const parts=[timePart];
  if(dow!=='*'){
    if(dow==='1-5') parts.push('on weekdays');
    else if(dow==='0,6'||dow==='6,0') parts.push('on weekends');
    else if(/^\d$/.test(dow)) parts.push(`on ${DAYS[+dow]}`);
    else parts.push(`on day-of-week ${dow}`);
  }
  if(dom!=='*'){
    if(/^\d+$/.test(dom)) parts.push(`on day ${dom} of the month`);
    else parts.push(`on days ${dom} of the month`);
  }
  if(mon!=='*'){
    if(/^\d+$/.test(mon)&&+mon>=1&&+mon<=12) parts.push(`in ${MONTHS[+mon]}`);
    else parts.push(`in months ${mon}`);
  }
  let s=parts.join(' ');
  return s.charAt(0).toUpperCase()+s.slice(1)+'.';
}
function render(){
  const v=ids.map(i=>document.getElementById(i).value.trim()||'*');
  document.getElementById('cron').textContent=v.join(' ');
  document.getElementById('desc').textContent=describe(...v);
}
ids.forEach(i=>document.getElementById(i).addEventListener('input',render));
document.querySelectorAll('.presets button').forEach(b=>b.addEventListener('click',()=>{
  const parts=b.dataset.c.split(' ');
  ids.forEach((id,i)=>document.getElementById(id).value=parts[i]);
  render();
}));
document.getElementById('copyBtn').addEventListener('click', async e=>{
  try{ await navigator.clipboard.writeText(document.getElementById('cron').textContent); }catch{}
  const b=e.target,t=b.textContent; b.textContent='Copied!'; setTimeout(()=>b.textContent=t,1200);
});
render();
</script>
</body>
</html>
