<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backslash Escape Tool</title>
<style>
  :root{--accent:#38bdf8;}
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);color:#e2e8f0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;padding:24px;}
  a.back{color:var(--accent);text-decoration:none;}
  .wrap{max-width:760px;margin:0 auto;}
  h1{font-size:1.6rem;margin:.3em 0 .6em;}
  p.note{color:#94a3b8;font-size:.9rem;margin-top:0;}
  .panel{background:#111827;border:1px solid #1f2937;border-radius:14px;padding:18px;margin-bottom:16px;}
  textarea{width:100%;min-height:120px;background:#0b1120;color:#e2e8f0;border:1px solid #1f2937;border-radius:10px;padding:10px;font-family:ui-monospace,monospace;font-size:.95rem;resize:vertical;}
  .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;align-items:center;}
  button{background:var(--accent);color:#04222e;border:none;border-radius:10px;padding:10px 16px;font-weight:600;cursor:pointer;font-size:.95rem;}
  button.alt{background:#1f2937;color:#e2e8f0;}
  button:hover{filter:brightness(1.1);}
  .err{color:#f87171;min-height:1.2em;margin-top:8px;font-size:.9rem;}
  label{display:block;margin-bottom:6px;font-size:.85rem;color:#94a3b8;}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="../">← back</a>
  <h1>Backslash Escape Tool</h1>
  <p class="note">Escape converts control chars to <code>\n \t \r \" \\ \uXXXX</code>; unescape reverses them.</p>
  <div class="panel">
    <label>Raw string</label>
    <textarea id="raw" placeholder="Type raw text here..."></textarea>
    <div class="row">
      <button id="esc">Escape ↓</button>
      <button class="alt" id="copyRaw">Copy</button>
    </div>
  </div>
  <div class="panel">
    <label>Escaped string</label>
    <textarea id="escaped" placeholder='Line1\nLine2\tTabbed ❤'></textarea>
    <div class="row">
      <button id="unesc">↑ Unescape</button>
      <button class="alt" id="copyEsc">Copy</button>
    </div>
    <div class="err" id="err"></div>
  </div>
</div>
<script>
  const raw=document.getElementById('raw');
  const escaped=document.getElementById('escaped');
  const err=document.getElementById('err');
  function setErr(m){err.textContent=m||'';}
  function escapeStr(s){
    let out='';
    for(const ch of s){
      const c=ch.codePointAt(0);
      switch(ch){
        case '\\':out+='\\\\';break;
        case '"':out+='\\"';break;
        case '\n':out+='\\n';break;
        case '\r':out+='\\r';break;
        case '\t':out+='\\t';break;
        case '\b':out+='\\b';break;
        case '\f':out+='\\f';break;
        case '\v':out+='\\v';break;
        case '\0':out+='\\0';break;
        default:
          if(c<0x20)out+='\\u'+c.toString(16).padStart(4,'0');
          else out+=ch;
      }
    }
    return out;
  }
  function unescapeStr(s){
    let out='',i=0;
    while(i<s.length){
      const ch=s[i];
      if(ch==='\\'){
        const n=s[i+1];
        if(n===undefined)throw new Error('trailing backslash');
        switch(n){
          case 'n':out+='\n';i+=2;break;
          case 'r':out+='\r';i+=2;break;
          case 't':out+='\t';i+=2;break;
          case 'b':out+='\b';i+=2;break;
          case 'f':out+='\f';i+=2;break;
          case 'v':out+='\v';i+=2;break;
          case '0':out+='\0';i+=2;break;
          case '"':out+='"';i+=2;break;
          case "'":out+="'";i+=2;break;
          case '\\':out+='\\';i+=2;break;
          case 'u':{
            if(s[i+2]==='{'){
              const end=s.indexOf('}',i+3);
              if(end<0)throw new Error('unterminated \\u{...}');
              const hex=s.slice(i+3,end);
              if(!/^[0-9a-fA-F]+$/.test(hex))throw new Error('bad \\u{} escape');
              out+=String.fromCodePoint(parseInt(hex,16));i=end+1;
            }else{
              const hex=s.substr(i+2,4);
              if(!/^[0-9a-fA-F]{4}$/.test(hex))throw new Error('bad \\u escape');
              out+=String.fromCharCode(parseInt(hex,16));i+=6;
            }
            break;
          }
          case 'x':{
            const hex=s.substr(i+2,2);
            if(!/^[0-9a-fA-F]{2}$/.test(hex))throw new Error('bad \\x escape');
            out+=String.fromCharCode(parseInt(hex,16));i+=4;break;
          }
          default:out+=n;i+=2;
        }
      }else{out+=ch;i++;}
    }
    return out;
  }
  function copy(el,btn){
    navigator.clipboard.writeText(el.value).then(()=>{
      const o=btn.textContent;btn.textContent='Copied!';setTimeout(()=>btn.textContent=o,1200);
    });
  }
  document.getElementById('esc').onclick=()=>{setErr('');escaped.value=escapeStr(raw.value);};
  document.getElementById('unesc').onclick=()=>{setErr('');try{raw.value=unescapeStr(escaped.value);}catch(e){setErr('Could not unescape: '+e.message);}};
  document.getElementById('copyRaw').onclick=e=>copy(raw,e.target);
  document.getElementById('copyEsc').onclick=e=>copy(escaped,e.target);
</script>
</body>
</html>
