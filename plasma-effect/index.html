<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plasma Effect</title>
<style>
  :root{--accent:#38bdf8;}
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);color:#e2e8f0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;padding:24px;}
  a.back{color:var(--accent);text-decoration:none;}
  .wrap{max-width:760px;margin:0 auto;}
  h1{font-size:1.6rem;margin:.3em 0 .6em;}
  .panel{background:#111827;border:1px solid #1f2937;border-radius:14px;padding:16px;margin-bottom:16px;}
  canvas{width:100%;display:block;border-radius:14px;border:1px solid #1f2937;image-rendering:pixelated;background:#000;}
  .controls{display:flex;gap:18px;align-items:center;flex-wrap:wrap;}
  .controls label{font-size:.85rem;color:#94a3b8;display:flex;gap:8px;align-items:center;}
  input[type=range]{accent-color:var(--accent);}
  select{background:#0b1120;color:#e2e8f0;border:1px solid #1f2937;border-radius:8px;padding:6px;}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="../">← back</a>
  <h1>Plasma Effect</h1>
  <div class="panel"><canvas id="c" width="240" height="160"></canvas></div>
  <div class="panel">
    <div class="controls">
      <label>Palette
        <select id="palette">
          <option value="0">Rainbow</option>
          <option value="1">Fire</option>
          <option value="2">Ocean</option>
          <option value="3">Neon</option>
        </select>
      </label>
      <label>Speed <input type="range" id="speed" min="1" max="100" value="40"></label>
      <label>Scale <input type="range" id="scale" min="5" max="60" value="24"></label>
    </div>
  </div>
</div>
<script>
  const c=document.getElementById('c'),ctx=c.getContext('2d');
  const W=c.width,H=c.height;
  const img=ctx.createImageData(W,H);
  const pal=new Array(4);
  function buildPalettes(){
    for(let p=0;p<4;p++){
      pal[p]=new Uint8ClampedArray(256*3);
      for(let i=0;i<256;i++){
        const t=i/255,a=t*Math.PI*2;let r,g,b;
        if(p===0){r=128+127*Math.sin(a);g=128+127*Math.sin(a+2.09);b=128+127*Math.sin(a+4.18);}
        else if(p===1){r=255*Math.min(1,t*2);g=255*Math.max(0,Math.min(1,t*2-0.5));b=255*Math.max(0,t*2-1.4);}
        else if(p===2){r=40*t;g=128+100*Math.sin(a);b=160+95*Math.sin(a+1);}
        else{r=128+127*Math.sin(a*2);g=60+60*Math.sin(a*3+1);b=180+75*Math.sin(a+2);}
        pal[p][i*3]=r;pal[p][i*3+1]=g;pal[p][i*3+2]=b;
      }
    }
  }
  buildPalettes();
  let t=0;
  function frame(){
    const speed=+document.getElementById('speed').value/1000;
    const scale=+document.getElementById('scale').value;
    const p=pal[+document.getElementById('palette').value];
    t+=speed;
    const d=img.data;
    for(let y=0;y<H;y++){
      for(let x=0;x<W;x++){
        const v=Math.sin(x/scale+t)+Math.sin(y/scale+t)
          +Math.sin((x+y)/scale+t)+Math.sin(Math.sqrt(x*x+y*y)/scale+t*1.3);
        const idx=Math.floor((v+4)/8*255)&255;
        const o=(y*W+x)*4;
        d[o]=p[idx*3];d[o+1]=p[idx*3+1];d[o+2]=p[idx*3+2];d[o+3]=255;
      }
    }
    ctx.putImageData(img,0,0);
    requestAnimationFrame(frame);
  }
  frame();
</script>
</body>
</html>
