<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tank Battle</title>
<style>
  :root { --accent: #38bdf8; }
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    color: #e2e8f0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
  .back { position: fixed; top: 16px; left: 16px; color: var(--accent); text-decoration: none; font-size: 14px; opacity: 0.8; }
  .back:hover { opacity: 1; }
  .card { background: #111827; border: 1px solid #1f2937; border-radius: 18px; padding: 24px;
    width: min(94vw, 520px); text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
  h1 { margin: 0 0 4px; font-size: 22px; }
  .sub { margin: 0 0 16px; color: #94a3b8; font-size: 13px; }
  .hud { display: flex; justify-content: space-between; font-size: 14px; color: #cbd5e1; margin-bottom: 10px; padding: 0 4px; }
  .hud b { color: var(--accent); }
  canvas { background: #0b1120; border: 1px solid #1f2937; border-radius: 12px; width: 100%; display: block; cursor: crosshair; }
  .msg { margin-top: 14px; font-size: 15px; color: #94a3b8; min-height: 22px; }
  .row { display: flex; gap: 10px; justify-content: center; margin-top: 12px; }
  button { font-family: inherit; font-size: 15px; border-radius: 10px; border: 1px solid #1f2937; padding: 10px 16px; background: #0b1120; color: #e2e8f0; cursor: pointer; }
  button.start { background: var(--accent); color: #04293b; font-weight: 700; border: none; }
  button.start:hover { filter: brightness(1.1); }
  button:active { transform: scale(0.97); }
</style>
</head>
<body>
<a class="back" href="../">&larr; back</a>
<div class="card">
  <h1>🛡️ Tank Battle</h1>
  <p class="sub">WASD to drive, mouse to aim, click / space to fire. Destroy the enemy tank before it gets you.</p>
  <div class="hud"><span>You: <b id="hp">100</b></span><span>Enemy: <b id="ehp">100</b></span></div>
  <canvas id="game" width="500" height="380"></canvas>
  <div class="msg" id="msg">Press Start</div>
  <div class="row"><button class="start" id="startBtn">Start</button></div>
</div>
<script>
const canvas = document.getElementById('game'), ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const hpEl = document.getElementById('hp'), ehpEl = document.getElementById('ehp'),
  msgEl = document.getElementById('msg'), startBtn = document.getElementById('startBtn');
let player, enemy, bullets, walls, keys, mouse, running, raf, enemyFireTimer, enemyTurn;
const SIZE = 18;

function setupWalls() {
  walls = [
    { x: 150, y: 90, w: 30, h: 110 },
    { x: 320, y: 180, w: 30, h: 110 },
    { x: 230, y: 30, w: 110, h: 28 },
    { x: 110, y: 300, w: 120, h: 26 },
  ];
}

function start() {
  setupWalls();
  player = { x: 60, y: H / 2, ang: 0, hp: 100, vx: 0, vy: 0 };
  enemy = { x: W - 60, y: H / 2, ang: Math.PI, hp: 100, dirAng: Math.PI };
  bullets = []; keys = {}; mouse = { x: W / 2, y: H / 2 };
  enemyFireTimer = 60; enemyTurn = 0;
  running = true; hpEl.textContent = 100; ehpEl.textContent = 100;
  msgEl.textContent = ''; startBtn.style.display = 'none';
  cancelAnimationFrame(raf); loop();
}

function endGame(win) {
  running = false; cancelAnimationFrame(raf);
  msgEl.textContent = win ? '🏆 You win!' : '💀 You were destroyed';
  startBtn.textContent = 'Play Again'; startBtn.style.display = 'inline-block';
}

document.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; if (e.code === 'Space') { fire(player, player.ang, true); e.preventDefault(); } });
document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
canvas.addEventListener('mousemove', e => { const r = canvas.getBoundingClientRect(); mouse.x = (e.clientX - r.left) / r.width * W; mouse.y = (e.clientY - r.top) / r.height * H; });
canvas.addEventListener('mousedown', () => { if (running) fire(player, player.ang, true); });

function fire(t, ang, mine) {
  if (t.cool > 0) return;
  t.cool = mine ? 18 : 40;
  bullets.push({ x: t.x + Math.cos(ang) * SIZE, y: t.y + Math.sin(ang) * SIZE, vx: Math.cos(ang) * 5, vy: Math.sin(ang) * 5, mine, life: 120 });
}

function hitsWall(x, y, pad) {
  for (const w of walls) if (x > w.x - pad && x < w.x + w.w + pad && y > w.y - pad && y < w.y + w.h + pad) return true;
  return false;
}

function moveTank(t, dx, dy) {
  const nx = t.x + dx, ny = t.y + dy;
  if (nx > SIZE && nx < W - SIZE && !hitsWall(nx, t.y, SIZE)) t.x = nx;
  if (ny > SIZE && ny < H - SIZE && !hitsWall(t.x, ny, SIZE)) t.y = ny;
}

function update() {
  if (player.cool > 0) player.cool--;
  if (enemy.cool > 0) enemy.cool--;
  // player movement
  let dx = 0, dy = 0;
  if (keys['w']) dy -= 2.4; if (keys['s']) dy += 2.4;
  if (keys['a']) dx -= 2.4; if (keys['d']) dx += 2.4;
  moveTank(player, dx, dy);
  player.ang = Math.atan2(mouse.y - player.y, mouse.x - player.x);

  // enemy AI: aim at player, move, fire if line clear-ish
  const tang = Math.atan2(player.y - enemy.y, player.x - enemy.x);
  let da = tang - enemy.ang; da = Math.atan2(Math.sin(da), Math.cos(da));
  enemy.ang += Math.max(-0.06, Math.min(0.06, da));
  enemyTurn--;
  if (enemyTurn <= 0) { enemy.dirAng = Math.random() * 6; enemyTurn = 40 + Math.random() * 60; }
  // move toward player but keep distance
  const dist = Math.hypot(player.x - enemy.x, player.y - enemy.y);
  let mdir = dist > 200 ? tang : (dist < 120 ? tang + Math.PI : enemy.dirAng);
  moveTank(enemy, Math.cos(mdir) * 1.4, Math.sin(mdir) * 1.4);
  enemyFireTimer--;
  if (enemyFireTimer <= 0 && Math.abs(da) < 0.3) { fire(enemy, enemy.ang, false); enemyFireTimer = 50 + Math.random() * 40; }

  // bullets
  for (const b of bullets) {
    b.x += b.vx; b.y += b.vy; b.life--;
    if (b.x < 0 || b.x > W || b.y < 0 || b.y > H) b.dead = true;
    if (hitsWall(b.x, b.y, 0)) b.dead = true;
    if (b.life <= 0) b.dead = true;
    if (b.mine && Math.hypot(b.x - enemy.x, b.y - enemy.y) < SIZE) { b.dead = true; enemy.hp -= 12; ehpEl.textContent = Math.max(0, enemy.hp); }
    if (!b.mine && Math.hypot(b.x - player.x, b.y - player.y) < SIZE) { b.dead = true; player.hp -= 12; hpEl.textContent = Math.max(0, player.hp); }
  }
  bullets = bullets.filter(b => !b.dead);
  if (enemy.hp <= 0) { endGame(true); return; }
  if (player.hp <= 0) { endGame(false); return; }
}

function drawTank(t, color) {
  ctx.save(); ctx.translate(t.x, t.y); ctx.rotate(t.ang);
  ctx.fillStyle = color; ctx.fillRect(-SIZE, -SIZE + 4, SIZE * 2, SIZE * 2 - 8);
  ctx.fillStyle = '#0b1120'; ctx.fillRect(0, -3, SIZE + 6, 6);
  ctx.fillStyle = color; ctx.beginPath(); ctx.arc(0, 0, 8, 0, 7); ctx.fill();
  ctx.restore();
}

function draw() {
  ctx.fillStyle = '#0b1120'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#1f2937'; for (const w of walls) ctx.fillRect(w.x, w.y, w.w, w.h);
  drawTank(player, '#38bdf8'); drawTank(enemy, '#ef4444');
  for (const b of bullets) { ctx.fillStyle = b.mine ? '#7dd3fc' : '#fca5a5'; ctx.beginPath(); ctx.arc(b.x, b.y, 3, 0, 7); ctx.fill(); }
}

function loop() { if (!running) return; update(); if (!running) return; draw(); raf = requestAnimationFrame(loop); }

function idle() { setupWalls(); player = { x: 60, y: H / 2, ang: 0 }; enemy = { x: W - 60, y: H / 2, ang: Math.PI }; bullets = []; draw(); }
startBtn.addEventListener('click', start);
idle();
</script>
</body>
</html>
