<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON Formatter</title>
<style>
  :root{--accent:#38bdf8;}
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
    color:#e2e8f0;background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    display:flex;flex-direction:column;align-items:center;padding:24px;}
  a.back{position:fixed;top:16px;left:16px;color:var(--accent);text-decoration:none;font-size:14px;}
  a.back:hover{text-decoration:underline;}
  h1{font-size:24px;margin:30px 0 6px;}
  .sub{color:#94a3b8;font-size:13px;margin:0 0 16px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:min(96vw,980px);}
  @media(max-width:740px){.grid{grid-template-columns:1fr;}}
  .col{display:flex;flex-direction:column;}
  .colhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;
    font-size:13px;color:#94a3b8;}
  textarea,pre{height:50vh;min-height:300px;border-radius:12px;border:1px solid #1f2937;
    background:#0b1120;color:#e2e8f0;padding:14px;font-size:13px;outline:none;
    font-family:ui-monospace,"Cascadia Code",Consolas,monospace;line-height:1.5;}
  textarea{resize:vertical;width:100%;}
  pre{margin:0;overflow:auto;white-space:pre;tab-size:2;}
  textarea:focus{border-color:var(--accent);}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0;justify-content:center;}
  button{background:var(--accent);color:#082f49;border:none;border-radius:10px;padding:10px 16px;
    font-weight:600;font-size:14px;cursor:pointer;}
  button.ghost{background:#1f2937;color:#e2e8f0;}
  button:hover{filter:brightness(1.1);}
  .status{min-height:22px;font-size:14px;font-weight:600;text-align:center;margin-bottom:6px;}
  .ok{color:#4ade80;}.err{color:#f87171;}
  .tok-key{color:#7dd3fc;}.tok-str{color:#86efac;}.tok-num{color:#fbbf24;}
  .tok-bool{color:#c084fc;}.tok-null{color:#f87171;}
</style>
</head>
<body>
<a class="back" href="../">← back</a>
<h1>JSON Formatter</h1>
<p class="sub">Paste JSON, then pretty-print, validate, or minify.</p>
<div class="toolbar">
  <button id="format">Pretty-print</button>
  <button id="minify" class="ghost">Minify</button>
  <button id="validate" class="ghost">Validate</button>
  <button id="copy" class="ghost">Copy output</button>
  <button id="clear" class="ghost">Clear</button>
</div>
<div class="status" id="status">Ready</div>
<div class="grid">
  <div class="col">
    <div class="colhead"><span>Input</span></div>
    <textarea id="input" spellcheck="false" placeholder='{"hello":"world","n":[1,2,3]}'></textarea>
  </div>
  <div class="col">
    <div class="colhead"><span>Output</span></div>
    <pre id="output"></pre>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
function setStatus(msg,ok){$('status').textContent=msg;$('status').className='status '+(ok?'ok':'err');}

function parse(){
  const raw=$('input').value;
  if(!raw.trim())throw{message:'Input is empty'};
  return JSON.parse(raw);
}
function locate(raw,e){
  // Try to extract a position from the error message for a friendlier note
  const m=/position (\d+)/.exec(e.message);
  if(m){
    const pos=+m[1];
    let line=1,col=1;
    for(let i=0;i<pos&&i<raw.length;i++){if(raw[i]==='\n'){line++;col=1;}else col++;}
    return ' (line '+line+', column '+col+')';
  }
  return '';
}
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function highlight(json){
  const esc=escapeHtml(json);
  return esc.replace(/("(\\.|[^"\\])*"(\s*:)?|\b(true|false)\b|\bnull\b|-?\d+(\.\d+)?([eE][+-]?\d+)?)/g,
    m=>{
      let cls='tok-num';
      if(/^"/.test(m)){cls=/:$/.test(m)?'tok-key':'tok-str';}
      else if(/true|false/.test(m))cls='tok-bool';
      else if(/null/.test(m))cls='tok-null';
      return '<span class="'+cls+'">'+m+'</span>';
    });
}
function output(text){$('output').innerHTML=highlight(text);}

$('format').onclick=()=>{
  try{const o=parse();const s=JSON.stringify(o,null,2);output(s);setStatus('Valid JSON — formatted ✓',true);}
  catch(e){setStatus('Invalid JSON: '+e.message+locate($('input').value,e),false);}
};
$('minify').onclick=()=>{
  try{const o=parse();const s=JSON.stringify(o);output(s);setStatus('Valid JSON — minified ✓',true);}
  catch(e){setStatus('Invalid JSON: '+e.message+locate($('input').value,e),false);}
};
$('validate').onclick=()=>{
  try{parse();setStatus('Valid JSON ✓',true);}
  catch(e){setStatus('Invalid JSON: '+e.message+locate($('input').value,e),false);}
};
$('copy').onclick=async()=>{
  const text=$('output').textContent;
  if(!text){setStatus('Nothing to copy',false);return;}
  try{await navigator.clipboard.writeText(text);setStatus('Copied to clipboard ✓',true);}
  catch(e){
    const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);
    ta.select();try{document.execCommand('copy');setStatus('Copied to clipboard ✓',true);}
    catch(_){setStatus('Copy failed',false);}document.body.removeChild(ta);
  }
};
$('clear').onclick=()=>{$('input').value='';$('output').innerHTML='';setStatus('Cleared',true);};
</script>
</body>
</html>
