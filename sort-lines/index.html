<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sort Lines</title>
<style>
  :root { --accent:#38bdf8; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; padding:24px;
    background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    color:#e2e8f0; font-family:system-ui, -apple-system, "Segoe UI", sans-serif; }
  a { color:var(--accent); text-decoration:none; }
  a:hover { text-decoration:underline; }
  h1 { font-size:1.4rem; margin:.4rem 0 1rem; }
  .panel { background:#111827; border:1px solid #1f2937; border-radius:14px; padding:16px; margin-bottom:16px; }
  textarea { width:100%; min-height:180px; resize:vertical; background:#0b1120; color:#e2e8f0;
    border:1px solid #1f2937; border-radius:10px; padding:10px; font-family:ui-monospace,Consolas,monospace; font-size:13px; }
  label { display:inline-flex; align-items:center; gap:6px; margin-right:16px; font-size:14px; }
  select { background:#0b1120; color:#e2e8f0; border:1px solid #1f2937; border-radius:8px; padding:6px; }
  button { background:var(--accent); color:#06283d; border:none; border-radius:10px; padding:9px 16px; font-weight:600; cursor:pointer; font-size:14px; }
  button:hover { filter:brightness(1.08); }
  button.secondary { background:#1f2937; color:#e2e8f0; }
  .row { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin:12px 0; }
  .status { font-size:13px; color:#94a3b8; }
</style>
</head>
<body>
  <a href="../">&larr; back</a>
  <h1>Sort Lines</h1>
  <div class="panel">
    <label>Mode
      <select id="mode">
        <option value="alpha">Alphabetical (A→Z)</option>
        <option value="numeric">Numeric (low→high)</option>
        <option value="reverse">Reverse order</option>
      </select>
    </label>
    <label><input type="checkbox" id="unique"> Remove duplicates</label>
    <label><input type="checkbox" id="ci"> Case-insensitive</label>
  </div>
  <div class="panel">
    <textarea id="input" placeholder="Paste lines here..."></textarea>
    <div class="row">
      <button id="go">Sort</button>
      <button class="secondary" id="clear">Clear</button>
      <span class="status" id="status"></span>
    </div>
  </div>
  <div class="panel">
    <textarea id="output" placeholder="Result..." readonly></textarea>
    <div class="row"><button class="secondary" id="copy">Copy</button></div>
  </div>
<script>
  const $ = id => document.getElementById(id);
  function run() {
    let lines = $('input').value.split(/\r?\n/);
    const mode = $('mode').value, ci = $('ci').checked;
    if ($('unique').checked) {
      const seen = new Set(); const out = [];
      for (const l of lines) { const k = ci ? l.toLowerCase() : l; if (!seen.has(k)) { seen.add(k); out.push(l); } }
      lines = out;
    }
    if (mode === 'reverse') {
      lines.reverse();
    } else if (mode === 'numeric') {
      lines.sort((a,b) => (parseFloat(a)||0) - (parseFloat(b)||0));
    } else {
      lines.sort((a,b) => (ci ? a.toLowerCase() : a).localeCompare(ci ? b.toLowerCase() : b));
    }
    $('output').value = lines.join('\n');
    $('status').textContent = lines.length + ' line' + (lines.length===1?'':'s') + '.';
  }
  $('go').onclick = run;
  $('clear').onclick = () => { $('input').value=''; $('output').value=''; $('status').textContent=''; };
  $('copy').onclick = async () => {
    await navigator.clipboard.writeText($('output').value);
    const b=$('copy'); b.textContent='Copied!'; setTimeout(()=>b.textContent='Copy',1200);
  };
</script>
</body>
</html>
