<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbit Shooter</title>
<style>
  :root { --accent: #38bdf8; }
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    color: #e2e8f0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
  .back { position: fixed; top: 16px; left: 16px; color: var(--accent); text-decoration: none; font-size: 14px; opacity: 0.8; }
  .back:hover { opacity: 1; }
  .card { background: #111827; border: 1px solid #1f2937; border-radius: 18px; padding: 24px;
    width: min(94vw, 440px); text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
  h1 { margin: 0 0 4px; font-size: 22px; }
  .sub { margin: 0 0 16px; color: #94a3b8; font-size: 13px; }
  .hud { display: flex; justify-content: space-between; font-size: 14px; color: #cbd5e1; margin-bottom: 10px; padding: 0 4px; }
  .hud b { color: var(--accent); }
  canvas { background: #0b1120; border: 1px solid #1f2937; border-radius: 12px; width: 100%; display: block; }
  .msg { margin-top: 14px; font-size: 15px; color: #94a3b8; min-height: 22px; }
  .row { display: flex; gap: 10px; justify-content: center; margin-top: 12px; }
  button { font-family: inherit; font-size: 15px; border-radius: 10px; border: 1px solid #1f2937; padding: 10px 16px; background: #0b1120; color: #e2e8f0; cursor: pointer; }
  button.start { background: var(--accent); color: #04293b; font-weight: 700; border: none; }
  button.start:hover { filter: brightness(1.1); }
  button:active { transform: scale(0.97); }
</style>
</head>
<body>
<a class="back" href="../">&larr; back</a>
<div class="card">
  <h1>🛰️ Orbit Shooter</h1>
  <p class="sub">Left / Right arrows (or A / D) orbit the core. Space / click to shoot outward. Stop enemies from reaching the core.</p>
  <div class="hud"><span>Score: <b id="score">0</b></span><span>Best: <b id="best">0</b></span><span>Lives: <b id="lives">3</b></span></div>
  <canvas id="game" width="400" height="400"></canvas>
  <div class="msg" id="msg">Press Start</div>
  <div class="row"><button class="start" id="startBtn">Start</button></div>
</div>
<script>
const canvas = document.getElementById('game'), ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height, CX = W / 2, CY = H / 2;
const scoreEl = document.getElementById('score'), bestEl = document.getElementById('best'),
  livesEl = document.getElementById('lives'), msgEl = document.getElementById('msg'), startBtn = document.getElementById('startBtn');
let best = 0;
const ORBIT = 70, CORE = 26;
let ship, bullets, enemies, score, lives, running, raf, keys, spawnTimer, shootCool;

function start() {
  ship = { ang: -Math.PI / 2 }; bullets = []; enemies = []; keys = {};
  score = 0; lives = 3; spawnTimer = 0; shootCool = 0;
  scoreEl.textContent = 0; livesEl.textContent = 3;
  running = true; msgEl.textContent = ''; startBtn.style.display = 'none';
  cancelAnimationFrame(raf); loop();
}
function gameOver() {
  running = false; cancelAnimationFrame(raf);
  if (score > best) { best = score; bestEl.textContent = best; }
  msgEl.textContent = '💀 Core destroyed — score ' + score;
  startBtn.textContent = 'Play Again'; startBtn.style.display = 'inline-block';
}
function shoot() {
  if (shootCool > 0) return; shootCool = 10;
  bullets.push({ x: CX + Math.cos(ship.ang) * ORBIT, y: CY + Math.sin(ship.ang) * ORBIT,
    vx: Math.cos(ship.ang) * 6, vy: Math.sin(ship.ang) * 6 });
}
document.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (k === 'arrowleft' || k === 'a') keys.l = true;
  if (k === 'arrowright' || k === 'd') keys.r = true;
  if (e.code === 'Space') { shoot(); e.preventDefault(); }
});
document.addEventListener('keyup', e => {
  const k = e.key.toLowerCase();
  if (k === 'arrowleft' || k === 'a') keys.l = false;
  if (k === 'arrowright' || k === 'd') keys.r = false;
});
canvas.addEventListener('mousedown', shoot);

function spawnEnemy() {
  const a = Math.random() * Math.PI * 2;
  const r = Math.max(W, H);
  enemies.push({ x: CX + Math.cos(a) * r, y: CY + Math.sin(a) * r, speed: 0.7 + Math.min(2, score / 400) + Math.random() * 0.4 });
}
function update() {
  if (shootCool > 0) shootCool--;
  if (keys.l) ship.ang -= 0.07;
  if (keys.r) ship.ang += 0.07;
  spawnTimer--;
  if (spawnTimer <= 0) { spawnEnemy(); spawnTimer = Math.max(25, 70 - score / 30); }
  for (const b of bullets) { b.x += b.vx; b.y += b.vy; if (b.x < -10 || b.x > W + 10 || b.y < -10 || b.y > H + 10) b.dead = true; }
  for (const en of enemies) {
    const dx = CX - en.x, dy = CY - en.y, d = Math.hypot(dx, dy);
    en.x += dx / d * en.speed; en.y += dy / d * en.speed;
    if (d < CORE + 10) { en.dead = true; lives--; livesEl.textContent = lives; if (lives <= 0) { gameOver(); return; } }
    for (const b of bullets) { if (!b.dead && Math.hypot(b.x - en.x, b.y - en.y) < 14) { b.dead = true; en.dead = true; score += 10; scoreEl.textContent = score; } }
  }
  bullets = bullets.filter(b => !b.dead);
  enemies = enemies.filter(e => !e.dead);
}
function draw() {
  ctx.fillStyle = '#0b1120'; ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = 'rgba(56,189,248,0.2)'; ctx.beginPath(); ctx.arc(CX, CY, ORBIT, 0, 7); ctx.stroke();
  // core
  ctx.fillStyle = '#22c55e'; ctx.beginPath(); ctx.arc(CX, CY, CORE, 0, 7); ctx.fill();
  ctx.fillStyle = '#0b1120'; ctx.beginPath(); ctx.arc(CX, CY, CORE * 0.5, 0, 7); ctx.fill();
  // ship
  const sx = CX + Math.cos(ship.ang) * ORBIT, sy = CY + Math.sin(ship.ang) * ORBIT;
  ctx.save(); ctx.translate(sx, sy); ctx.rotate(ship.ang + Math.PI / 2);
  ctx.fillStyle = '#38bdf8'; ctx.beginPath(); ctx.moveTo(0, -12); ctx.lineTo(8, 8); ctx.lineTo(-8, 8); ctx.closePath(); ctx.fill();
  ctx.restore();
  for (const b of bullets) { ctx.fillStyle = '#7dd3fc'; ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, 7); ctx.fill(); }
  for (const en of enemies) { ctx.fillStyle = '#ef4444'; ctx.beginPath(); ctx.arc(en.x, en.y, 11, 0, 7); ctx.fill();
    ctx.fillStyle = '#7f1d1d'; ctx.beginPath(); ctx.arc(en.x, en.y, 5, 0, 7); ctx.fill(); }
}
function loop() { if (!running) return; update(); if (!running) return; draw(); raf = requestAnimationFrame(loop); }
function idle() { ship = { ang: -Math.PI / 2 }; bullets = []; enemies = []; draw(); }
startBtn.addEventListener('click', start);
idle();
</script>
</body>
</html>
