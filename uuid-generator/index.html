<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UUID Generator</title>
<style>
  :root{--accent:#38bdf8;}
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);color:#e2e8f0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;padding:24px;}
  a.back{color:var(--accent);text-decoration:none;}
  .wrap{max-width:780px;margin:0 auto;}
  h1{font-size:1.6rem;margin:.3em 0 .6em;}
  .panel{background:#111827;border:1px solid #1f2937;border-radius:14px;padding:18px;margin-bottom:16px;}
  textarea{width:100%;min-height:220px;background:#0b1120;color:#e2e8f0;border:1px solid #1f2937;border-radius:10px;padding:10px;font-size:.95rem;font-family:ui-monospace,monospace;resize:vertical;}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
  label{font-size:.9rem;}
  input[type=number]{width:90px;background:#0b1120;color:#e2e8f0;border:1px solid #1f2937;border-radius:10px;padding:8px;}
  button{background:#1f2937;color:#e2e8f0;border:1px solid #334155;border-radius:10px;padding:10px 16px;cursor:pointer;font-weight:600;}
  button:hover{background:var(--accent);color:#04222e;}
  .copy{background:var(--accent);color:#04222e;border:none;}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="../">← back</a>
  <h1>UUID Generator</h1>
  <div class="panel">
    <div class="row">
      <label>Count <input type="number" id="count" value="5" min="1" max="1000"></label>
      <button id="gen">Regenerate</button>
      <button class="copy" id="copy">Copy all</button>
    </div>
  </div>
  <div class="panel">
    <textarea id="out" readonly></textarea>
  </div>
</div>
<script>
  function uuid(){
    if(crypto.randomUUID) return crypto.randomUUID();
    const b=crypto.getRandomValues(new Uint8Array(16));
    b[6]=(b[6]&0x0f)|0x40; b[8]=(b[8]&0x3f)|0x80;
    const h=[...b].map(x=>x.toString(16).padStart(2,'0'));
    return `${h.slice(0,4).join('')}-${h.slice(4,6).join('')}-${h.slice(6,8).join('')}-${h.slice(8,10).join('')}-${h.slice(10,16).join('')}`;
  }
  const out=document.getElementById('out'), count=document.getElementById('count');
  function gen(){
    const n=Math.max(1,Math.min(1000,parseInt(count.value)||1));
    out.value=Array.from({length:n},uuid).join('\n');
  }
  document.getElementById('gen').onclick=gen;
  count.oninput=gen;
  document.getElementById('copy').onclick=async function(){
    await navigator.clipboard.writeText(out.value);
    const b=this; const t=b.textContent; b.textContent='Copied!'; setTimeout(()=>b.textContent=t,1200);
  };
  gen();
</script>
</body>
</html>
