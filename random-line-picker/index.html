<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Random Line Picker</title>
<style>
  :root { --accent:#38bdf8; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; padding:24px;
    background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    color:#e2e8f0; font-family:system-ui, -apple-system, "Segoe UI", sans-serif; }
  a { color:var(--accent); text-decoration:none; }
  a:hover { text-decoration:underline; }
  h1 { font-size:1.4rem; margin:.4rem 0 1rem; }
  .panel { background:#111827; border:1px solid #1f2937; border-radius:14px; padding:16px; margin-bottom:16px; }
  textarea { width:100%; min-height:160px; resize:vertical; background:#0b1120; color:#e2e8f0;
    border:1px solid #1f2937; border-radius:10px; padding:10px; font-family:ui-monospace,Consolas,monospace; font-size:13px; }
  label { display:inline-flex; align-items:center; gap:6px; margin-right:16px; font-size:14px; }
  input { background:#0b1120; color:#e2e8f0; border:1px solid #1f2937; border-radius:8px; padding:6px; width:90px; font-family:inherit; }
  button { background:var(--accent); color:#06283d; border:none; border-radius:10px; padding:9px 16px; font-weight:600; cursor:pointer; font-size:14px; }
  button:hover { filter:brightness(1.08); }
  button.secondary { background:#1f2937; color:#e2e8f0; }
  .row { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin:12px 0; }
  .status { font-size:13px; color:#94a3b8; }
</style>
</head>
<body>
  <a href="../">&larr; back</a>
  <h1>Random Line Picker</h1>
  <div class="panel">
    <label>Pick <input type="number" id="count" value="1" min="1"> line(s)</label>
    <label><input type="checkbox" id="ignoreblank" checked> Ignore blank lines</label>
    <label><input type="checkbox" id="allowdup"> Allow repeats</label>
  </div>
  <div class="panel">
    <textarea id="input" placeholder="Paste a list, one item per line..."></textarea>
    <div class="row">
      <button id="go">Pick</button>
      <button class="secondary" id="clear">Clear</button>
      <span class="status" id="status"></span>
    </div>
  </div>
  <div class="panel">
    <textarea id="output" placeholder="Result..." readonly></textarea>
    <div class="row"><button class="secondary" id="copy">Copy</button></div>
  </div>
<script>
  const $ = id => document.getElementById(id);
  function rnd(max){ return Math.floor(Math.random()*max); }
  function run() {
    let lines = $('input').value.split(/\r?\n/);
    if ($('ignoreblank').checked) lines = lines.filter(l => l.trim() !== '');
    const want = Math.max(1, parseInt($('count').value,10) || 1);
    const picked = [];
    if ($('allowdup').checked) {
      if (lines.length === 0) { $('status').textContent='No lines.'; $('output').value=''; return; }
      for (let i=0;i<want;i++) picked.push(lines[rnd(lines.length)]);
    } else {
      const pool = lines.slice();
      for (let i=0;i<want && pool.length;i++) picked.push(pool.splice(rnd(pool.length),1)[0]);
    }
    $('output').value = picked.join('\n');
    $('status').textContent = 'Picked ' + picked.length + ' of ' + lines.length + '.';
  }
  $('go').onclick = run;
  $('clear').onclick = () => { $('input').value=''; $('output').value=''; $('status').textContent=''; };
  $('copy').onclick = async () => {
    await navigator.clipboard.writeText($('output').value);
    const b=$('copy'); b.textContent='Copied!'; setTimeout(()=>b.textContent='Copy',1200);
  };
</script>
</body>
</html>
