<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slug Generator</title>
<style>
  :root { --accent:#38bdf8; }
  * { box-sizing:border-box; }
  body { margin:0; padding:24px; background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120); color:#e2e8f0; font-family:system-ui,-apple-system,"Segoe UI",sans-serif; min-height:100vh; }
  a.back { color:var(--accent); text-decoration:none; font-size:14px; }
  a.back:hover { text-decoration:underline; }
  h1 { font-size:24px; margin:12px 0 4px; }
  p.sub { color:#94a3b8; margin:0 0 20px; }
  .wrap { max-width:760px; margin:0 auto; }
  .panel { background:#111827; border:1px solid #1f2937; border-radius:14px; padding:18px; margin-bottom:18px; }
  label { display:block; font-size:13px; color:#94a3b8; margin:0 0 6px; }
  input[type=text], textarea { width:100%; background:#0b1120; color:#e2e8f0; border:1px solid #1f2937; border-radius:8px; padding:10px 12px; font-size:15px; font-family:inherit; }
  textarea { resize:vertical; min-height:80px; }
  .opts { display:flex; gap:18px; flex-wrap:wrap; margin-top:14px; font-size:14px; }
  .opts label { display:flex; align-items:center; gap:6px; margin:0; color:#e2e8f0; }
  .opts input { accent-color:var(--accent); }
  .opts select { background:#0b1120; color:#e2e8f0; border:1px solid #1f2937; border-radius:6px; padding:4px 8px; }
  .slug { font-family:ui-monospace,monospace; font-size:18px; color:var(--accent); word-break:break-all; background:#0b1120; border:1px solid #1f2937; border-radius:8px; padding:14px; min-height:24px; }
  button { background:var(--accent); color:#04263a; border:none; border-radius:10px; padding:10px 16px; font-weight:600; cursor:pointer; font-size:14px; margin-top:12px; }
  button:active { transform:translateY(1px); }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="../">&larr; back</a>
  <h1>Slug Generator</h1>
  <p class="sub">Type text and get a clean URL slug live.</p>
  <div class="panel">
    <label>Text</label>
    <textarea id="input" placeholder="Hello World! This is My Post Title.">Hello World! This is My Post Title.</textarea>
    <div class="opts">
      <label>Separator
        <select id="sep"><option value="-">- (hyphen)</option><option value="_">_ (underscore)</option></select>
      </label>
      <label><input type="checkbox" id="lower" checked> lowercase</label>
      <label><input type="checkbox" id="strip" checked> strip accents</label>
    </div>
  </div>
  <div class="panel">
    <label>Slug</label>
    <div class="slug" id="slug"></div>
    <button id="copyBtn">Copy</button>
  </div>
</div>
<script>
const input=document.getElementById('input'), slugEl=document.getElementById('slug');
function slugify(){
  let s = input.value;
  if(document.getElementById('strip').checked) s = s.normalize('NFKD').replace(/[̀-ͯ]/g,'');
  if(document.getElementById('lower').checked) s = s.toLowerCase();
  const sep = document.getElementById('sep').value;
  s = s.replace(/[^a-zA-Z0-9]+/g, sep).replace(new RegExp(`\\${sep}+`,'g'), sep).replace(new RegExp(`^\\${sep}|\\${sep}$`,'g'),'');
  slugEl.textContent = s;
}
['input','sep','lower','strip'].forEach(id=>{ const el=document.getElementById(id); el.addEventListener('input',slugify); el.addEventListener('change',slugify); });
document.getElementById('copyBtn').addEventListener('click', async e=>{
  if(!slugEl.textContent) return;
  try{ await navigator.clipboard.writeText(slugEl.textContent); }catch{}
  const b=e.target,t=b.textContent; b.textContent='Copied!'; setTimeout(()=>b.textContent=t,1200);
});
slugify();
</script>
</body>
</html>
