<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<style>
  :root{--accent:#38bdf8;}
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(1200px 600px at 50% -10%,#1e293b,#0b1120);color:#e2e8f0;
    font-family:system-ui,-apple-system,"Segoe UI",sans-serif;padding:20px;}
  a.back{position:fixed;top:14px;left:16px;color:var(--accent);text-decoration:none;font-size:15px;}
  a.back:hover{text-decoration:underline;}
  h1{margin:0 0 4px;font-size:34px;letter-spacing:1px;}
  .top{display:flex;gap:14px;align-items:center;margin-bottom:14px;}
  .score{background:#111827;border:1px solid #1f2937;border-radius:12px;padding:8px 16px;text-align:center;min-width:90px;}
  .score small{display:block;color:#94a3b8;font-size:11px;text-transform:uppercase;letter-spacing:1px;}
  .score b{font-size:22px;}
  button{background:var(--accent);color:#04212e;border:none;border-radius:10px;padding:10px 18px;font-weight:700;
    cursor:pointer;font-size:14px;}
  button:hover{filter:brightness(1.1);}
  #board{position:relative;background:#111827;border:1px solid #1f2937;border-radius:18px;padding:12px;
    display:grid;grid-template-columns:repeat(4,76px);grid-template-rows:repeat(4,76px);gap:12px;touch-action:none;}
  .cell{background:#0b1120;border-radius:10px;}
  .tile{position:absolute;width:76px;height:76px;border-radius:10px;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:30px;transition:transform .12s ease;color:#0b1120;}
  .hint{color:#94a3b8;font-size:13px;margin-top:14px;}
  #over{position:absolute;inset:0;background:rgba(11,17,32,.85);border-radius:18px;display:none;
    flex-direction:column;align-items:center;justify-content:center;gap:12px;}
  #over.show{display:flex;}
  #over h2{margin:0;font-size:28px;}
</style>
</head>
<body>
<a class="back" href="../">← back</a>
<h1>2048</h1>
<div class="top">
  <div class="score"><small>Score</small><b id="score">0</b></div>
  <div class="score"><small>Best</small><b id="best">0</b></div>
  <button id="newBtn">New Game</button>
</div>
<div id="board">
  <div id="over"><h2 id="overMsg">Game Over</h2><button id="retry">Try Again</button></div>
</div>
<p class="hint">Use arrow keys / WASD or swipe. Merge tiles to reach 2048!</p>
<script>
const SIZE=4, GAP=12, T=76;
const colors={2:'#eef2ff',4:'#e0e7ff',8:'#fcd34d',16:'#fbbf24',32:'#fb923c',64:'#f87171',
  128:'#34d399',256:'#22d3ee',512:'#38bdf8',1024:'#a78bfa',2048:'#f472b6'};
const board=document.getElementById('board');
let grid, score, best=+(localStorage.getItem('best2048')||0), tiles, idc=0, won=false, gameOver=false;
document.getElementById('best').textContent=best;

function empty(){return grid.flatMap((r,y)=>r.map((v,x)=>v?null:{x,y})).filter(Boolean);}
function spawn(){const e=empty();if(!e.length)return;const c=e[Math.random()*e.length|0];
  grid[c.y][c.x]={val:Math.random()<0.9?2:4,id:idc++,merged:false};}
function reset(){grid=Array.from({length:SIZE},()=>Array(SIZE).fill(0));score=0;won=false;gameOver=false;
  document.getElementById('over').classList.remove('show');spawn();spawn();render();updateScore();}
function updateScore(){document.getElementById('score').textContent=score;
  if(score>best){best=score;localStorage.setItem('best2048',best);}document.getElementById('best').textContent=best;}
function pos(x,y){return {left:12+x*(T+GAP),top:12+y*(T+GAP)};}

function render(){
  board.querySelectorAll('.cell').forEach(c=>c.remove());
  for(let i=0;i<16;i++){const c=document.createElement('div');c.className='cell';board.appendChild(c);}
  if(!tiles)tiles={};
  const seen=new Set();
  for(let y=0;y<SIZE;y++)for(let x=0;x<SIZE;x++){
    const t=grid[y][x];if(!t)continue;seen.add(t.id);
    let el=tiles[t.id];
    if(!el){el=document.createElement('div');el.className='tile';board.appendChild(el);tiles[t.id]=el;
      const p=pos(x,y);el.style.transform=`translate(${p.left}px,${p.top}px) scale(0.1)`;
      requestAnimationFrame(()=>{const p2=pos(x,y);el.style.transform=`translate(${p2.left}px,${p2.top}px) scale(1)`;});}
    el.textContent=t.val;el.style.background=colors[t.val]||'#7c3aed';
    el.style.color=t.val>4?'#fff':'#0b1120';el.style.fontSize=(t.val>=1024?'22px':t.val>=128?'26px':'30px');
    const p=pos(x,y);el.style.transform=`translate(${p.left}px,${p.top}px) scale(1)`;
  }
  for(const id in tiles){if(!seen.has(+id)){tiles[id].remove();delete tiles[id];}}
}

function slide(row){
  let arr=row.filter(c=>c);let res=[],gained=0;
  for(let i=0;i<arr.length;i++){
    if(i+1<arr.length&&arr[i].val===arr[i+1].val){
      const nv=arr[i].val*2;res.push({val:nv,id:arr[i].id,merged:true});gained+=nv;
      if(nv===2048)won=true;i++;
    }else res.push(arr[i]);
  }
  while(res.length<SIZE)res.push(0);
  return {res,gained};
}
function rotate(g){return g[0].map((_,i)=>g.map(r=>r[i]).reverse());}
function move(dir){
  if(gameOver)return;
  let g=grid.map(r=>r.slice());
  for(let i=0;i<dir;i++)g=rotate(g);
  let moved=false,gained=0;
  const ng=g.map(row=>{const {res,gained:gg}=slide(row);gained+=gg;
    if(res.some((c,i)=>(c?c.id:0)!==(row[i]?row[i].id:0)||(c?c.val:0)!==(row[i]?row[i].val:0)))moved=true;return res;});
  let final=ng;for(let i=0;i<(4-dir)%4;i++)final=rotate(final);
  if(moved){grid=final;score+=gained;spawn();render();updateScore();checkEnd();}
}
function canMove(){
  if(empty().length)return true;
  for(let y=0;y<SIZE;y++)for(let x=0;x<SIZE;x++){
    const v=grid[y][x].val;
    if(x+1<SIZE&&grid[y][x+1].val===v)return true;
    if(y+1<SIZE&&grid[y+1][x].val===v)return true;
  }
  return false;
}
function checkEnd(){
  if(won&&!gameOver){gameOver=true;document.getElementById('overMsg').textContent='You win! 🎉';
    document.getElementById('over').classList.add('show');return;}
  if(!canMove()){gameOver=true;document.getElementById('overMsg').textContent='Game Over';
    document.getElementById('over').classList.add('show');}
}
const keymap={ArrowLeft:0,ArrowUp:1,ArrowRight:2,ArrowDown:3,a:0,w:1,d:2,s:3};
window.addEventListener('keydown',e=>{const k=e.key.length===1?e.key.toLowerCase():e.key;
  if(k in keymap){e.preventDefault();move(keymap[k]);}});
let sx,sy;
board.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
board.addEventListener('touchend',e=>{if(sx==null)return;const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
  if(Math.max(Math.abs(dx),Math.abs(dy))<24)return;
  if(Math.abs(dx)>Math.abs(dy))move(dx>0?2:0);else move(dy>0?3:1);sx=sy=null;});
document.getElementById('newBtn').onclick=reset;
document.getElementById('retry').onclick=reset;
reset();
</script>
</body>
</html>
