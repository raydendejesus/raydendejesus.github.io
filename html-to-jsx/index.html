<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML to JSX</title>
<style>
  :root { --accent:#38bdf8; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; padding:24px;
    background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    color:#e2e8f0; font-family:system-ui, -apple-system, "Segoe UI", sans-serif; }
  a { color:var(--accent); text-decoration:none; }
  h1 { font-size:1.5rem; margin:.2rem 0 1rem; }
  .wrap { max-width:1000px; margin:0 auto; }
  .panel { background:#111827; border:1px solid #1f2937; border-radius:14px; padding:18px; margin-bottom:18px; }
  label { display:block; font-size:.85rem; color:#94a3b8; margin-bottom:6px; }
  textarea { width:100%; background:#0b1120; color:#e2e8f0; border:1px solid #1f2937;
    border-radius:10px; padding:10px; font-family:ui-monospace, monospace; font-size:.9rem; min-height:160px; resize:vertical; }
  button { background:var(--accent); color:#0b1120; border:none; border-radius:10px; padding:9px 16px; font-weight:600; cursor:pointer; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
  @media(max-width:760px){ .grid{ grid-template-columns:1fr; } }
  .row { display:flex; gap:8px; margin-top:10px; }
</style>
</head>
<body>
<div class="wrap">
  <a href="../">&larr; back</a>
  <h1>HTML to JSX</h1>
  <div class="grid">
    <div class="panel">
      <label>HTML input</label>
      <textarea id="in" oninput="convert()">&lt;div class="card" style="color:red; font-size:14px"&gt;
  &lt;label for="n"&gt;Name&lt;/label&gt;
  &lt;input id="n" type="text"&gt;
  &lt;br&gt;
  &lt;!-- a comment --&gt;
&lt;/div&gt;</textarea>
    </div>
    <div class="panel">
      <label>JSX output</label>
      <textarea id="out" readonly></textarea>
      <div class="row"><button onclick="copyOut()">Copy</button></div>
    </div>
  </div>
</div>
<script>
  var voidTags = {area:1,base:1,br:1,col:1,embed:1,hr:1,img:1,input:1,link:1,meta:1,param:1,source:1,track:1,wbr:1};
  var attrMap = {class:'className', for:'htmlFor', tabindex:'tabIndex', readonly:'readOnly',
    maxlength:'maxLength', cellpadding:'cellPadding', cellspacing:'cellSpacing', colspan:'colSpan',
    rowspan:'rowSpan', autocomplete:'autoComplete', autofocus:'autoFocus', spellcheck:'spellCheck',
    contenteditable:'contentEditable', enctype:'encType', novalidate:'noValidate', usemap:'useMap',
    srcset:'srcSet', crossorigin:'crossOrigin'};
  function camel(p){ return p.replace(/-([a-z])/g, function(_,c){ return c.toUpperCase(); }); }
  function styleToObj(s) {
    var props = s.split(';').filter(function(x){ return x.trim(); });
    var parts = props.map(function(p){
      var i = p.indexOf(':'); if (i<0) return '';
      var k = p.slice(0,i).trim(), v = p.slice(i+1).trim();
      var key = k.indexOf('-')>=0 ? camel(k) : k;
      if (/[^\w-]/.test(key)) key = "'" + key + "'";
      return key + ": '" + v.replace(/'/g,"\\'") + "'";
    }).filter(Boolean);
    return '{{' + parts.join(', ') + '}}';
  }
  function convertAttrs(attrStr) {
    var out = '';
    var re = /([:\w-]+)(\s*=\s*("([^"]*)"|'([^']*)'|(\S+)))?/g, m;
    while ((m = re.exec(attrStr)) !== null) {
      var name = m[1];
      var hasVal = m[2] !== undefined;
      var val = m[4] !== undefined ? m[4] : (m[5] !== undefined ? m[5] : m[6]);
      if (!name.trim()) continue;
      var lower = name.toLowerCase();
      if (lower === 'style' && hasVal) { out += ' style=' + styleToObj(val); continue; }
      var jsxName = attrMap[lower] || (lower.indexOf('-')>=0 && !/^(data|aria)-/.test(lower) ? camel(name) : name);
      if (/^on[a-z]/.test(lower) && lower !== 'on') jsxName = 'on' + lower.charAt(2).toUpperCase() + lower.slice(3);
      if (!hasVal) out += ' ' + jsxName;
      else out += ' ' + jsxName + '="' + val + '"';
    }
    return out;
  }
  function convert() {
    var html = document.getElementById('in').value;
    html = html.replace(/<!--([\s\S]*?)-->/g, function(_,c){ return '{/*' + c.replace(/\*\//g,'* /') + '*/}'; });
    html = html.replace(/<\s*([a-zA-Z][\w:-]*)((?:[^>"']|"[^"]*"|'[^']*')*?)\s*(\/?)>/g, function(full, tag, attrs, selfClose) {
      var lower = tag.toLowerCase();
      var conv = convertAttrs(attrs);
      if (voidTags[lower] || selfClose) return '<' + tag + conv + ' />';
      return '<' + tag + conv + '>';
    });
    document.getElementById('out').value = html;
  }
  function copyOut(){ navigator.clipboard.writeText(document.getElementById('out').value); }
  convert();
</script>
</body>
</html>
