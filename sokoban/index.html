<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sokoban</title>
<style>
  body{margin:0;min-height:100vh;background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);color:#e2e8f0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;display:flex;flex-direction:column;align-items:center;padding:20px;}
  a.back{position:fixed;top:16px;left:16px;color:#38bdf8;text-decoration:none;}
  a.back:hover{text-decoration:underline;}
  h1{margin:8px 0;}
  .panel{background:#111827;border:1px solid #1f2937;border-radius:18px;padding:14px;}
  #board{display:grid;gap:0;}
  .t{width:42px;height:42px;display:flex;align-items:center;justify-content:center;box-sizing:border-box;}
  .wall{background:#475569;border:1px solid #334155;}
  .floor{background:#1e293b;}
  .target{background:#1e293b;}
  .target::after{content:"";width:14px;height:14px;border-radius:50%;background:#38bdf8;position:absolute;}
  .t{position:relative;}
  .box{width:30px;height:30px;border-radius:6px;background:#f59e0b;box-shadow:inset 0 -3px 4px rgba(0,0,0,.4);z-index:1;}
  .box.on{background:#22c55e;}
  .player{width:28px;height:28px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#7dd3fc,#0ea5e9);z-index:2;}
  #info{margin-top:12px;font-weight:600;font-size:18px;}
  .row{display:flex;gap:10px;margin-top:8px;}
  button{background:#0b1120;color:#e2e8f0;border:1px solid #1f2937;border-radius:10px;padding:8px 14px;font:inherit;cursor:pointer;}
  button:hover{border-color:#38bdf8;}
</style>
</head>
<body>
<a class="back" href="../">← back</a>
<h1>Sokoban</h1>
<div class="panel"><div id="board"></div></div>
<div id="info">Level 1 — Moves: 0</div>
<div class="row">
  <button id="undo">Undo</button>
  <button id="restart">Restart</button>
  <button id="prev">◀ Prev</button>
  <button id="next">Next ▶</button>
</div>
<p style="color:#64748b">Arrow keys / WASD to move</p>
<script>
// # wall, . target, $ box, * box on target, @ player, + player on target, space floor
const LEVELS=[
  ["#####","#@$.#","#####"],
  ["#######","#.    #","# $$  #","#  @  #","#  .  #","#######"],
  ["########","#  .   #","# $## $#","# @  . #","#  $.  #","#   #  #","########"],
  ["  ####  "," ##  ## ","## $  ##","#  $.@ #","# .$.  #","########"],
  ["#######","#. #  #","#  $  #","#  $ .#","#@ $ .#","#  . ##","#######"]
];
const boardEl=document.getElementById('board');
let map, boxes, player, moves, level, history;
function load(idx){
  level=idx;const raw=LEVELS[idx];
  map=[];boxes=[];player=null;
  const w=Math.max(...raw.map(r=>r.length));
  for(let r=0;r<raw.length;r++){
    map[r]=[];
    for(let c=0;c<w;c++){
      const ch=raw[r][c]||' ';let t='floor';
      if(ch==='#')t='wall';
      if(ch==='.'||ch==='*'||ch==='+')t='target';
      map[r][c]=t;
      if(ch==='$'||ch==='*')boxes.push([r,c]);
      if(ch==='@'||ch==='+')player=[r,c];
    }
  }
  moves=0;history=[];render();info();
}
function isBox(r,c){return boxes.find(b=>b[0]===r&&b[1]===c);}
function render(){
  boardEl.style.gridTemplateColumns='repeat('+map[0].length+',42px)';
  boardEl.innerHTML='';
  for(let r=0;r<map.length;r++)for(let c=0;c<map[0].length;c++){
    const d=document.createElement('div');d.className='t '+map[r][c];
    const b=isBox(r,c);
    if(b){const e=document.createElement('div');e.className='box'+(map[r][c]==='target'?' on':'');d.appendChild(e);}
    if(player[0]===r&&player[1]===c){const p=document.createElement('div');p.className='player';d.appendChild(p);}
    boardEl.appendChild(d);
  }
}
function move(dr,dc){
  const nr=player[0]+dr,nc=player[1]+dc;
  if(map[nr]===undefined||map[nr][nc]===undefined||map[nr][nc]==='wall')return;
  const b=isBox(nr,nc);
  if(b){
    const br=nr+dr,bc=nc+dc;
    if(map[br]===undefined||map[br][bc]===undefined||map[br][bc]==='wall'||isBox(br,bc))return;
    history.push({player:[...player],boxes:boxes.map(x=>[...x])});
    b[0]=br;b[1]=bc;
  }else{
    history.push({player:[...player],boxes:boxes.map(x=>[...x])});
  }
  player=[nr,nc];moves++;render();info();checkWin();
}
function checkWin(){
  if(boxes.every(([r,c])=>map[r][c]==='target')){
    document.getElementById('info').textContent='Level '+(level+1)+' solved in '+moves+' moves! 🎉';
  }
}
function info(){document.getElementById('info').textContent='Level '+(level+1)+' — Moves: '+moves;}
document.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(k==='arrowup'||k==='w')move(-1,0);
  else if(k==='arrowdown'||k==='s')move(1,0);
  else if(k==='arrowleft'||k==='a')move(0,-1);
  else if(k==='arrowright'||k==='d')move(0,1);
  else return;
  e.preventDefault();
});
document.getElementById('undo').addEventListener('click',()=>{
  const h=history.pop();if(!h)return;player=h.player;boxes=h.boxes;moves=Math.max(0,moves-1);render();info();
});
document.getElementById('restart').addEventListener('click',()=>load(level));
document.getElementById('prev').addEventListener('click',()=>load((level-1+LEVELS.length)%LEVELS.length));
document.getElementById('next').addEventListener('click',()=>load((level+1)%LEVELS.length));
load(0);
</script>
</body>
</html>
