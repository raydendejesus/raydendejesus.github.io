<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fruit Ninja Slice</title>
<style>
  :root { --accent: #38bdf8; }
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    color: #e2e8f0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
  .back { position: fixed; top: 16px; left: 16px; color: var(--accent); text-decoration: none; font-size: 14px; opacity: 0.8; }
  .back:hover { opacity: 1; }
  .card { background: #111827; border: 1px solid #1f2937; border-radius: 18px; padding: 24px;
    width: min(94vw, 520px); text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
  h1 { margin: 0 0 4px; font-size: 22px; }
  .sub { margin: 0 0 16px; color: #94a3b8; font-size: 13px; }
  .hud { display: flex; justify-content: space-between; font-size: 14px; color: #cbd5e1; margin-bottom: 10px; padding: 0 4px; }
  .hud b { color: var(--accent); }
  canvas { background: #0b1120; border: 1px solid #1f2937; border-radius: 12px; width: 100%; display: block; touch-action: none; cursor: crosshair; }
  .msg { margin-top: 14px; font-size: 15px; color: #94a3b8; min-height: 22px; }
  .row { display: flex; gap: 10px; justify-content: center; margin-top: 12px; }
  button { font-family: inherit; font-size: 15px; border-radius: 10px; border: 1px solid #1f2937; padding: 10px 16px; background: #0b1120; color: #e2e8f0; cursor: pointer; }
  button.start { background: var(--accent); color: #04293b; font-weight: 700; border: none; }
  button.start:hover { filter: brightness(1.1); }
  button:active { transform: scale(0.97); }
</style>
</head>
<body>
<a class="back" href="../">&larr; back</a>
<div class="card">
  <h1>🍉 Fruit Ninja Slice</h1>
  <p class="sub">Swipe the mouse / finger to slice flying fruit. Chain combos. Avoid the 💣 bombs. Miss 3 fruit and you're out.</p>
  <div class="hud"><span>Score: <b id="score">0</b></span><span>Combo: <b id="combo">0</b></span><span>Lives: <b id="lives">3</b></span></div>
  <canvas id="game" width="500" height="380"></canvas>
  <div class="msg" id="msg">Press Start</div>
  <div class="row"><button class="start" id="startBtn">Start</button></div>
</div>
<script>
const canvas = document.getElementById('game'), ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const scoreEl = document.getElementById('score'), comboEl = document.getElementById('combo'),
  livesEl = document.getElementById('lives'), msgEl = document.getElementById('msg'), startBtn = document.getElementById('startBtn');
const FRUITS = ['🍉', '🍎', '🍊', '🍓', '🍌', '🍇', '🥝'];
let objs, score, lives, combo, comboTimer, trail, running, raf, spawnTimer, lastP;

function start() {
  objs = []; score = 0; lives = 3; combo = 0; comboTimer = 0; trail = [];
  scoreEl.textContent = 0; comboEl.textContent = 0; livesEl.textContent = 3;
  spawnTimer = 0; lastP = null;
  running = true; msgEl.textContent = ''; startBtn.style.display = 'none';
  cancelAnimationFrame(raf); loop();
}
function gameOver() {
  running = false; cancelAnimationFrame(raf);
  msgEl.textContent = '💀 Game Over — score ' + score;
  startBtn.textContent = 'Play Again'; startBtn.style.display = 'inline-block';
}
function spawn() {
  const bomb = Math.random() < 0.16;
  const x = 50 + Math.random() * (W - 100);
  objs.push({ x, y: H + 30, vx: (W / 2 - x) * 0.008 + (Math.random() - 0.5) * 2,
    vy: -(11 + Math.random() * 4), bomb, sliced: false, r: 22,
    emoji: bomb ? '💣' : FRUITS[(Math.random() * FRUITS.length) | 0], spin: (Math.random() - 0.5) * 0.2, ang: 0 });
}
function pos(cx, cy) { const r = canvas.getBoundingClientRect(); return { x: (cx - r.left) / r.width * W, y: (cy - r.top) / r.height * H }; }
function onMove(cx, cy) {
  if (!running) return;
  const p = pos(cx, cy);
  trail.push({ x: p.x, y: p.y, life: 10 });
  if (lastP) slice(lastP, p);
  lastP = p;
}
canvas.addEventListener('mousemove', e => { if (e.buttons || true) onMove(e.clientX, e.clientY); });
canvas.addEventListener('mouseleave', () => lastP = null);
canvas.addEventListener('touchmove', e => { onMove(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); }, { passive: false });
canvas.addEventListener('touchend', () => lastP = null);

function segHit(p1, p2, o) {
  const dx = p2.x - p1.x, dy = p2.y - p1.y, l2 = dx * dx + dy * dy;
  if (l2 < 1) return Math.hypot(p1.x - o.x, p1.y - o.y) < o.r;
  let t = ((o.x - p1.x) * dx + (o.y - p1.y) * dy) / l2; t = Math.max(0, Math.min(1, t));
  return Math.hypot(p1.x + t * dx - o.x, p1.y + t * dy - o.y) < o.r;
}
function slice(p1, p2) {
  for (const o of objs) {
    if (o.sliced) continue;
    if (segHit(p1, p2, o)) {
      o.sliced = true;
      if (o.bomb) { gameOver(); return; }
      combo++; comboTimer = 30; comboEl.textContent = combo;
      score += 10 * combo; scoreEl.textContent = score;
      o.vy = -2; o.parts = true;
    }
  }
}

function update() {
  spawnTimer--;
  if (spawnTimer <= 0) { spawn(); if (Math.random() < 0.3) spawn(); spawnTimer = 35 + Math.random() * 40 - Math.min(20, score / 100); }
  for (const o of objs) {
    o.x += o.vx; o.y += o.vy; o.vy += 0.28; o.ang += o.spin;
    if (!o.sliced && o.y > H + 40 && o.vy > 0) {
      o.gone = true;
      if (!o.bomb) { lives--; combo = 0; comboEl.textContent = 0; livesEl.textContent = lives; if (lives <= 0) { gameOver(); return; } }
    }
    if (o.sliced && o.y > H + 60) o.gone = true;
  }
  objs = objs.filter(o => !o.gone);
  if (comboTimer > 0) { comboTimer--; if (comboTimer === 0) { combo = 0; comboEl.textContent = 0; } }
  for (const t of trail) t.life--;
  trail = trail.filter(t => t.life > 0);
}

function draw() {
  ctx.fillStyle = '#0b1120'; ctx.fillRect(0, 0, W, H);
  // trail
  ctx.strokeStyle = '#7dd3fc'; ctx.lineCap = 'round';
  for (let i = 1; i < trail.length; i++) {
    ctx.globalAlpha = trail[i].life / 10; ctx.lineWidth = trail[i].life;
    ctx.beginPath(); ctx.moveTo(trail[i - 1].x, trail[i - 1].y); ctx.lineTo(trail[i].x, trail[i].y); ctx.stroke();
  }
  ctx.globalAlpha = 1;
  ctx.font = '40px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (const o of objs) {
    ctx.save(); ctx.translate(o.x, o.y); ctx.rotate(o.ang);
    if (o.sliced && !o.bomb) ctx.globalAlpha = 0.5;
    ctx.fillText(o.emoji, 0, 0); ctx.restore(); ctx.globalAlpha = 1;
  }
}

function loop() { if (!running) return; update(); if (!running) return; draw(); raf = requestAnimationFrame(loop); }

function idle() { objs = []; trail = []; ctx.fillStyle = '#0b1120'; ctx.fillRect(0, 0, W, H);
  ctx.font = '40px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('🍉  🍎  💣', W / 2, H / 2); }
startBtn.addEventListener('click', start);
idle();
</script>
</body>
</html>
