<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Query String Parser</title>
<style>
  :root { --accent:#38bdf8; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; padding:24px;
    background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    color:#e2e8f0; font-family:system-ui, -apple-system, "Segoe UI", sans-serif; }
  a { color:var(--accent); text-decoration:none; }
  h1 { font-size:1.5rem; margin:.2rem 0 1rem; }
  .wrap { max-width:880px; margin:0 auto; }
  .panel { background:#111827; border:1px solid #1f2937; border-radius:14px; padding:18px; margin-bottom:18px; }
  label { display:block; font-size:.85rem; color:#94a3b8; margin-bottom:6px; }
  textarea, input { width:100%; background:#0b1120; color:#e2e8f0; border:1px solid #1f2937;
    border-radius:10px; padding:10px; font-family:ui-monospace, monospace; font-size:.9rem; }
  textarea { min-height:80px; resize:vertical; }
  button { background:var(--accent); color:#0b1120; border:none; border-radius:10px; padding:9px 16px;
    font-weight:600; cursor:pointer; font-size:.9rem; }
  button.sec { background:#1f2937; color:#e2e8f0; }
  .row { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
  table { width:100%; border-collapse:collapse; margin-top:6px; }
  th, td { text-align:left; padding:6px 8px; border-bottom:1px solid #1f2937; font-size:.9rem; }
  td input { padding:6px 8px; }
  th { color:#94a3b8; font-weight:500; }
  .del { background:#7f1d1d; color:#fecaca; padding:6px 10px; }
  .out { font-family:ui-monospace, monospace; word-break:break-all; background:#0b1120; padding:10px; border-radius:10px; border:1px solid #1f2937; }
</style>
</head>
<body>
<div class="wrap">
  <a href="../">&larr; back</a>
  <h1>Query String Parser</h1>
  <div class="panel">
    <label>Paste a URL or query string</label>
    <textarea id="input" placeholder="https://example.com/path?a=1&b=hello+world&tag=x&tag=y"></textarea>
    <div class="row">
      <button onclick="parseInput()">Parse</button>
      <button class="sec" onclick="addRow('','')">+ Add pair</button>
    </div>
  </div>
  <div class="panel">
    <label>Key / Value pairs (edit to rebuild)</label>
    <table><thead><tr><th>Key</th><th>Value</th><th></th></tr></thead><tbody id="rows"></tbody></table>
  </div>
  <div class="panel">
    <label>Rebuilt query string</label>
    <div class="out" id="out"></div>
    <div class="row"><button onclick="copyOut()">Copy</button></div>
  </div>
</div>
<script>
  var base = "";
  function addRow(k, v) {
    var tb = document.getElementById('rows');
    var tr = document.createElement('tr');
    var t1 = document.createElement('td'), t2 = document.createElement('td'), t3 = document.createElement('td');
    var i1 = document.createElement('input'), i2 = document.createElement('input');
    i1.value = k; i2.value = v;
    i1.oninput = rebuild; i2.oninput = rebuild;
    t1.appendChild(i1); t2.appendChild(i2);
    var b = document.createElement('button'); b.textContent = '×'; b.className = 'del';
    b.onclick = function(){ tr.remove(); rebuild(); };
    t3.appendChild(b);
    tr.appendChild(t1); tr.appendChild(t2); tr.appendChild(t3);
    tb.appendChild(tr);
    rebuild();
  }
  function parseInput() {
    var s = document.getElementById('input').value.trim();
    document.getElementById('rows').innerHTML = '';
    base = '';
    var qIndex = s.indexOf('?');
    var qs = s;
    if (qIndex >= 0) { base = s.slice(0, qIndex); qs = s.slice(qIndex + 1); }
    var hashIndex = qs.indexOf('#');
    if (hashIndex >= 0) qs = qs.slice(0, hashIndex);
    if (!qs) { rebuild(); return; }
    qs.split('&').forEach(function(part){
      if (!part) return;
      var eq = part.indexOf('=');
      var k, v;
      if (eq < 0) { k = part; v = ''; } else { k = part.slice(0, eq); v = part.slice(eq + 1); }
      addRow(dec(k), dec(v));
    });
    rebuild();
  }
  function dec(x){ try { return decodeURIComponent(x.replace(/\+/g, ' ')); } catch(e){ return x; } }
  function rebuild() {
    var rows = document.querySelectorAll('#rows tr');
    var parts = [];
    rows.forEach(function(r){
      var ins = r.querySelectorAll('input');
      if (ins[0].value === '' && ins[1].value === '') return;
      parts.push(encodeURIComponent(ins[0].value) + '=' + encodeURIComponent(ins[1].value));
    });
    var qs = parts.join('&');
    document.getElementById('out').textContent = (base ? base + (qs ? '?' : '') : (qs ? '?' : '')) + qs;
  }
  function copyOut(){ navigator.clipboard.writeText(document.getElementById('out').textContent); }
  parseInput();
</script>
</body>
</html>
