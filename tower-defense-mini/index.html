<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tower Defense Mini</title>
<style>
  :root { --accent: #38bdf8; }
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    color: #e2e8f0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
  .back { position: fixed; top: 16px; left: 16px; color: var(--accent); text-decoration: none; font-size: 14px; opacity: 0.8; }
  .back:hover { opacity: 1; }
  .card { background: #111827; border: 1px solid #1f2937; border-radius: 18px; padding: 24px;
    width: min(94vw, 540px); text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
  h1 { margin: 0 0 4px; font-size: 22px; }
  .sub { margin: 0 0 16px; color: #94a3b8; font-size: 13px; }
  .hud { display: flex; justify-content: space-between; font-size: 14px; color: #cbd5e1; margin-bottom: 10px; padding: 0 4px; }
  .hud b { color: var(--accent); }
  canvas { background: #0b1120; border: 1px solid #1f2937; border-radius: 12px; width: 100%; display: block; cursor: pointer; }
  .msg { margin-top: 14px; font-size: 15px; color: #94a3b8; min-height: 22px; }
  .row { display: flex; gap: 10px; justify-content: center; margin-top: 12px; }
  button { font-family: inherit; font-size: 15px; border-radius: 10px; border: 1px solid #1f2937; padding: 10px 16px; background: #0b1120; color: #e2e8f0; cursor: pointer; }
  button.start { background: var(--accent); color: #04293b; font-weight: 700; border: none; }
  button.start:hover { filter: brightness(1.1); }
  button:active { transform: scale(0.97); }
</style>
</head>
<body>
<a class="back" href="../">&larr; back</a>
<div class="card">
  <h1>🏰 Tower Defense Mini</h1>
  <p class="sub">Click empty grass to build a tower ($50). Towers auto-fire at enemies. Survive 8 waves. Don't let 10 enemies through.</p>
  <div class="hud"><span>💰 <b id="money">100</b></span><span>Wave: <b id="wave">0</b>/8</span><span>❤️ <b id="lives">10</b></span></div>
  <canvas id="game" width="520" height="360"></canvas>
  <div class="msg" id="msg">Press Start</div>
  <div class="row"><button class="start" id="startBtn">Start</button><button id="waveBtn" style="display:none">Next Wave</button></div>
</div>
<script>
const canvas = document.getElementById('game'), ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height, CELL = 40, COLS = W / CELL, ROWS = H / CELL;
const moneyEl = document.getElementById('money'), waveEl = document.getElementById('wave'),
  livesEl = document.getElementById('lives'), msgEl = document.getElementById('msg'),
  startBtn = document.getElementById('startBtn'), waveBtn = document.getElementById('waveBtn');
const COST = 50, MAXWAVE = 8;
// path as grid cells (col,row)
const pathCells = [[0,1],[1,1],[2,1],[2,2],[2,3],[3,3],[4,3],[5,3],[5,4],[5,5],[6,5],[7,5],[8,5],[8,4],[8,3],[9,3],[10,3],[11,3],[12,3]];
const pathSet = new Set(pathCells.map(c => c[0] + ',' + c[1]));
const waypoints = pathCells.map(c => ({ x: c[0] * CELL + CELL / 2, y: c[1] * CELL + CELL / 2 }));
let towers, enemies, bullets, money, wave, lives, running, raf, spawning, toSpawn, spawnTimer, waveActive;

function start() {
  towers = []; enemies = []; bullets = []; money = 100; wave = 0; lives = 10;
  moneyEl.textContent = 100; waveEl.textContent = 0; livesEl.textContent = 10;
  running = true; waveActive = false;
  msgEl.textContent = 'Build towers, then start a wave'; startBtn.style.display = 'none';
  waveBtn.style.display = 'inline-block'; waveBtn.textContent = 'Start Wave 1'; waveBtn.disabled = false;
  cancelAnimationFrame(raf); loop();
}
function endGame(win) {
  running = false; cancelAnimationFrame(raf); waveBtn.style.display = 'none';
  msgEl.textContent = win ? '🏆 You survived all waves!' : '💀 Base overrun on wave ' + wave;
  startBtn.textContent = 'Play Again'; startBtn.style.display = 'inline-block';
}
function startWave() {
  if (waveActive || wave >= MAXWAVE) return;
  wave++; waveEl.textContent = wave;
  toSpawn = 5 + wave * 2; spawnTimer = 0; waveActive = true;
  waveBtn.disabled = true; msgEl.textContent = 'Wave ' + wave + ' incoming!';
}
waveBtn.addEventListener('click', startWave);

canvas.addEventListener('click', e => {
  if (!running) return;
  const r = canvas.getBoundingClientRect();
  const col = Math.floor((e.clientX - r.left) / r.width * W / CELL);
  const row = Math.floor((e.clientY - r.top) / r.height * H / CELL);
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return;
  if (pathSet.has(col + ',' + row)) { msgEl.textContent = "Can't build on the path"; return; }
  if (towers.some(t => t.col === col && t.row === row)) return;
  if (money < COST) { msgEl.textContent = 'Need $' + COST; return; }
  money -= COST; moneyEl.textContent = money;
  towers.push({ col, row, x: col * CELL + CELL / 2, y: row * CELL + CELL / 2, range: 90, cool: 0, rate: 35 });
});

function spawnEnemy() {
  const hp = 30 + wave * 18;
  enemies.push({ wp: 0, x: waypoints[0].x, y: waypoints[0].y, hp, maxhp: hp, speed: 0.8 + wave * 0.06, reward: 12 });
}
function update() {
  if (waveActive) {
    spawnTimer--;
    if (toSpawn > 0 && spawnTimer <= 0) { spawnEnemy(); toSpawn--; spawnTimer = 40; }
  }
  for (const en of enemies) {
    const tgt = waypoints[en.wp + 1];
    if (!tgt) { en.done = true; lives--; livesEl.textContent = lives; continue; }
    const dx = tgt.x - en.x, dy = tgt.y - en.y, d = Math.hypot(dx, dy);
    if (d < en.speed * 1.5) { en.wp++; } else { en.x += dx / d * en.speed * 1.5; en.y += dy / d * en.speed * 1.5; }
  }
  enemies = enemies.filter(e => !e.done && !e.dead);
  if (lives <= 0) { endGame(false); return; }
  // towers
  for (const t of towers) {
    if (t.cool > 0) t.cool--;
    if (t.cool <= 0) {
      let tgt = null, bd = t.range;
      for (const en of enemies) { const d = Math.hypot(en.x - t.x, en.y - t.y); if (d < bd) { bd = d; tgt = en; } }
      if (tgt) { bullets.push({ x: t.x, y: t.y, tgt, speed: 5, dmg: 12 }); t.cool = t.rate; }
    }
  }
  for (const b of bullets) {
    if (b.tgt.dead || b.tgt.done) { b.dead = true; continue; }
    const dx = b.tgt.x - b.x, dy = b.tgt.y - b.y, d = Math.hypot(dx, dy);
    if (d < 8) { b.tgt.hp -= b.dmg; b.dead = true;
      if (b.tgt.hp <= 0 && !b.tgt.dead) { b.tgt.dead = true; money += b.tgt.reward; moneyEl.textContent = money; } }
    else { b.x += dx / d * b.speed; b.y += dy / d * b.speed; }
  }
  bullets = bullets.filter(b => !b.dead);
  enemies = enemies.filter(e => !e.dead);
  // wave end
  if (waveActive && toSpawn === 0 && enemies.length === 0) {
    waveActive = false; money += 30; moneyEl.textContent = money;
    if (wave >= MAXWAVE) { endGame(true); return; }
    waveBtn.disabled = false; waveBtn.textContent = 'Start Wave ' + (wave + 1);
    msgEl.textContent = 'Wave cleared! +$30';
  }
}
function draw() {
  ctx.fillStyle = '#0e3b1a'; ctx.fillRect(0, 0, W, H);
  // grid
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  for (let c = 0; c <= COLS; c++) { ctx.beginPath(); ctx.moveTo(c * CELL, 0); ctx.lineTo(c * CELL, H); ctx.stroke(); }
  for (let r = 0; r <= ROWS; r++) { ctx.beginPath(); ctx.moveTo(0, r * CELL); ctx.lineTo(W, r * CELL); ctx.stroke(); }
  // path
  ctx.fillStyle = '#7c5c33';
  for (const c of pathCells) ctx.fillRect(c[0] * CELL, c[1] * CELL, CELL, CELL);
  // towers
  for (const t of towers) {
    ctx.fillStyle = '#38bdf8'; ctx.beginPath(); ctx.arc(t.x, t.y, 13, 0, 7); ctx.fill();
    ctx.fillStyle = '#0b1120'; ctx.beginPath(); ctx.arc(t.x, t.y, 6, 0, 7); ctx.fill();
  }
  // enemies
  for (const en of enemies) {
    ctx.fillStyle = '#ef4444'; ctx.beginPath(); ctx.arc(en.x, en.y, 11, 0, 7); ctx.fill();
    ctx.fillStyle = '#0b1120'; ctx.fillRect(en.x - 12, en.y - 18, 24, 4);
    ctx.fillStyle = '#22c55e'; ctx.fillRect(en.x - 12, en.y - 18, 24 * Math.max(0, en.hp / en.maxhp), 4);
  }
  for (const b of bullets) { ctx.fillStyle = '#fbbf24'; ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, 7); ctx.fill(); }
}
function loop() { if (!running) return; update(); if (!running) return; draw(); raf = requestAnimationFrame(loop); }
function idle() { towers = []; enemies = []; bullets = []; draw(); }
startBtn.addEventListener('click', start);
idle();
</script>
</body>
</html>
