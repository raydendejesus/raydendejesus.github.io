<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tetris</title>
<style>
  body{margin:0;min-height:100vh;background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);color:#e2e8f0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;display:flex;flex-direction:column;align-items:center;padding:20px;}
  a.back{position:fixed;top:16px;left:16px;color:#38bdf8;text-decoration:none;}
  a.back:hover{text-decoration:underline;}
  h1{margin:8px 0;}
  .wrap{display:flex;gap:18px;align-items:flex-start;}
  .panel{background:#111827;border:1px solid #1f2937;border-radius:16px;padding:14px;}
  canvas{display:block;background:#0b1120;border-radius:10px;}
  .stat{margin:6px 0;font-size:15px;}
  .stat b{color:#38bdf8;font-size:20px;}
  .hint{color:#94a3b8;font-size:13px;margin-top:14px;line-height:1.6;}
  button{background:#0b1120;color:#e2e8f0;border:1px solid #1f2937;border-radius:10px;padding:8px 14px;font:inherit;cursor:pointer;margin-top:8px;width:100%;}
  button:hover{border-color:#38bdf8;}
</style>
</head>
<body>
<a class="back" href="../">← back</a>
<h1>Tetris</h1>
<div class="wrap">
  <div class="panel"><canvas id="c" width="240" height="480"></canvas></div>
  <div class="panel" style="min-width:140px;">
    <div class="stat">Score<br><b id="score">0</b></div>
    <div class="stat">Lines<br><b id="lines">0</b></div>
    <div class="stat">Level<br><b id="level">1</b></div>
    <div class="stat">Next</div>
    <canvas id="next" width="120" height="80" style="background:#0b1120;border-radius:8px;"></canvas>
    <button id="restart">New Game</button>
    <div class="hint">← → move<br>↑ rotate<br>↓ soft drop<br>Space hard drop<br>P pause</div>
  </div>
</div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const nx=document.getElementById('next'),nctx=nx.getContext('2d');
const COLS=10,ROWS=20,S=24;
const COLORS=[null,'#22d3ee','#3b82f6','#f59e0b','#fbbf24','#34d399','#a78bfa','#f87171'];
const SHAPES=[[],
  [[1,1,1,1]],            //I
  [[2,0,0],[2,2,2]],      //J
  [[0,0,3],[3,3,3]],      //L
  [[4,4],[4,4]],          //O
  [[0,5,5],[5,5,0]],      //S
  [[0,6,0],[6,6,6]],      //T
  [[7,7,0],[0,7,7]]];     //Z
let board,cur,next,pos,score,lines,level,dropTimer,dropInt,over,paused,raf;
function newBoard(){return Array.from({length:ROWS},()=>Array(COLS).fill(0));}
function rndPiece(){const t=1+Math.floor(Math.random()*7);return SHAPES[t].map(r=>r.slice());}
function init(){
  board=newBoard();score=0;lines=0;level=1;dropInt=800;over=false;paused=false;
  next=rndPiece();spawn();updateStats();
  cancelAnimationFrame(raf);lastTime=performance.now();dropTimer=0;loop();
}
function spawn(){
  cur=next;next=rndPiece();
  pos={x:Math.floor((COLS-cur[0].length)/2),y:0};
  drawNext();
  if(collide(cur,pos.x,pos.y)){over=true;}
}
function collide(shape,x,y){
  for(let r=0;r<shape.length;r++)for(let c=0;c<shape[r].length;c++){
    if(!shape[r][c])continue;
    const nx2=x+c,ny=y+r;
    if(nx2<0||nx2>=COLS||ny>=ROWS)return true;
    if(ny>=0&&board[ny][nx2])return true;
  }
  return false;
}
function merge(){
  for(let r=0;r<cur.length;r++)for(let c=0;c<cur[r].length;c++)
    if(cur[r][c]&&pos.y+r>=0)board[pos.y+r][pos.x+c]=cur[r][c];
}
function rotate(){
  const s=cur;const R=s[0].map((_,i)=>s.map(row=>row[i]).reverse());
  if(!collide(R,pos.x,pos.y))cur=R;
  else if(!collide(R,pos.x-1,pos.y)){cur=R;pos.x--;}
  else if(!collide(R,pos.x+1,pos.y)){cur=R;pos.x++;}
}
function clearLines(){
  let cleared=0;
  for(let r=ROWS-1;r>=0;r--){
    if(board[r].every(v=>v)){board.splice(r,1);board.unshift(Array(COLS).fill(0));cleared++;r++;}
  }
  if(cleared){
    score+=[0,100,300,500,800][cleared]*level;
    lines+=cleared;level=1+Math.floor(lines/10);dropInt=Math.max(120,800-(level-1)*70);
    updateStats();
  }
}
function lock(){
  merge();clearLines();spawn();
}
function move(dx){if(!collide(cur,pos.x+dx,pos.y))pos.x+=dx;}
function softDrop(){
  if(!collide(cur,pos.x,pos.y+1))pos.y++;
  else lock();
}
function hardDrop(){while(!collide(cur,pos.x,pos.y+1))pos.y++;lock();}
function updateStats(){
  document.getElementById('score').textContent=score;
  document.getElementById('lines').textContent=lines;
  document.getElementById('level').textContent=level;
}
function drawCell(g,x,y,v,size){
  g.fillStyle=COLORS[v];g.fillRect(x*size,y*size,size,size);
  g.fillStyle='rgba(255,255,255,.18)';g.fillRect(x*size,y*size,size,4);
  g.strokeStyle='#0b1120';g.strokeRect(x*size,y*size,size,size);
}
function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(board[r][c])drawCell(ctx,c,r,board[r][c],S);
  for(let r=0;r<cur.length;r++)for(let c=0;c<cur[r].length;c++)
    if(cur[r][c])drawCell(ctx,pos.x+c,pos.y+r,cur[r][c],S);
  if(over){
    ctx.fillStyle='rgba(11,17,32,.8)';ctx.fillRect(0,180,cv.width,120);
    ctx.fillStyle='#f87171';ctx.font='bold 26px system-ui';ctx.textAlign='center';
    ctx.fillText('Game Over',cv.width/2,230);
    ctx.fillStyle='#e2e8f0';ctx.font='14px system-ui';ctx.fillText('Press New Game',cv.width/2,260);
  }
  if(paused){
    ctx.fillStyle='rgba(11,17,32,.7)';ctx.fillRect(0,200,cv.width,80);
    ctx.fillStyle='#38bdf8';ctx.font='bold 24px system-ui';ctx.textAlign='center';
    ctx.fillText('Paused',cv.width/2,250);
  }
}
function drawNext(){
  nctx.clearRect(0,0,nx.width,nx.height);
  const off=(4-next[0].length)/2;
  for(let r=0;r<next.length;r++)for(let c=0;c<next[r].length;c++)
    if(next[r][c])drawCell(nctx,c+off,r+0.5,next[r][c],20);
}
let lastTime=0;
function loop(t){
  raf=requestAnimationFrame(loop);
  if(over){draw();return;}
  if(paused){draw();return;}
  const dt=t-lastTime;lastTime=t;dropTimer+=dt;
  if(dropTimer>dropInt){dropTimer=0;softDrop();}
  draw();
}
window.addEventListener('keydown',e=>{
  if(e.key==='p'||e.key==='P'){paused=!paused;return;}
  if(over||paused)return;
  if(e.key==='ArrowLeft'){move(-1);}
  else if(e.key==='ArrowRight'){move(1);}
  else if(e.key==='ArrowDown'){softDrop();dropTimer=0;}
  else if(e.key==='ArrowUp'){rotate();}
  else if(e.code==='Space'){e.preventDefault();hardDrop();}
});
document.getElementById('restart').addEventListener('click',init);
init();
</script>
</body>
</html>
