<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battleship</title>
<style>
  body{margin:0;min-height:100vh;background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);color:#e2e8f0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;display:flex;flex-direction:column;align-items:center;padding:20px;}
  a.back{position:fixed;top:16px;left:16px;color:#38bdf8;text-decoration:none;}
  a.back:hover{text-decoration:underline;}
  h1{margin:8px 0;}
  .boards{display:flex;gap:30px;flex-wrap:wrap;justify-content:center;}
  .panel{background:#111827;border:1px solid #1f2937;border-radius:18px;padding:14px;}
  h3{margin:0 0 8px;text-align:center;}
  .grid{display:grid;grid-template-columns:repeat(10,32px);gap:2px;}
  .c{width:32px;height:32px;background:#0b2a4a;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;}
  .c.ship{background:#475569;}
  .c.hit{background:#ef4444;}
  .c.miss{background:#1e293b;color:#64748b;}
  .c.sunk{background:#991b1b;}
  .c.preview{background:#38bdf8;}
  .c.bad{background:#dc2626;}
  .enemy .c.ship{background:#0b2a4a;} /* hide enemy ships */
  #msg{text-align:center;margin-top:12px;font-weight:600;font-size:18px;min-height:24px;}
  .row{display:flex;gap:10px;margin-top:8px;}
  button{background:#0b1120;color:#e2e8f0;border:1px solid #1f2937;border-radius:10px;padding:8px 14px;font:inherit;cursor:pointer;}
  button:hover{border-color:#38bdf8;}
</style>
</head>
<body>
<a class="back" href="../">← back</a>
<h1>Battleship</h1>
<div id="msg">Place your ships. Click to place, R to rotate.</div>
<div class="boards">
  <div class="panel"><h3>Your fleet</h3><div id="me" class="grid"></div></div>
  <div class="panel"><h3>Enemy waters</h3><div id="enemy" class="grid enemy"></div></div>
</div>
<div class="row"><button id="rotate">Rotate (R)</button><button id="random">Random</button><button id="reset">New Game</button></div>
<script>
const N=10, SHIPS=[5,4,3,3,2];
const meEl=document.getElementById('me'), enemyEl=document.getElementById('enemy'), msg=document.getElementById('msg');
let myGrid, enemyGrid, myShips, enemyShips, phase, placeIdx, horiz, aiTargets, hoverRC;
function empty(){return Array.from({length:N},()=>Array(N).fill(0));}
function init(){
  myGrid=empty();enemyGrid=empty();myShips=[];enemyShips=[];
  phase='place';placeIdx=0;horiz=true;aiTargets=[];hoverRC=null;
  placeRandom(enemyGrid,enemyShips);
  msg.textContent='Place ship of size '+SHIPS[0]+' (R to rotate)';
  render();
}
function canPlace(grid,r,c,len,h){
  for(let i=0;i<len;i++){const rr=h?r:r+i,cc=h?c+i:c;if(rr<0||rr>=N||cc<0||cc>=N||grid[rr][cc])return false;}
  return true;
}
function placeShip(grid,ships,r,c,len,h){
  const cells=[];for(let i=0;i<len;i++){const rr=h?r:r+i,cc=h?c+i:c;grid[rr][cc]=1;cells.push([rr,cc]);}
  ships.push({cells,hits:0,len});
}
function placeRandom(grid,ships){
  ships.length=0;for(let i=0;i<N;i++)for(let j=0;j<N;j++)grid[i][j]=0;
  for(const len of SHIPS){let done=false;while(!done){const h=Math.random()<.5,r=Math.floor(Math.random()*N),c=Math.floor(Math.random()*N);if(canPlace(grid,r,c,len,h)){placeShip(grid,ships,r,c,len,h);done=true;}}}
}
function render(){
  drawGrid(meEl,myGrid,false);
  drawGrid(enemyEl,enemyGrid,true);
}
function drawGrid(el,grid,enemy){
  el.innerHTML='';
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    const d=document.createElement('div');d.className='c';
    const v=grid[r][c];
    if(v===1&&!enemy)d.classList.add('ship');
    if(v===2)d.classList.add('miss'),d.textContent='•';
    if(v===3)d.classList.add('hit');
    if(v===4)d.classList.add('sunk');
    d.dataset.r=r;d.dataset.c=c;
    if(enemy&&phase==='play')d.addEventListener('click',()=>fire(r,c));
    if(!enemy&&phase==='place'){
      d.addEventListener('click',()=>tryPlace(r,c));
      d.addEventListener('mouseenter',()=>{hoverRC=[r,c];previewPlace();});
    }
    el.appendChild(d);
  }
  if(phase==='place'&&hoverRC)previewPlace();
}
function previewPlace(){
  meEl.querySelectorAll('.preview,.bad').forEach(e=>e.classList.remove('preview','bad'));
  if(!hoverRC)return;const [r,c]=hoverRC;const len=SHIPS[placeIdx];const ok=canPlace(myGrid,r,c,len,horiz);
  for(let i=0;i<len;i++){const rr=horiz?r:r+i,cc=horiz?c+i:c;if(rr<0||rr>=N||cc<0||cc>=N)continue;const idx=rr*N+cc;const cell=meEl.children[idx];if(cell)cell.classList.add(ok?'preview':'bad');}
}
function tryPlace(r,c){
  const len=SHIPS[placeIdx];
  if(!canPlace(myGrid,r,c,len,horiz))return;
  placeShip(myGrid,myShips,r,c,len,horiz);
  placeIdx++;
  if(placeIdx>=SHIPS.length){phase='play';msg.textContent='Fire at enemy waters!';hoverRC=null;}
  else msg.textContent='Place ship of size '+SHIPS[placeIdx]+' (R to rotate)';
  render();
}
function shipAt(ships,r,c){return ships.find(s=>s.cells.some(([sr,sc])=>sr===r&&sc===c));}
function fire(r,c){
  if(phase!=='play'||enemyGrid[r][c]>=2)return;
  if(enemyGrid[r][c]===1){enemyGrid[r][c]=3;const s=shipAt(enemyShips,r,c);s.hits++;if(s.hits===s.len){for(const [sr,sc] of s.cells)enemyGrid[sr][sc]=4;msg.textContent='You sunk a ship!';}else msg.textContent='Hit!';}
  else{enemyGrid[r][c]=2;msg.textContent='Miss.';}
  render();
  if(enemyShips.every(s=>s.hits===s.len)){phase='over';msg.textContent='You win! 🎉';return;}
  phase='ai';setTimeout(aiFire,500);
}
function aiFire(){
  let r,c;
  if(aiTargets.length){[r,c]=aiTargets.pop();if(myGrid[r][c]>=2)return aiFire();}
  else{do{r=Math.floor(Math.random()*N);c=Math.floor(Math.random()*N);}while(myGrid[r][c]>=2);}
  if(myGrid[r][c]===1){myGrid[r][c]=3;const s=shipAt(myShips,r,c);s.hits++;
    if(s.hits===s.len){for(const [sr,sc] of s.cells)myGrid[sr][sc]=4;aiTargets=[];}
    else{for(const [dr,dc] of [[0,1],[0,-1],[1,0],[-1,0]]){const nr=r+dr,nc=c+dc;if(nr>=0&&nr<N&&nc>=0&&nc<N&&myGrid[nr][nc]<2)aiTargets.push([nr,nc]);}}
    msg.textContent='Enemy hit your ship!';
  }else{myGrid[r][c]=2;msg.textContent='Enemy missed.';}
  render();
  if(myShips.every(s=>s.hits===s.len)){phase='over';msg.textContent='Enemy wins. 💥';return;}
  phase='play';
}
document.getElementById('rotate').addEventListener('click',()=>{horiz=!horiz;previewPlace();});
document.addEventListener('keydown',e=>{if(e.key.toLowerCase()==='r'&&phase==='place'){horiz=!horiz;previewPlace();}});
document.getElementById('random').addEventListener('click',()=>{if(phase!=='place')return;myGrid=empty();myShips=[];placeRandom(myGrid,myShips);placeIdx=SHIPS.length;phase='play';msg.textContent='Fire at enemy waters!';render();});
document.getElementById('reset').addEventListener('click',init);
init();
</script>
</body>
</html>
