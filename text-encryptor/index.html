<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Text Encryptor</title>
<style>
  :root { --accent:#38bdf8; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; padding:24px;
    background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    color:#e2e8f0; font-family:system-ui, -apple-system, "Segoe UI", sans-serif; }
  a { color:var(--accent); text-decoration:none; }
  a:hover { text-decoration:underline; }
  h1 { font-size:1.4rem; margin:.4rem 0 1rem; }
  .panel { background:#111827; border:1px solid #1f2937; border-radius:14px; padding:16px; margin-bottom:16px; }
  textarea { width:100%; min-height:140px; resize:vertical; background:#0b1120; color:#e2e8f0;
    border:1px solid #1f2937; border-radius:10px; padding:10px; font-family:ui-monospace,Consolas,monospace; font-size:13px; }
  label { display:inline-flex; align-items:center; gap:6px; margin-right:16px; font-size:14px; }
  input[type=password], input[type=text] { background:#0b1120; color:#e2e8f0; border:1px solid #1f2937; border-radius:8px; padding:8px; width:260px; font-family:inherit; }
  button { background:var(--accent); color:#06283d; border:none; border-radius:10px; padding:9px 16px; font-weight:600; cursor:pointer; font-size:14px; }
  button:hover { filter:brightness(1.08); }
  button.secondary { background:#1f2937; color:#e2e8f0; }
  .row { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin:12px 0; }
  .status { font-size:13px; color:#94a3b8; }
  .err { color:#f87171; }
</style>
</head>
<body>
  <a href="../">&larr; back</a>
  <h1>Text Encryptor</h1>
  <div class="panel">
    <label>Passphrase <input type="password" id="pass" placeholder="secret"></label>
    <label><input type="checkbox" id="show"> Show</label>
    <div class="status">Uses AES-GCM (256-bit) with PBKDF2 key derivation via the browser's built-in SubtleCrypto. Output is Base64.</div>
  </div>
  <div class="panel">
    <textarea id="input" placeholder="Plaintext to encrypt, or Base64 ciphertext to decrypt..."></textarea>
    <div class="row">
      <button id="enc">Encrypt</button>
      <button id="dec">Decrypt</button>
      <button class="secondary" id="clear">Clear</button>
      <span class="status" id="status"></span>
    </div>
  </div>
  <div class="panel">
    <textarea id="output" placeholder="Result..." readonly></textarea>
    <div class="row"><button class="secondary" id="copy">Copy</button></div>
  </div>
<script>
  const $ = id => document.getElementById(id);
  const enc = new TextEncoder(), dec = new TextDecoder();
  function b64encode(buf){ return btoa(String.fromCharCode(...new Uint8Array(buf))); }
  function b64decode(str){ return Uint8Array.from(atob(str), c => c.charCodeAt(0)); }
  async function deriveKey(pass, salt) {
    const base = await crypto.subtle.importKey('raw', enc.encode(pass), 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey(
      { name:'PBKDF2', salt, iterations:150000, hash:'SHA-256' },
      base, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']);
  }
  function setStatus(msg, err){ const s=$('status'); s.textContent=msg; s.className = 'status' + (err?' err':''); }
  async function encrypt() {
    const pass = $('pass').value;
    if (!pass) return setStatus('Enter a passphrase.', true);
    try {
      const salt = crypto.getRandomValues(new Uint8Array(16));
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const key = await deriveKey(pass, salt);
      const ct = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, key, enc.encode($('input').value));
      const out = new Uint8Array(salt.length + iv.length + ct.byteLength);
      out.set(salt, 0); out.set(iv, salt.length); out.set(new Uint8Array(ct), salt.length+iv.length);
      $('output').value = b64encode(out.buffer);
      setStatus('Encrypted.');
    } catch (e) { setStatus('Error: ' + e.message, true); }
  }
  async function decrypt() {
    const pass = $('pass').value;
    if (!pass) return setStatus('Enter a passphrase.', true);
    try {
      const data = b64decode($('input').value.trim());
      const salt = data.slice(0,16), iv = data.slice(16,28), ct = data.slice(28);
      const key = await deriveKey(pass, salt);
      const pt = await crypto.subtle.decrypt({ name:'AES-GCM', iv }, key, ct);
      $('output').value = dec.decode(pt);
      setStatus('Decrypted.');
    } catch (e) { setStatus('Decryption failed (wrong passphrase or invalid input).', true); }
  }
  $('enc').onclick = encrypt;
  $('dec').onclick = decrypt;
  $('show').onchange = e => { $('pass').type = e.target.checked ? 'text' : 'password'; };
  $('clear').onclick = () => { $('input').value=''; $('output').value=''; setStatus(''); };
  $('copy').onclick = async () => {
    await navigator.clipboard.writeText($('output').value);
    const b=$('copy'); b.textContent='Copied!'; setTimeout(()=>b.textContent='Copy',1200);
  };
</script>
</body>
</html>
