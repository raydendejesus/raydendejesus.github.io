<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random String Generator</title>
<style>
  :root { --accent:#38bdf8; }
  * { box-sizing:border-box; }
  body { margin:0; padding:24px; background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120); color:#e2e8f0; font-family:system-ui,-apple-system,"Segoe UI",sans-serif; min-height:100vh; }
  a.back { color:var(--accent); text-decoration:none; font-size:14px; }
  a.back:hover { text-decoration:underline; }
  h1 { font-size:24px; margin:12px 0 4px; }
  p.sub { color:#94a3b8; margin:0 0 20px; }
  .wrap { max-width:760px; margin:0 auto; }
  .panel { background:#111827; border:1px solid #1f2937; border-radius:14px; padding:18px; margin-bottom:18px; }
  .row { display:flex; gap:18px; flex-wrap:wrap; align-items:center; }
  label { font-size:14px; }
  .row label.chk { display:flex; align-items:center; gap:6px; }
  input[type=number] { width:90px; background:#0b1120; color:#e2e8f0; border:1px solid #1f2937; border-radius:6px; padding:6px 8px; font-size:14px; }
  input[type=text] { width:100%; background:#0b1120; color:#e2e8f0; border:1px solid #1f2937; border-radius:6px; padding:8px 10px; font-size:14px; font-family:ui-monospace,monospace; }
  input[type=checkbox] { accent-color:var(--accent); }
  .field { margin-bottom:12px; }
  .field > span { display:block; font-size:13px; color:#94a3b8; margin-bottom:6px; }
  textarea { width:100%; min-height:220px; background:#0b1120; color:#e2e8f0; border:1px solid #1f2937; border-radius:8px; padding:12px; font-family:ui-monospace,monospace; font-size:13px; resize:vertical; }
  button { background:var(--accent); color:#04263a; border:none; border-radius:10px; padding:10px 16px; font-weight:600; cursor:pointer; font-size:14px; }
  button.ghost { background:transparent; color:var(--accent); border:1px solid var(--accent); }
  button:active { transform:translateY(1px); }
  .btns { display:flex; gap:10px; margin-top:12px; flex-wrap:wrap; }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="../">&larr; back</a>
  <h1>Random String Generator</h1>
  <p class="sub">Choose length, charset and count. Cryptographically random.</p>
  <div class="panel">
    <div class="field"><span>Charset</span>
      <div class="row">
        <label class="chk"><input type="checkbox" id="lower" checked> a-z</label>
        <label class="chk"><input type="checkbox" id="upper" checked> A-Z</label>
        <label class="chk"><input type="checkbox" id="digits" checked> 0-9</label>
        <label class="chk"><input type="checkbox" id="symbols"> symbols</label>
        <label class="chk"><input type="checkbox" id="nosim"> no ambiguous (0O1lI)</label>
      </div>
    </div>
    <div class="field"><span>Custom charset (overrides above if filled)</span>
      <input type="text" id="custom" placeholder="e.g. ABCDEF0123456789">
    </div>
    <div class="row">
      <label>Length <input type="number" id="length" value="16" min="1" max="4096"></label>
      <label>Count <input type="number" id="count" value="5" min="1" max="1000"></label>
    </div>
    <div class="btns"><button id="genBtn">Generate</button></div>
  </div>
  <div class="panel">
    <textarea id="output" readonly></textarea>
    <div class="btns"><button id="copyBtn">Copy</button></div>
  </div>
</div>
<script>
const SYM="!@#$%^&*()-_=+[]{};:,.<>?";
function buildCharset(){
  const custom=document.getElementById('custom').value;
  if(custom) return [...new Set(custom.split(''))].join('');
  let cs='';
  if(document.getElementById('lower').checked) cs+='abcdefghijklmnopqrstuvwxyz';
  if(document.getElementById('upper').checked) cs+='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  if(document.getElementById('digits').checked) cs+='0123456789';
  if(document.getElementById('symbols').checked) cs+=SYM;
  if(document.getElementById('nosim').checked) cs=cs.replace(/[0O1lI]/g,'');
  return cs;
}
function randStr(len,cs){
  const arr=new Uint32Array(len); crypto.getRandomValues(arr);
  let s=''; for(let i=0;i<len;i++) s+=cs[arr[i]%cs.length];
  return s;
}
function generate(){
  const cs=buildCharset();
  const out=document.getElementById('output');
  if(!cs){ out.value='Select at least one charset.'; return; }
  const len=Math.max(1,Math.min(4096,+document.getElementById('length').value||1));
  const count=Math.max(1,Math.min(1000,+document.getElementById('count').value||1));
  const lines=[]; for(let i=0;i<count;i++) lines.push(randStr(len,cs));
  out.value=lines.join('\n');
}
document.getElementById('genBtn').addEventListener('click',generate);
document.getElementById('copyBtn').addEventListener('click', async e=>{
  const out=document.getElementById('output'); if(!out.value) return;
  try{ await navigator.clipboard.writeText(out.value); }catch{ out.select(); document.execCommand('copy'); }
  const b=e.target,t=b.textContent; b.textContent='Copied!'; setTimeout(()=>b.textContent=t,1200);
});
generate();
</script>
</body>
</html>
