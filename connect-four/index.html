<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connect Four</title>
<style>
  body{margin:0;min-height:100vh;background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);color:#e2e8f0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;display:flex;flex-direction:column;align-items:center;padding:20px;}
  a.back{position:fixed;top:16px;left:16px;color:#38bdf8;text-decoration:none;}
  a.back:hover{text-decoration:underline;}
  h1{margin:8px 0;}
  .panel{background:#111827;border:1px solid #1f2937;border-radius:18px;padding:16px;}
  #board{display:grid;grid-template-columns:repeat(7,52px);gap:6px;background:#0b3a6b;padding:10px;border-radius:14px;}
  .cell{width:52px;height:52px;border-radius:50%;background:#0b1120;cursor:pointer;transition:background .15s;}
  .cell.r{background:radial-gradient(circle at 35% 35%,#fca5a5,#ef4444);}
  .cell.y{background:radial-gradient(circle at 35% 35%,#fde68a,#f59e0b);}
  .col:hover .cell:first-child{outline:2px solid #38bdf8;outline-offset:-2px;}
  #msg{text-align:center;margin-top:12px;min-height:24px;font-weight:600;font-size:18px;}
  button{background:#0b1120;color:#e2e8f0;border:1px solid #1f2937;border-radius:10px;padding:8px 14px;font:inherit;cursor:pointer;margin-top:8px;}
  button:hover{border-color:#38bdf8;}
</style>
</head>
<body>
<a class="back" href="../">← back</a>
<h1>Connect Four</h1>
<div class="panel"><div id="board"></div></div>
<div id="msg">Your turn (red)</div>
<button id="reset">New Game</button>
<script>
const ROWS=6,COLS=7,boardEl=document.getElementById('board'),msgEl=document.getElementById('msg');
let grid,over;
function init(){grid=Array.from({length:ROWS},()=>Array(COLS).fill(0));over=false;msgEl.textContent='Your turn (red)';msgEl.style.color='#e2e8f0';render();}
function render(){
  boardEl.innerHTML='';
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const cell=document.createElement('div');
    cell.className='cell'+(grid[r][c]===1?' r':grid[r][c]===2?' y':'');
    cell.addEventListener('click',()=>play(c));
    boardEl.appendChild(cell);
  }
}
function drop(col,player){
  for(let r=ROWS-1;r>=0;r--)if(grid[r][col]===0){grid[r][col]=player;return r;}
  return -1;
}
function play(col){
  if(over)return;
  const r=drop(col,1);if(r<0)return;render();
  if(wins(1)){end('You win! 🎉');return;}
  if(full()){end("It's a draw");return;}
  setTimeout(aiMove,300);
}
function aiMove(){
  let col=chooseAI();
  drop(col,2);render();
  if(wins(2)){end('AI wins');return;}
  if(full()){end("It's a draw");return;}
}
function landingRow(col){for(let r=ROWS-1;r>=0;r--)if(grid[r][col]===0)return r;return -1;}
function chooseAI(){
  // 1. win if possible, 2. block player, 3. center-biased
  for(let c=0;c<COLS;c++){const r=landingRow(c);if(r>=0&&testWin(r,c,2))return c;}
  for(let c=0;c<COLS;c++){const r=landingRow(c);if(r>=0&&testWin(r,c,1))return c;}
  const order=[3,2,4,1,5,0,6];
  for(const c of order)if(grid[0][c]===0)return c;
  return 3;
}
function testWin(r,c,p){grid[r][c]=p;const w=wins(p);grid[r][c]=0;return w;}
function full(){return grid[0].every(v=>v!==0);}
function wins(p){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(grid[r][c]!==p)continue;
    for(const[dr,dc]of[[0,1],[1,0],[1,1],[1,-1]]){
      let k=1;
      while(k<4){const nr=r+dr*k,nc=c+dc*k;if(nr<0||nr>=ROWS||nc<0||nc>=COLS||grid[nr][nc]!==p)break;k++;}
      if(k===4)return true;
    }
  }
  return false;
}
function end(t){over=true;msgEl.textContent=t;msgEl.style.color=t.includes('win!')?'#34d399':t.includes('AI')?'#f87171':'#fbbf24';}
document.getElementById('reset').addEventListener('click',init);
init();
</script>
</body>
</html>
