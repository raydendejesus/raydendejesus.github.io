<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASCII Art Generator</title>
<style>
  :root { --accent:#38bdf8; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; padding:24px;
    background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    color:#e2e8f0; font-family:system-ui, -apple-system, "Segoe UI", sans-serif; }
  a { color:var(--accent); text-decoration:none; }
  h1 { font-size:1.5rem; margin:.2rem 0 1rem; }
  .wrap { max-width:960px; margin:0 auto; }
  .panel { background:#111827; border:1px solid #1f2937; border-radius:14px; padding:18px; margin-bottom:18px; }
  label { display:block; font-size:.85rem; color:#94a3b8; margin-bottom:6px; }
  input, select { background:#0b1120; color:#e2e8f0; border:1px solid #1f2937; border-radius:10px; padding:10px; font-size:1rem; }
  input { width:100%; }
  button { background:var(--accent); color:#0b1120; border:none; border-radius:10px; padding:9px 16px; font-weight:600; cursor:pointer; }
  .row { display:flex; gap:10px; margin-top:12px; align-items:center; flex-wrap:wrap; }
  pre { background:#0b1120; border:1px solid #1f2937; border-radius:10px; padding:14px; overflow:auto; font-size:13px; line-height:1.05; color:#86efac; white-space:pre; }
</style>
</head>
<body>
<div class="wrap">
  <a href="../">&larr; back</a>
  <h1>ASCII Art Generator</h1>
  <div class="panel">
    <label>Text</label>
    <input id="txt" value="HELLO" oninput="gen()" maxlength="20">
    <div class="row">
      <label style="margin:0">Fill char</label>
      <select id="fill" onchange="gen()">
        <option>#</option><option>█</option><option>@</option><option>*</option><option>0</option><option>$</option>
      </select>
      <button onclick="copyOut()">Copy</button>
    </div>
  </div>
  <div class="panel"><pre id="out"></pre></div>
</div>
<script>
  // 5-row block font. Each glyph is 5 strings; "X" = filled, " " = blank.
  var F = {
    'A':["  X  "," X X ","X   X","XXXXX","X   X"],
    'B':["XXXX ","X   X","XXXX ","X   X","XXXX "],
    'C':[" XXXX","X    ","X    ","X    "," XXXX"],
    'D':["XXXX ","X   X","X   X","X   X","XXXX "],
    'E':["XXXXX","X    ","XXXX ","X    ","XXXXX"],
    'F':["XXXXX","X    ","XXXX ","X    ","X    "],
    'G':[" XXXX","X    ","X  XX","X   X"," XXXX"],
    'H':["X   X","X   X","XXXXX","X   X","X   X"],
    'I':["XXXXX","  X  ","  X  ","  X  ","XXXXX"],
    'J':["XXXXX","   X ","   X ","X  X "," XX  "],
    'K':["X   X","X  X ","XXX  ","X  X ","X   X"],
    'L':["X    ","X    ","X    ","X    ","XXXXX"],
    'M':["X   X","XX XX","X X X","X   X","X   X"],
    'N':["X   X","XX  X","X X X","X  XX","X   X"],
    'O':[" XXX ","X   X","X   X","X   X"," XXX "],
    'P':["XXXX ","X   X","XXXX ","X    ","X    "],
    'Q':[" XXX ","X   X","X X X","X  X "," XX X"],
    'R':["XXXX ","X   X","XXXX ","X  X ","X   X"],
    'S':[" XXXX","X    "," XXX ","    X","XXXX "],
    'T':["XXXXX","  X  ","  X  ","  X  ","  X  "],
    'U':["X   X","X   X","X   X","X   X"," XXX "],
    'V':["X   X","X   X","X   X"," X X ","  X  "],
    'W':["X   X","X   X","X X X","XX XX","X   X"],
    'X':["X   X"," X X ","  X  "," X X ","X   X"],
    'Y':["X   X"," X X ","  X  ","  X  ","  X  "],
    'Z':["XXXXX","   X ","  X  "," X   ","XXXXX"],
    '0':[" XXX ","X  XX","X X X","XX  X"," XXX "],
    '1':["  X  "," XX  ","  X  ","  X  ","XXXXX"],
    '2':[" XXX ","X   X","  XX "," X   ","XXXXX"],
    '3':["XXXX ","    X"," XXX ","    X","XXXX "],
    '4':["X  X ","X  X ","XXXXX","   X ","   X "],
    '5':["XXXXX","X    ","XXXX ","    X","XXXX "],
    '6':[" XXX ","X    ","XXXX ","X   X"," XXX "],
    '7':["XXXXX","    X","   X ","  X  ","  X  "],
    '8':[" XXX ","X   X"," XXX ","X   X"," XXX "],
    '9':[" XXX ","X   X"," XXXX","    X"," XXX "],
    '!':["  X  ","  X  ","  X  ","     ","  X  "],
    '?':[" XXX ","X   X","  XX ","     ","  X  "],
    '.':["     ","     ","     ","     ","  X  "],
    ',':["     ","     ","     ","  X  "," X   "],
    '-':["     ","     ","XXXXX","     ","     "],
    '+':["     ","  X  ","XXXXX","  X  ","     "],
    ':':["     ","  X  ","     ","  X  ","     "],
    '/':["    X","   X ","  X  "," X   ","X    "],
    ' ':["     ","     ","     ","     ","     "]
  };
  function gen() {
    var text = document.getElementById('txt').value.toUpperCase();
    var fill = document.getElementById('fill').value;
    var rows = ["","","","",""];
    for (var i=0;i<text.length;i++) {
      var g = F[text[i]] || F[' '];
      for (var r=0;r<5;r++) rows[r] += g[r].replace(/X/g, fill) + ' ';
    }
    document.getElementById('out').textContent = text ? rows.join('\n') : '';
  }
  function copyOut(){ navigator.clipboard.writeText(document.getElementById('out').textContent); }
  gen();
</script>
</body>
</html>
