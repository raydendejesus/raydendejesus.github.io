<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Whitespace Cleaner</title>
<style>
  :root { --accent:#38bdf8; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; padding:24px;
    background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    color:#e2e8f0; font-family:system-ui, -apple-system, "Segoe UI", sans-serif; }
  a { color:var(--accent); text-decoration:none; }
  a:hover { text-decoration:underline; }
  h1 { font-size:1.4rem; margin:.4rem 0 1rem; }
  .panel { background:#111827; border:1px solid #1f2937; border-radius:14px; padding:16px; margin-bottom:16px; }
  textarea { width:100%; min-height:180px; resize:vertical; background:#0b1120; color:#e2e8f0;
    border:1px solid #1f2937; border-radius:10px; padding:10px; font-family:ui-monospace,Consolas,monospace; font-size:13px; }
  label { display:block; margin:6px 0; font-size:14px; }
  button { background:var(--accent); color:#06283d; border:none; border-radius:10px; padding:9px 16px; font-weight:600; cursor:pointer; font-size:14px; }
  button:hover { filter:brightness(1.08); }
  button.secondary { background:#1f2937; color:#e2e8f0; }
  .row { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin:12px 0; }
</style>
</head>
<body>
  <a href="../">&larr; back</a>
  <h1>Whitespace Cleaner</h1>
  <div class="panel">
    <label><input type="checkbox" id="trim" checked> Trim leading/trailing whitespace on each line</label>
    <label><input type="checkbox" id="collapse" checked> Collapse multiple spaces into one</label>
    <label><input type="checkbox" id="blanks"> Remove blank lines</label>
    <label><input type="checkbox" id="tabs"> Convert tabs to spaces</label>
  </div>
  <div class="panel">
    <textarea id="input" placeholder="Paste messy text..."></textarea>
    <div class="row">
      <button id="go">Clean</button>
      <button class="secondary" id="clear">Clear</button>
    </div>
  </div>
  <div class="panel">
    <textarea id="output" placeholder="Result..." readonly></textarea>
    <div class="row"><button class="secondary" id="copy">Copy</button></div>
  </div>
<script>
  const $ = id => document.getElementById(id);
  function run() {
    let lines = $('input').value.split(/\r?\n/);
    const tabs = $('tabs').checked, collapse = $('collapse').checked, trim = $('trim').checked;
    lines = lines.map(l => {
      if (tabs) l = l.replace(/\t/g, ' ');
      if (collapse) l = l.replace(/ {2,}/g, ' ');
      if (trim) l = l.trim();
      return l;
    });
    if ($('blanks').checked) lines = lines.filter(l => l.trim() !== '');
    $('output').value = lines.join('\n');
  }
  $('go').onclick = run;
  $('clear').onclick = () => { $('input').value=''; $('output').value=''; };
  $('copy').onclick = async () => {
    await navigator.clipboard.writeText($('output').value);
    const b=$('copy'); b.textContent='Copied!'; setTimeout(()=>b.textContent='Copy',1200);
  };
</script>
</body>
</html>
