<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Missile Command</title>
<style>
  :root { --accent: #38bdf8; }
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    color: #e2e8f0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
  .back { position: fixed; top: 16px; left: 16px; color: var(--accent); text-decoration: none; font-size: 14px; opacity: 0.8; }
  .back:hover { opacity: 1; }
  .card { background: #111827; border: 1px solid #1f2937; border-radius: 18px; padding: 24px;
    width: min(94vw, 540px); text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
  h1 { margin: 0 0 4px; font-size: 22px; }
  .sub { margin: 0 0 16px; color: #94a3b8; font-size: 13px; }
  .hud { display: flex; justify-content: space-between; font-size: 14px; color: #cbd5e1; margin-bottom: 10px; padding: 0 4px; }
  .hud b { color: var(--accent); }
  canvas { background: #0b1120; border: 1px solid #1f2937; border-radius: 12px; width: 100%; display: block; cursor: crosshair; }
  .msg { margin-top: 14px; font-size: 15px; color: #94a3b8; min-height: 22px; }
  .row { display: flex; gap: 10px; justify-content: center; margin-top: 12px; }
  button { font-family: inherit; font-size: 15px; border-radius: 10px; border: 1px solid #1f2937; padding: 10px 16px; background: #0b1120; color: #e2e8f0; cursor: pointer; }
  button.start { background: var(--accent); color: #04293b; font-weight: 700; border: none; }
  button.start:hover { filter: brightness(1.1); }
  button:active { transform: scale(0.97); }
</style>
</head>
<body>
<a class="back" href="../">&larr; back</a>
<div class="card">
  <h1>🚀 Missile Command</h1>
  <p class="sub">Click to fire interceptors. Defend your 6 cities from the falling missiles. Survive the waves!</p>
  <div class="hud"><span>Score: <b id="score">0</b></span><span>Wave: <b id="wave">1</b></span><span>Cities: <b id="cities">6</b></span></div>
  <canvas id="game" width="520" height="380"></canvas>
  <div class="msg" id="msg">Press Start</div>
  <div class="row"><button class="start" id="startBtn">Start</button></div>
</div>
<script>
const canvas = document.getElementById('game'), ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height, GROUND = H - 24;
const scoreEl = document.getElementById('score'), waveEl = document.getElementById('wave'),
  citiesEl = document.getElementById('cities'), msgEl = document.getElementById('msg'), startBtn = document.getElementById('startBtn');
let cities, enemies, interceptors, explosions, score, wave, running, raf, spawnTimer, toSpawn;
const BATTERY = { x: W / 2, y: GROUND };

function setupCities() {
  cities = [];
  const xs = [70, 130, 190, 330, 390, 450];
  for (const x of xs) cities.push({ x, alive: true });
}

function startWave() {
  toSpawn = 6 + wave * 2; spawnTimer = 0; waveEl.textContent = wave;
  msgEl.textContent = 'Wave ' + wave;
}

function start() {
  setupCities(); enemies = []; interceptors = []; explosions = [];
  score = 0; wave = 1; running = true;
  scoreEl.textContent = 0; citiesEl.textContent = 6;
  startWave(); startBtn.style.display = 'none';
  cancelAnimationFrame(raf); loop();
}

function gameOver() {
  running = false; cancelAnimationFrame(raf);
  msgEl.textContent = '💀 Cities destroyed — score ' + score;
  startBtn.textContent = 'Play Again'; startBtn.style.display = 'inline-block';
}

function spawnEnemy() {
  const targets = cities.filter(c => c.alive);
  if (!targets.length) return;
  const tx = targets[(Math.random() * targets.length) | 0].x;
  const sx = Math.random() * W;
  const speed = 0.5 + wave * 0.18 + Math.random() * 0.4;
  const ang = Math.atan2(GROUND - 0, tx - sx);
  const d = Math.hypot(tx - sx, GROUND);
  enemies.push({ x: sx, y: 0, vx: (tx - sx) / d * speed, vy: GROUND / d * speed });
}

canvas.addEventListener('click', e => {
  if (!running) return;
  const r = canvas.getBoundingClientRect();
  const mx = (e.clientX - r.left) / r.width * W, my = (e.clientY - r.top) / r.height * H;
  const dx = mx - BATTERY.x, dy = my - BATTERY.y, d = Math.hypot(dx, dy);
  const sp = 7;
  interceptors.push({ x: BATTERY.x, y: BATTERY.y, vx: dx / d * sp, vy: dy / d * sp, tx: mx, ty: my });
});

function explode(x, y) { explosions.push({ x, y, r: 2, max: 36, growing: true }); }

function update() {
  if (toSpawn > 0) { spawnTimer--; if (spawnTimer <= 0) { spawnEnemy(); toSpawn--; spawnTimer = 30 + Math.random() * 40; } }
  // interceptors
  for (const it of interceptors) {
    it.x += it.vx; it.y += it.vy;
    if (Math.hypot(it.x - it.tx, it.y - it.ty) < 8) { explode(it.x, it.y); it.dead = true; }
  }
  interceptors = interceptors.filter(i => !i.dead);
  // enemies
  for (const en of enemies) {
    en.x += en.vx; en.y += en.vy;
    if (en.y >= GROUND) {
      en.dead = true; explode(en.x, GROUND);
      let best = null, bd = 1e9;
      for (const c of cities) { if (c.alive) { const dd = Math.abs(c.x - en.x); if (dd < bd && dd < 28) { bd = dd; best = c; } } }
      if (best) { best.alive = false; citiesEl.textContent = cities.filter(c => c.alive).length; }
    }
  }
  // explosions hit enemies
  for (const ex of explosions) {
    if (ex.growing) { ex.r += 1.6; if (ex.r >= ex.max) ex.growing = false; }
    else { ex.r -= 1.2; if (ex.r <= 0) ex.dead = true; }
    for (const en of enemies) {
      if (!en.dead && Math.hypot(en.x - ex.x, en.y - ex.y) < ex.r) { en.dead = true; score += 25; scoreEl.textContent = score; explode(en.x, en.y); }
    }
  }
  enemies = enemies.filter(e => !e.dead);
  explosions = explosions.filter(e => !e.dead);

  if (!cities.some(c => c.alive)) { gameOver(); return; }
  if (toSpawn === 0 && enemies.length === 0) { wave++; score += 100; scoreEl.textContent = score; startWave(); }
}

function draw() {
  ctx.fillStyle = '#0b1120'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#1f2937'; ctx.fillRect(0, GROUND, W, H - GROUND);
  // battery
  ctx.fillStyle = '#38bdf8'; ctx.beginPath(); ctx.moveTo(BATTERY.x - 14, GROUND); ctx.lineTo(BATTERY.x + 14, GROUND); ctx.lineTo(BATTERY.x, GROUND - 18); ctx.fill();
  // cities
  for (const c of cities) {
    ctx.fillStyle = c.alive ? '#22c55e' : '#334155';
    ctx.fillRect(c.x - 12, GROUND - 12, 24, 12);
  }
  // enemies + trails
  for (const en of enemies) {
    ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 1.5; ctx.beginPath();
    ctx.moveTo(en.x - en.vx * 10, en.y - en.vy * 10); ctx.lineTo(en.x, en.y); ctx.stroke();
    ctx.fillStyle = '#fca5a5'; ctx.beginPath(); ctx.arc(en.x, en.y, 3, 0, 7); ctx.fill();
  }
  for (const it of interceptors) {
    ctx.strokeStyle = '#38bdf8'; ctx.lineWidth = 1.5; ctx.beginPath();
    ctx.moveTo(BATTERY.x, BATTERY.y); ctx.lineTo(it.x, it.y); ctx.stroke();
  }
  for (const ex of explosions) {
    ctx.fillStyle = 'rgba(251,191,36,0.7)'; ctx.beginPath(); ctx.arc(ex.x, ex.y, Math.max(0, ex.r), 0, 7); ctx.fill();
  }
}

function loop() { if (!running) return; update(); if (!running) return; draw(); raf = requestAnimationFrame(loop); }

function idle() { setupCities(); enemies = interceptors = explosions = []; draw(); }
startBtn.addEventListener('click', start);
idle();
</script>
</body>
</html>
