<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JWT Decoder</title>
<style>
  :root{--accent:#38bdf8;}
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);color:#e2e8f0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;padding:24px;}
  a.back{color:var(--accent);text-decoration:none;}
  .wrap{max-width:760px;margin:0 auto;}
  h1{font-size:1.6rem;margin:.3em 0 .6em;}
  .panel{background:#111827;border:1px solid #1f2937;border-radius:14px;padding:18px;margin-bottom:16px;}
  textarea{width:100%;min-height:110px;background:#0b1120;color:#e2e8f0;border:1px solid #1f2937;border-radius:10px;padding:10px;font-family:ui-monospace,monospace;font-size:.9rem;resize:vertical;}
  pre{background:#0b1120;border:1px solid #1f2937;border-radius:10px;padding:12px;overflow:auto;font-family:ui-monospace,monospace;font-size:.9rem;margin:0;white-space:pre-wrap;word-break:break-word;}
  .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;align-items:center;}
  button{background:var(--accent);color:#04222e;border:none;border-radius:10px;padding:8px 14px;font-weight:600;cursor:pointer;font-size:.9rem;}
  button.alt{background:#1f2937;color:#e2e8f0;}
  button:hover{filter:brightness(1.1);}
  .err{color:#f87171;min-height:1.2em;margin-top:8px;font-size:.9rem;}
  label{display:block;margin-bottom:6px;font-size:.85rem;color:#94a3b8;}
  h2{font-size:1rem;margin:0 0 8px;color:var(--accent);}
  .exp{margin-top:10px;font-size:.9rem;}
  .ok{color:#4ade80;}.bad{color:#f87171;}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="../">← back</a>
  <h1>JWT Decoder</h1>
  <div class="panel">
    <label>Paste a JWT (header.payload.signature)</label>
    <textarea id="jwt" placeholder="eyJhbGciOi..."></textarea>
    <div class="row"><button id="dec">Decode</button></div>
    <div class="err" id="err"></div>
  </div>
  <div class="panel">
    <h2>Header</h2>
    <pre id="header">—</pre>
    <div class="row"><button class="alt" id="copyH">Copy</button></div>
  </div>
  <div class="panel">
    <h2>Payload</h2>
    <pre id="payload">—</pre>
    <div class="row"><button class="alt" id="copyP">Copy</button></div>
    <div class="exp" id="exp"></div>
  </div>
</div>
<script>
  const jwt=document.getElementById('jwt');
  const err=document.getElementById('err');
  const headerEl=document.getElementById('header');
  const payloadEl=document.getElementById('payload');
  const expEl=document.getElementById('exp');
  function setErr(m){err.textContent=m||'';}
  function b64urlDecode(s){
    s=s.replace(/-/g,'+').replace(/_/g,'/');
    while(s.length%4)s+='=';
    const bin=atob(s);
    // handle UTF-8
    const bytes=Uint8Array.from(bin,c=>c.charCodeAt(0));
    return new TextDecoder().decode(bytes);
  }
  function pretty(json){return JSON.stringify(JSON.parse(json),null,2);}
  function decode(){
    setErr('');headerEl.textContent='—';payloadEl.textContent='—';expEl.textContent='';
    const t=jwt.value.trim();
    if(!t){setErr('Enter a token.');return;}
    const parts=t.split('.');
    if(parts.length<2){setErr('Not a valid JWT (needs header.payload).');return;}
    try{
      const h=b64urlDecode(parts[0]);
      headerEl.textContent=pretty(h);
    }catch(e){setErr('Could not decode header.');return;}
    let payloadObj=null;
    try{
      const p=b64urlDecode(parts[1]);
      payloadObj=JSON.parse(p);
      payloadEl.textContent=JSON.stringify(payloadObj,null,2);
    }catch(e){setErr('Could not decode payload.');return;}
    if(payloadObj && payloadObj.exp){
      const d=new Date(payloadObj.exp*1000);
      const now=Date.now();
      const expired=d.getTime()<now;
      expEl.innerHTML='Expires: '+d.toLocaleString()+' &middot; '+
        '<span class="'+(expired?'bad':'ok')+'">'+(expired?'EXPIRED':'valid')+'</span>';
    }else{
      expEl.textContent='No exp claim.';
    }
  }
  async function copy(el){
    try{await navigator.clipboard.writeText(el.textContent);}catch(e){}
  }
  document.getElementById('dec').onclick=decode;
  document.getElementById('copyH').onclick=()=>copy(headerEl);
  document.getElementById('copyP').onclick=()=>copy(payloadEl);
</script>
</body>
</html>
