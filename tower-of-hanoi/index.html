<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tower of Hanoi</title>
<style>
  :root{--accent:#38bdf8;}
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
    color:#e2e8f0;background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    display:flex;flex-direction:column;align-items:center;padding:24px;}
  a.back{position:fixed;top:16px;left:16px;color:var(--accent);text-decoration:none;font-size:14px;}
  a.back:hover{text-decoration:underline;}
  h1{font-size:24px;margin:30px 0 6px;}
  .sub{color:#94a3b8;font-size:13px;margin:0 0 14px;text-align:center;}
  .pegs{display:flex;gap:12px;background:#111827;border:1px solid #1f2937;border-radius:16px;
    padding:18px;width:min(94vw,640px);}
  .peg{flex:1;display:flex;flex-direction:column-reverse;align-items:center;justify-content:flex-start;
    min-height:240px;position:relative;cursor:pointer;border-radius:10px;padding-bottom:10px;}
  .peg::before{content:"";position:absolute;bottom:6px;width:90%;height:8px;background:#334155;border-radius:4px;}
  .peg::after{content:"";position:absolute;bottom:6px;width:8px;height:200px;background:#334155;border-radius:4px;}
  .peg.sel{outline:2px solid var(--accent);outline-offset:-2px;}
  .disk{height:24px;border-radius:6px;margin-bottom:4px;z-index:1;
    box-shadow:0 1px 3px rgba(0,0,0,.5);transition:transform .1s;}
  .disk.lift{transform:translateY(-6px);}
  .stats{display:flex;gap:20px;margin-top:16px;color:#94a3b8;font-size:14px;}
  .stats b{color:#e2e8f0;}
  .row{display:flex;gap:10px;margin-top:14px;align-items:center;}
  button{background:var(--accent);color:#082f49;border:none;border-radius:10px;padding:10px 18px;
    font-weight:600;font-size:14px;cursor:pointer;}
  button:hover{filter:brightness(1.1);}
  input[type=range]{accent-color:var(--accent);}
  .win{color:#4ade80;font-weight:700;min-height:22px;margin-top:12px;}
</style>
</head>
<body>
<a class="back" href="../">← back</a>
<h1>Tower of Hanoi</h1>
<p class="sub">Move the whole stack to the right peg. Click a peg to pick up its top disk, then click a destination. Larger disks can't go on smaller ones.</p>
<div class="pegs" id="pegs">
  <div class="peg" data-p="0"></div>
  <div class="peg" data-p="1"></div>
  <div class="peg" data-p="2"></div>
</div>
<div class="stats"><span>Moves <b id="moves">0</b></span><span>Minimum <b id="min">7</b></span></div>
<div class="win" id="win"></div>
<div class="row">
  <label>Disks: <b id="dcount">3</b></label>
  <input type="range" id="disks" min="3" max="8" value="3">
  <button id="reset">Reset</button>
</div>
<script>
const $=id=>document.getElementById(id);
const COLORS=['#38bdf8','#4ade80','#fbbf24','#f87171','#a78bfa','#fb923c','#22d3ee','#f472b6'];
let n=3,pegs=[[],[],[]],moves=0,sel=null,won=false;
const pegEls=[...document.querySelectorAll('.peg')];

function render(){
  pegEls.forEach((el,p)=>{
    el.querySelectorAll('.disk').forEach(d=>d.remove());
    el.classList.toggle('sel',sel===p);
    pegs[p].forEach((size,i)=>{
      const d=document.createElement('div');
      d.className='disk'+(sel===p&&i===pegs[p].length-1?' lift':'');
      const w=30+(size/n)*65;
      d.style.width=w+'%';
      d.style.background=COLORS[(size-1)%COLORS.length];
      el.appendChild(d);
    });
  });
}
function setup(){
  n=+$('disks').value;$('dcount').textContent=n;
  $('min').textContent=Math.pow(2,n)-1;
  pegs=[[],[],[]];
  for(let s=n;s>=1;s--)pegs[0].push(s);
  moves=0;sel=null;won=false;
  $('moves').textContent=0;$('win').textContent='';
  render();
}
function clickPeg(p){
  if(won)return;
  if(sel===null){
    if(pegs[p].length===0)return;
    sel=p;render();
  }else{
    if(p===sel){sel=null;render();return;}
    const from=pegs[sel],to=pegs[p];
    const disk=from[from.length-1];
    if(to.length===0||to[to.length-1]>disk){
      to.push(from.pop());
      moves++;$('moves').textContent=moves;
      sel=null;render();checkWin();
    }else{
      // invalid; just reselect this peg if it has a disk
      sel=p;render();
    }
  }
}
function checkWin(){
  if(pegs[2].length===n){
    won=true;
    const min=Math.pow(2,n)-1;
    $('win').textContent='Solved in '+moves+' moves'+(moves===min?' — perfect! 🎉':'!');
  }
}
pegEls.forEach((el,p)=>el.onclick=()=>clickPeg(p));
$('disks').oninput=setup;
$('reset').onclick=setup;
setup();
</script>
</body>
</html>
