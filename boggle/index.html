<!DOCTYPE html>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boggle</title>
<style>
  body{margin:0;min-height:100vh;background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);color:#e2e8f0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;display:flex;flex-direction:column;align-items:center;padding:20px;}
  a.back{position:fixed;top:16px;left:16px;color:#38bdf8;text-decoration:none;}
  a.back:hover{text-decoration:underline;}
  h1{margin:8px 0;}
  .wrap{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;align-items:flex-start;}
  .panel{background:#111827;border:1px solid #1f2937;border-radius:18px;padding:14px;}
  #board{display:grid;grid-template-columns:repeat(4,60px);gap:6px;touch-action:none;user-select:none;}
  .die{width:60px;height:60px;display:flex;align-items:center;justify-content:center;background:#0b1120;border-radius:10px;font-size:24px;font-weight:700;cursor:pointer;}
  .die.sel{background:#38bdf8;color:#0b1120;}
  #current{font-size:24px;font-weight:700;letter-spacing:3px;min-height:32px;color:#38bdf8;}
  #found{list-style:none;padding:0;margin:8px 0;max-height:240px;overflow:auto;min-width:130px;}
  #found li{padding:2px 6px;}
  #stat{font-weight:600;font-size:18px;}
  #timer{font-weight:700;font-size:22px;color:#fbbf24;}
  button{background:#0b1120;color:#e2e8f0;border:1px solid #1f2937;border-radius:10px;padding:8px 14px;font:inherit;cursor:pointer;margin-top:8px;}
  button:hover{border-color:#38bdf8;}
</style>
</head>

<a class="back" href="../">← back</a>

<div class="wrap">

    <div id="board"></div>
    <div id="current">&nbsp;</div>
  </div>
  <div class="panel">
    <div id="timer">3:00</div>
    <div id="stat">Score: 0</div>
    <strong>Found:</strong>
    <ul id="found"></ul>
  </div>
</div>
<button id="new">New Game</button>

const boardEl=document.getElementById('board'), foundEl=document.getElementById('found');
let board, sel, foundSet, score, timeLeft, timer, running;
function roll(){
  const d=[...DICE].sort(()=>Math.random()-.5);
  board=[];
  for(let i=0;i<16;i++){const face=d[i];board.push(face[Math.floor(Math.random()*face.length)]);}
}
function init(){
  clearInterval(timer);roll();sel=[];foundSet=new Set();score=0;timeLeft=180;running=true;
  render();renderFound();updateStat();
  timer=setInterval(()=>{timeLeft--;updateTimer();if(timeLeft<=0){running=false;clearInterval(timer);document.getElementById('current').textContent='Time! Final score '+score;}},1000);
  updateTimer();
}
function idx(r,c){return r*4+c;}
function render(){
  boardEl.innerHTML='';
  for(let i=0;i<16;i++){const d=document.createElement('div');d.className='die';d.textContent=board[i]==='Q'?'Qu':board[i];d.dataset.i=i;boardEl.appendChild(d);}
}
function adjacent(a,b){const ra=a/4|0,ca=a%4,rb=b/4|0,cb=b%4;return Math.abs(ra-rb)<=1&&Math.abs(ca-cb)<=1&&a!==b;}
function getI(t){if(t&&t.dataset&&t.dataset.i!==undefined)return +t.dataset.i;return null;}
function highlight(){document.querySelectorAll('.die').forEach((d,i)=>d.classList.toggle('sel',sel.includes(i)));
  document.getElementById('current').textContent=sel.map(i=>board[i]==='Q'?'QU':board[i]).join('')||' ';}
let dragging=false;
boardEl.addEventListener('pointerdown',e=>{if(!running)return;const i=getI(e.target);if(i===null)return;dragging=true;sel=[i];highlight();e.preventDefault();});
window.addEventListener('pointermove',e=>{
  if(!dragging)return;const el=document.elementFromPoint(e.clientX,e.clientY);const i=getI(el);if(i===null)return;
  if(sel.includes(i)){if(sel.length>=2&&sel[sel.length-2]===i){sel.pop();highlight();}return;}
  if(adjacent(sel[sel.length-1],i)){sel.push(i);highlight();}
});
window.addEventListener('pointerup',()=>{if(!dragging)return;dragging=false;commit();});
function commit(){
  let word=sel.map(i=>board[i]==='Q'?'qu':board[i].toLowerCase()).join('');
  sel=[];highlight();
  if(word.length<3)return;
  if(foundSet.has(word)){flash('Already found');return;}
  if(!DICT.has(word)){flash('Not a word');return;}
  foundSet.add(word);
  const pts=word.length<=4?1:word.length===5?2:word.length===6?3:word.length===7?5:11;
  score+=pts;renderFound();updateStat();
}
function flash(t){const c=document.getElementById('current');c.textContent=t;setTimeout(()=>{if(!sel.length&&running)c.textContent=' ';},700);}
function renderFound(){foundEl.innerHTML='';[...foundSet].sort().forEach(w=>{const li=document.createElement('li');li.textContent=w.toUpperCase()+' ('+(w.length<=4?1:w.length===5?2:w.length===6?3:w.length===7?5:11)+')';foundEl.appendChild(li);});}
function updateStat(){document.getElementById('stat').textContent='Score: '+score+'  ('+foundSet.size+' words)';}
function updateTimer(){const m=Math.floor(Math.max(0,timeLeft)/60),s=Math.max(0,timeLeft)%60;document.getElementById('timer').textContent=m+':'+String(s).padStart(2,'0');}
document.getElementById('new').addEventListener('click',init);
init();
