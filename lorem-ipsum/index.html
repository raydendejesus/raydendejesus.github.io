<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lorem Ipsum Generator</title>
<style>
  :root{--accent:#38bdf8;}
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);color:#e2e8f0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;padding:24px;}
  a.back{color:var(--accent);text-decoration:none;}
  .wrap{max-width:780px;margin:0 auto;}
  h1{font-size:1.6rem;margin:.3em 0 .6em;}
  .panel{background:#111827;border:1px solid #1f2937;border-radius:14px;padding:18px;margin-bottom:16px;}
  .controls{display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
  .controls label{font-size:.85rem;color:#94a3b8;display:flex;gap:8px;align-items:center;}
  input[type=number]{width:70px;background:#0b1120;color:#e2e8f0;border:1px solid #1f2937;border-radius:8px;padding:8px;font-size:1rem;}
  select{background:#0b1120;color:#e2e8f0;border:1px solid #1f2937;border-radius:8px;padding:8px;}
  button{background:var(--accent);color:#04222e;border:none;border-radius:10px;padding:10px 18px;font-weight:600;cursor:pointer;}
  button.alt{background:#1f2937;color:#e2e8f0;}
  button:hover{filter:brightness(1.1);}
  #out{line-height:1.6;}
  #out p{margin:0 0 1em;}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="../">← back</a>
  <h1>Lorem Ipsum Generator</h1>
  <div class="panel">
    <div class="controls">
      <label>Count <input type="number" id="count" value="3" min="1" max="100"></label>
      <label>Unit
        <select id="unit"><option value="paragraphs">Paragraphs</option><option value="sentences">Sentences</option><option value="words">Words</option></select>
      </label>
      <label><input type="checkbox" id="classic" checked> Start with "Lorem ipsum…"</label>
      <button id="gen">Generate</button>
      <button class="alt" id="copy">Copy</button>
    </div>
  </div>
  <div class="panel" id="out"></div>
</div>
<script>
  const words="lorem ipsum dolor sit amet consectetur adipiscing elit sed do eiusmod tempor incididunt ut labore et dolore magna aliqua enim ad minim veniam quis nostrud exercitation ullamco laboris nisi aliquip ex ea commodo consequat duis aute irure in reprehenderit voluptate velit esse cillum eu fugiat nulla pariatur excepteur sint occaecat cupidatat non proident sunt culpa qui officia deserunt mollit anim id est laborum".split(' ');
  function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
  function word(){return words[rand(0,words.length-1)];}
  function sentence(){
    const n=rand(6,14);let s=[];for(let i=0;i<n;i++)s.push(word());
    s[0]=s[0][0].toUpperCase()+s[0].slice(1);
    return s.join(' ')+'.';
  }
  function paragraph(){
    const n=rand(3,6);let s=[];for(let i=0;i<n;i++)s.push(sentence());return s.join(' ');
  }
  function generate(){
    const count=Math.max(1,Math.min(100,+document.getElementById('count').value||1));
    const unit=document.getElementById('unit').value;
    const classic=document.getElementById('classic').checked;
    const out=document.getElementById('out');out.innerHTML='';
    if(unit==='words'){
      let w=[];for(let i=0;i<count;i++)w.push(word());
      if(classic)w[0]='Lorem';
      out.innerHTML='<p>'+w.join(' ')+'</p>';
    }else if(unit==='sentences'){
      let arr=[];for(let i=0;i<count;i++)arr.push(sentence());
      if(classic)arr[0]='Lorem ipsum dolor sit amet, consectetur adipiscing elit.';
      out.innerHTML='<p>'+arr.join(' ')+'</p>';
    }else{
      for(let i=0;i<count;i++){
        let p=paragraph();
        if(i===0&&classic)p='Lorem ipsum dolor sit amet, consectetur adipiscing elit. '+p;
        const el=document.createElement('p');el.textContent=p;out.appendChild(el);
      }
    }
  }
  document.getElementById('gen').onclick=generate;
  document.getElementById('copy').onclick=async()=>{
    const t=document.getElementById('out').innerText;
    try{await navigator.clipboard.writeText(t);}catch(e){}
    const b=document.getElementById('copy');b.textContent='Copied!';setTimeout(()=>b.textContent='Copy',1000);
  };
  generate();
</script>
</body>
</html>
