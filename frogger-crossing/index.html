<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frogger Crossing</title>
<style>
  :root { --accent: #38bdf8; }
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    color: #e2e8f0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
  .back { position: fixed; top: 16px; left: 16px; color: var(--accent); text-decoration: none; font-size: 14px; opacity: 0.8; }
  .back:hover { opacity: 1; }
  .card { background: #111827; border: 1px solid #1f2937; border-radius: 18px; padding: 24px;
    width: min(94vw, 460px); text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
  h1 { margin: 0 0 4px; font-size: 22px; }
  .sub { margin: 0 0 16px; color: #94a3b8; font-size: 13px; }
  .hud { display: flex; justify-content: space-between; font-size: 14px; color: #cbd5e1; margin-bottom: 10px; padding: 0 4px; }
  .hud b { color: var(--accent); }
  canvas { background: #0b1120; border: 1px solid #1f2937; border-radius: 12px; width: 100%; display: block; }
  .msg { margin-top: 14px; font-size: 15px; color: #94a3b8; min-height: 22px; }
  .row { display: flex; gap: 10px; justify-content: center; margin-top: 12px; }
  button { font-family: inherit; font-size: 15px; border-radius: 10px; border: 1px solid #1f2937; padding: 10px 16px; background: #0b1120; color: #e2e8f0; cursor: pointer; }
  button.start { background: var(--accent); color: #04293b; font-weight: 700; border: none; }
  button.start:hover { filter: brightness(1.1); }
  button:active { transform: scale(0.97); }
</style>
</head>
<body>
<a class="back" href="../">&larr; back</a>
<div class="card">
  <h1>🐸 Frogger Crossing</h1>
  <p class="sub">Arrow keys / WASD to hop. Cross the road and river to the top. Don't get hit or fall in the water.</p>
  <div class="hud"><span>Score: <b id="score">0</b></span><span>Level: <b id="level">1</b></span><span>Lives: <b id="lives">3</b></span></div>
  <canvas id="game" width="400" height="440"></canvas>
  <div class="msg" id="msg">Press Start</div>
  <div class="row"><button class="start" id="startBtn">Start</button></div>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const COLS = 10, ROWS = 11, CELL = canvas.width / COLS;
const scoreEl = document.getElementById('score'), levelEl = document.getElementById('level'),
  livesEl = document.getElementById('lives'), msgEl = document.getElementById('msg'), startBtn = document.getElementById('startBtn');

let frog, lanes, score, level, lives, running, raf, reached;

function makeLanes() {
  // rows: 10=start(safe), 9-7 road, 6 safe median, 5-1 river, 0 home
  lanes = [];
  const speedBase = 0.6 + level * 0.15;
  for (let r = 0; r < ROWS; r++) {
    if (r >= 7 && r <= 9) { // road
      const dir = r % 2 === 0 ? 1 : -1;
      const sp = speedBase * dir * (0.8 + Math.random() * 0.5);
      const objs = [];
      const gap = 3 + ((r) % 2);
      for (let i = 0; i < 4; i++) objs.push({ x: i * gap * CELL + Math.random() * CELL, w: CELL * 1.6 });
      lanes.push({ type: 'road', sp, objs });
    } else if (r >= 1 && r <= 5) { // river
      const dir = r % 2 === 0 ? 1 : -1;
      const sp = speedBase * dir * (0.7 + Math.random() * 0.5);
      const objs = [];
      const lw = CELL * (2 + (r % 2));
      for (let i = 0; i < 3; i++) objs.push({ x: i * (lw + CELL * 1.5), w: lw });
      lanes.push({ type: 'river', sp, objs });
    } else {
      lanes.push({ type: 'safe', sp: 0, objs: [] });
    }
  }
}

function resetFrog() { frog = { col: 4, row: 10, px: 4 * CELL, onLog: null }; }

function start() {
  score = 0; level = 1; lives = 3; reached = 0;
  scoreEl.textContent = 0; levelEl.textContent = 1; livesEl.textContent = 3;
  makeLanes(); resetFrog();
  running = true; msgEl.textContent = 'Get to the top!'; startBtn.style.display = 'none';
  cancelAnimationFrame(raf); loop();
}

function nextLevel() {
  level++; levelEl.textContent = level; reached = 0;
  makeLanes(); resetFrog();
}

function die() {
  lives--; livesEl.textContent = lives;
  if (lives <= 0) { gameOver(); return; }
  resetFrog();
}

function gameOver() {
  running = false; cancelAnimationFrame(raf);
  msgEl.textContent = '💀 Game Over — score ' + score;
  startBtn.textContent = 'Play Again'; startBtn.style.display = 'inline-block';
}

function move(dc, dr) {
  if (!running) return;
  const nc = frog.col + dc, nr = frog.row + dr;
  if (nc < 0 || nc >= COLS || nr < 0 || nr >= ROWS) return;
  frog.col = nc; frog.row = nr; frog.px = nc * CELL; frog.onLog = null;
  if (dr < 0) { score += 10; scoreEl.textContent = score; }
  if (frog.row === 0) { score += 100; scoreEl.textContent = score; msgEl.textContent = '🏁 Reached! Next level'; nextLevel(); }
}

document.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (k === 'arrowup' || k === 'w') { move(0, -1); e.preventDefault(); }
  else if (k === 'arrowdown' || k === 's') { move(0, 1); e.preventDefault(); }
  else if (k === 'arrowleft' || k === 'a') { move(-1, 0); e.preventDefault(); }
  else if (k === 'arrowright' || k === 'd') { move(1, 0); e.preventDefault(); }
});

function update() {
  for (let r = 0; r < ROWS; r++) {
    const lane = lanes[r];
    if (lane.type === 'safe') continue;
    for (const o of lane.objs) {
      o.x += lane.sp * 1.4;
      if (lane.sp > 0 && o.x > canvas.width + CELL) o.x = -o.w - CELL;
      if (lane.sp < 0 && o.x < -o.w - CELL) o.x = canvas.width + CELL;
    }
  }
  const lane = lanes[frog.row];
  const fy = frog.row * CELL, fcx = frog.px + CELL / 2, fcy = fy + CELL / 2;
  if (lane.type === 'road') {
    for (const o of lane.objs) {
      if (fcx > o.x && fcx < o.x + o.w) { die(); return; }
    }
  } else if (lane.type === 'river') {
    let on = null;
    for (const o of lane.objs) {
      if (fcx > o.x && fcx < o.x + o.w) { on = o; break; }
    }
    if (!on) { die(); return; }
    frog.px += lane.sp * 1.4;
    frog.col = Math.round(frog.px / CELL);
    if (frog.px < -CELL / 2 || frog.px > canvas.width - CELL / 2) { die(); return; }
  }
}

function draw() {
  for (let r = 0; r < ROWS; r++) {
    const lane = lanes[r], y = r * CELL;
    if (lane.type === 'road') ctx.fillStyle = '#1f2937';
    else if (lane.type === 'river') ctx.fillStyle = '#0c4a6e';
    else ctx.fillStyle = r === 0 ? '#14532d' : '#16341f';
    ctx.fillRect(0, y, canvas.width, CELL);
    for (const o of lane.objs) {
      ctx.fillStyle = lane.type === 'road' ? '#ef4444' : '#92400e';
      ctx.fillRect(o.x, y + 5, o.w, CELL - 10);
    }
  }
  // frog
  ctx.font = (CELL - 6) + 'px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('🐸', frog.px + CELL / 2, frog.row * CELL + CELL / 2 + 2);
}

function loop() {
  if (!running) return;
  update();
  if (!running) { draw(); return; }
  draw();
  raf = requestAnimationFrame(loop);
}

function idle() {
  makeLanes(); resetFrog();
  ctx.fillStyle = '#0b1120'; ctx.fillRect(0, 0, canvas.width, canvas.height);
  draw();
}
startBtn.addEventListener('click', start);
idle();
</script>
</body>
</html>
