<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sliding Puzzle</title>
<style>
  :root{--accent:#38bdf8;}
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
    color:#e2e8f0;background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    display:flex;flex-direction:column;align-items:center;padding:24px;}
  a.back{position:fixed;top:16px;left:16px;color:var(--accent);text-decoration:none;font-size:14px;}
  a.back:hover{text-decoration:underline;}
  h1{font-size:24px;margin:30px 0 6px;}
  .sub{color:#94a3b8;font-size:13px;margin:0 0 14px;}
  .grid{display:grid;gap:8px;background:#111827;border:1px solid #1f2937;border-radius:16px;padding:8px;
    width:min(92vw,360px);aspect-ratio:1;}
  .tile{display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;
    background:#0b1120;border:1px solid #1f2937;border-radius:10px;cursor:pointer;user-select:none;
    color:var(--accent);transition:background .1s;}
  .tile:hover{background:#1e293b;}
  .blank{background:transparent;border-color:transparent;cursor:default;}
  .stats{display:flex;gap:20px;margin-top:16px;color:#94a3b8;font-size:14px;}
  .stats b{color:#e2e8f0;}
  .row{display:flex;gap:10px;margin-top:16px;align-items:center;}
  button{background:var(--accent);color:#082f49;border:none;border-radius:10px;padding:10px 18px;
    font-weight:600;font-size:14px;cursor:pointer;}
  button:hover{filter:brightness(1.1);}
  select{background:#0b1120;color:#e2e8f0;border:1px solid #1f2937;border-radius:8px;padding:8px;}
  .win{color:#4ade80;font-weight:700;min-height:22px;margin-top:12px;}
</style>
</head>
<body>
<a class="back" href="../">← back</a>
<h1>Sliding Puzzle</h1>
<p class="sub">Slide tiles into numerical order. Click a tile next to the gap.</p>
<div class="grid" id="grid"></div>
<div class="stats"><span>Moves <b id="moves">0</b></span></div>
<div class="win" id="win"></div>
<div class="row">
  <select id="size">
    <option value="3">3 × 3</option>
    <option value="4" selected>4 × 4 (15-puzzle)</option>
    <option value="5">5 × 5</option>
  </select>
  <button id="shuffle">Shuffle / New</button>
</div>
<script>
const $=id=>document.getElementById(id);
let N=4,tiles=[],blank=0,moves=0,solved=false;
const grid=$('grid');

function idx(r,c){return r*N+c;}
function render(){
  grid.style.gridTemplateColumns='repeat('+N+',1fr)';
  grid.innerHTML='';
  tiles.forEach((v,i)=>{
    const d=document.createElement('div');
    if(v===0){d.className='tile blank';}
    else{d.className='tile';d.textContent=v;d.onclick=()=>move(i);}
    grid.appendChild(d);
  });
}
function move(i){
  if(solved)return;
  const r=Math.floor(i/N),c=i%N,br=Math.floor(blank/N),bc=blank%N;
  if(Math.abs(r-br)+Math.abs(c-bc)===1){
    [tiles[i],tiles[blank]]=[tiles[blank],tiles[i]];
    blank=i;moves++;$('moves').textContent=moves;
    render();checkWin();
  }
}
function checkWin(){
  for(let i=0;i<N*N-1;i++)if(tiles[i]!==i+1)return;
  if(tiles[N*N-1]===0){solved=true;$('win').textContent='Solved in '+moves+' moves! 🎉';}
}
function neighbors(b){
  const r=Math.floor(b/N),c=b%N,out=[];
  if(r>0)out.push(b-N);if(r<N-1)out.push(b+N);
  if(c>0)out.push(b-1);if(c<N-1)out.push(b+1);
  return out;
}
function shuffle(){
  N=+$('size').value;
  tiles=[];for(let i=1;i<N*N;i++)tiles.push(i);tiles.push(0);
  blank=N*N-1;
  // random-walk shuffle guarantees solvable
  let prev=-1;
  for(let k=0;k<N*N*60;k++){
    const nb=neighbors(blank).filter(x=>x!==prev);
    const pick=nb[Math.floor(Math.random()*nb.length)];
    prev=blank;
    [tiles[pick],tiles[blank]]=[tiles[blank],tiles[pick]];
    blank=pick;
  }
  moves=0;solved=false;$('moves').textContent=0;$('win').textContent='';
  render();
  // avoid starting already solved
  let ok=false;for(let i=0;i<N*N-1;i++)if(tiles[i]!==i+1){ok=true;break;}
  if(!ok)shuffle();
}
$('shuffle').onclick=shuffle;
$('size').onchange=shuffle;
shuffle();
</script>
</body>
</html>
