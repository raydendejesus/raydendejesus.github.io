<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tally Counter</title>
<style>
  :root{--accent:#38bdf8;}
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);color:#e2e8f0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;padding:24px;}
  a.back{color:var(--accent);text-decoration:none;}
  .wrap{max-width:680px;margin:0 auto;}
  h1{font-size:1.6rem;margin:.3em 0 .6em;}
  .add{display:flex;gap:10px;margin-bottom:18px;}
  .add input{flex:1;background:#0b1120;color:#e2e8f0;border:1px solid #1f2937;border-radius:10px;padding:10px;font-size:1rem;}
  .add button{background:var(--accent);color:#04222e;border:none;border-radius:10px;padding:10px 18px;font-weight:600;cursor:pointer;}
  .card{background:#111827;border:1px solid #1f2937;border-radius:14px;padding:18px;margin-bottom:14px;display:flex;align-items:center;gap:14px;}
  .name{flex:1;font-size:1.1rem;font-weight:600;}
  .count{font-size:2.2rem;font-weight:800;color:var(--accent);min-width:70px;text-align:center;}
  .card button{border:none;border-radius:10px;cursor:pointer;font-weight:700;}
  .minus,.plus{width:48px;height:48px;font-size:1.5rem;background:#1f2937;color:#e2e8f0;}
  .plus{background:var(--accent);color:#04222e;}
  .reset{background:#334155;color:#cbd5e1;padding:8px 10px;font-size:.8rem;}
  .del{background:#7f1d1d;color:#fee2e2;padding:8px 10px;font-size:.8rem;}
  .empty{color:#64748b;text-align:center;padding:30px;}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="../">← back</a>
  <h1>Tally Counter</h1>
  <div class="add">
    <input id="name" placeholder="New counter name..." maxlength="40">
    <button id="addBtn">Add</button>
  </div>
  <div id="list"></div>
</div>
<script>
  const KEY='tallyCounters';
  let counters=JSON.parse(localStorage.getItem(KEY)||'[]');
  const list=document.getElementById('list');
  function save(){localStorage.setItem(KEY,JSON.stringify(counters));}
  function render(){
    list.innerHTML='';
    if(!counters.length){list.innerHTML='<div class="empty">No counters yet. Add one above.</div>';return;}
    counters.forEach((c,i)=>{
      const d=document.createElement('div');d.className='card';
      d.innerHTML=`<div class="name"></div><button class="minus">−</button>
        <div class="count">${c.v}</div><button class="plus">+</button>
        <button class="reset">Reset</button><button class="del">✕</button>`;
      d.querySelector('.name').textContent=c.n;
      d.querySelector('.minus').onclick=()=>{c.v--;save();render();};
      d.querySelector('.plus').onclick=()=>{c.v++;save();render();};
      d.querySelector('.reset').onclick=()=>{c.v=0;save();render();};
      d.querySelector('.del').onclick=()=>{counters.splice(i,1);save();render();};
      list.appendChild(d);
    });
  }
  function add(){
    const n=document.getElementById('name').value.trim();
    if(!n)return;
    counters.push({n,v:0});document.getElementById('name').value='';save();render();
  }
  document.getElementById('addBtn').onclick=add;
  document.getElementById('name').addEventListener('keydown',e=>{if(e.key==='Enter')add();});
  render();
</script>
</body>
</html>
