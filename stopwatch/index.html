<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stopwatch & Timer</title>
<style>
  :root{--accent:#38bdf8;}
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
    color:#e2e8f0;background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    display:flex;flex-direction:column;align-items:center;padding:24px;}
  a.back{position:fixed;top:16px;left:16px;color:var(--accent);text-decoration:none;font-size:14px;}
  a.back:hover{text-decoration:underline;}
  h1{font-size:24px;margin:30px 0 12px;}
  .tabs{display:flex;gap:8px;margin-bottom:18px;}
  .tabs button{background:#1f2937;color:#e2e8f0;border:1px solid #1f2937;border-radius:10px;
    padding:8px 18px;cursor:pointer;font-weight:600;}
  .tabs button.active{background:var(--accent);color:#082f49;}
  .panel{background:#111827;border:1px solid #1f2937;border-radius:18px;padding:28px;
    width:min(92vw,440px);text-align:center;}
  .display{font-size:52px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:1px;margin:6px 0 20px;}
  .display small{font-size:28px;color:#94a3b8;}
  .row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  button.act{border:none;border-radius:12px;padding:12px 22px;font-weight:600;font-size:15px;cursor:pointer;}
  .start{background:#4ade80;color:#052e16;}
  .stop{background:#f87171;color:#450a0a;}
  .ghost{background:#1f2937;color:#e2e8f0;}
  button.act:hover{filter:brightness(1.1);}
  .laps{list-style:none;padding:0;margin:18px 0 0;max-height:200px;overflow:auto;text-align:left;}
  .laps li{display:flex;justify-content:space-between;padding:8px 6px;border-bottom:1px solid #1f2937;
    font-variant-numeric:tabular-nums;font-size:15px;}
  .laps li span:first-child{color:#94a3b8;}
  .timerset{display:flex;gap:8px;justify-content:center;align-items:center;margin-bottom:16px;}
  .timerset input{width:64px;padding:10px;text-align:center;font-size:18px;border-radius:8px;
    border:1px solid #1f2937;background:#0b1120;color:#e2e8f0;}
  .timerset label{font-size:12px;color:#94a3b8;display:block;}
  .done{color:#fbbf24;font-weight:700;min-height:22px;margin-top:10px;}
  .hidden{display:none;}
</style>
</head>
<body>
<a class="back" href="../">← back</a>
<h1>Stopwatch &amp; Timer</h1>
<div class="tabs">
  <button id="tabSW" class="active">Stopwatch</button>
  <button id="tabTM">Countdown</button>
</div>

<div class="panel" id="swPanel">
  <div class="display" id="swDisp">00:00<small>.00</small></div>
  <div class="row">
    <button class="act start" id="swToggle">Start</button>
    <button class="act ghost" id="swLap">Lap</button>
    <button class="act ghost" id="swReset">Reset</button>
  </div>
  <ul class="laps" id="laps"></ul>
</div>

<div class="panel hidden" id="tmPanel">
  <div class="timerset">
    <div><label>min</label><input id="tmMin" type="number" min="0" max="999" value="1"></div>
    <div><label>sec</label><input id="tmSec" type="number" min="0" max="59" value="0"></div>
  </div>
  <div class="display" id="tmDisp">01:00<small>.00</small></div>
  <div class="row">
    <button class="act start" id="tmToggle">Start</button>
    <button class="act ghost" id="tmReset">Reset</button>
  </div>
  <div class="done" id="tmDone"></div>
</div>

<script>
const $=id=>document.getElementById(id);
function fmt(ms){
  const cs=Math.floor(ms/10)%100;
  const s=Math.floor(ms/1000)%60;
  const m=Math.floor(ms/60000);
  const p=n=>String(n).padStart(2,'0');
  return p(m)+':'+p(s)+'<small>.'+p(cs)+'</small>';
}
// Tabs
function showTab(sw){
  $('tabSW').classList.toggle('active',sw);
  $('tabTM').classList.toggle('active',!sw);
  $('swPanel').classList.toggle('hidden',!sw);
  $('tmPanel').classList.toggle('hidden',sw);
}
$('tabSW').onclick=()=>showTab(true);
$('tabTM').onclick=()=>showTab(false);

// Stopwatch
let swRunning=false,swStart=0,swElapsed=0,swRAF=null,lastLap=0,lapCount=0;
function swTick(){
  const now=performance.now();
  const total=swElapsed+(now-swStart);
  $('swDisp').innerHTML=fmt(total);
  swRAF=requestAnimationFrame(swTick);
}
$('swToggle').onclick=()=>{
  if(swRunning){
    swElapsed+=performance.now()-swStart;swRunning=false;
    cancelAnimationFrame(swRAF);
    $('swToggle').textContent='Start';$('swToggle').className='act start';
  }else{
    swStart=performance.now();swRunning=true;
    $('swToggle').textContent='Stop';$('swToggle').className='act stop';
    swTick();
  }
};
$('swLap').onclick=()=>{
  const total=swElapsed+(swRunning?performance.now()-swStart:0);
  if(total===0)return;
  lapCount++;
  const split=total-lastLap;lastLap=total;
  const li=document.createElement('li');
  li.innerHTML='<span>Lap '+lapCount+'</span><span>'+fmt(split).replace(/<\/?small>/g,'')+'</span>';
  $('laps').prepend(li);
};
$('swReset').onclick=()=>{
  swRunning=false;cancelAnimationFrame(swRAF);swElapsed=0;lastLap=0;lapCount=0;
  $('swDisp').innerHTML=fmt(0);$('laps').innerHTML='';
  $('swToggle').textContent='Start';$('swToggle').className='act start';
};

// Countdown timer
let tmRunning=false,tmEnd=0,tmRemain=60000,tmRAF=null;
function tmTotalSet(){return (Math.max(0,+$('tmMin').value||0)*60+Math.max(0,Math.min(59,+$('tmSec').value||0)))*1000;}
function tmTick(){
  const left=Math.max(0,tmEnd-performance.now());
  $('tmDisp').innerHTML=fmt(left);
  if(left<=0){
    tmRunning=false;cancelAnimationFrame(tmRAF);
    $('tmToggle').textContent='Start';$('tmToggle').className='act start';
    $('tmDone').textContent='⏰ Time’s up!';
    try{beep();}catch(e){}
    return;
  }
  tmRAF=requestAnimationFrame(tmTick);
}
$('tmToggle').onclick=()=>{
  if(tmRunning){
    tmRemain=tmEnd-performance.now();tmRunning=false;cancelAnimationFrame(tmRAF);
    $('tmToggle').textContent='Start';$('tmToggle').className='act start';
  }else{
    if(tmRemain<=0)tmRemain=tmTotalSet();
    if(tmRemain<=0)return;
    tmEnd=performance.now()+tmRemain;tmRunning=true;$('tmDone').textContent='';
    $('tmToggle').textContent='Pause';$('tmToggle').className='act stop';
    tmTick();
  }
};
$('tmReset').onclick=()=>{
  tmRunning=false;cancelAnimationFrame(tmRAF);tmRemain=tmTotalSet();
  $('tmDisp').innerHTML=fmt(tmRemain);$('tmDone').textContent='';
  $('tmToggle').textContent='Start';$('tmToggle').className='act start';
};
function syncSet(){if(!tmRunning){tmRemain=tmTotalSet();$('tmDisp').innerHTML=fmt(tmRemain);$('tmDone').textContent='';}}
$('tmMin').oninput=syncSet;$('tmSec').oninput=syncSet;
function beep(){
  const ac=new (window.AudioContext||window.webkitAudioContext)();
  const o=ac.createOscillator(),g=ac.createGain();
  o.connect(g);g.connect(ac.destination);o.frequency.value=880;o.type='sine';
  g.gain.setValueAtTime(0.2,ac.currentTime);
  o.start();
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.8);
  o.stop(ac.currentTime+0.8);
}
$('swDisp').innerHTML=fmt(0);
syncSet();
</script>
</body>
</html>
