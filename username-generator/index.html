<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Username Generator</title>
<style>
  :root { --accent: #38bdf8; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    color: #e2e8f0;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    padding: 24px;
  }
  .back {
    position: fixed; top: 16px; left: 16px;
    color: var(--accent); text-decoration: none; font-size: 14px; opacity: 0.8;
  }
  .back:hover { opacity: 1; }
  .card {
    background: #111827; border: 1px solid #1f2937; border-radius: 18px;
    padding: 28px; width: min(94vw, 520px); text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  h1 { margin: 0 0 4px; font-size: 24px; }
  .sub { margin: 0 0 20px; color: #94a3b8; font-size: 14px; }
  .controls {
    display: flex; gap: 12px; align-items: center; justify-content: center;
    flex-wrap: wrap; margin-bottom: 20px;
  }
  label { font-size: 14px; color: #cbd5e1; }
  select, button {
    font-family: inherit; font-size: 15px; border-radius: 10px;
    border: 1px solid #1f2937; padding: 10px 16px;
    background: #0b1120; color: #e2e8f0; cursor: pointer;
  }
  button.gen { background: var(--accent); color: #0b1120; border-color: var(--accent); font-weight: 600; }
  button:hover { filter: brightness(1.08); border-color: var(--accent); }
  .list { display: flex; flex-direction: column; gap: 10px; margin-top: 6px; }
  .item {
    display: flex; align-items: center; justify-content: space-between;
    background: #0b1120; border: 1px solid #1f2937; border-radius: 10px;
    padding: 12px 16px; font-size: 17px;
  }
  .item .name { font-family: ui-monospace, monospace; letter-spacing: 0.5px; }
  .item button {
    padding: 6px 12px; font-size: 13px;
  }
  .copied { color: #4ade80 !important; }
  .opt { display: flex; align-items: center; gap: 6px; font-size: 14px; color: #cbd5e1; }
</style>
</head>
<body>
<a class="back" href="../">&larr; back</a>
<div class="card">
  <h1>Username Generator</h1>
  <p class="sub">Spin up catchy, available-looking handles for any account.</p>
  <div class="controls">
    <label for="style">Style</label>
    <select id="style">
      <option value="adjnoun">Adjective + Noun</option>
      <option value="gamer">Gamer Tag</option>
      <option value="cute">Cute / Soft</option>
      <option value="techy">Techy</option>
      <option value="mythic">Mythic</option>
    </select>
    <label class="opt"><input type="checkbox" id="num" checked> numbers</label>
  </div>
  <button class="gen" id="gen">Generate</button>
  <div class="list" id="list"></div>
</div>
<script>
  const adjectives = ['Swift','Crimson','Silent','Cosmic','Frost','Velvet','Neon','Lunar','Rapid','Hollow','Golden','Shadow','Electric','Mellow','Royal','Wild','Brave','Quantum','Drifting','Stormy'];
  const nouns = ['Fox','Comet','Raven','Pixel','Tiger','Echo','Falcon','Nomad','Cipher','Lotus','Wolf','Specter','Drake','Otter','Phoenix','Bishop','Quokka','Vortex','Maple','Onyx'];
  const gamerPre = ['xX','Pro','Dark','Toxic','Mega','Epic','Iron','Ghost','Rage','Apex'];
  const gamerCore = ['Sniper','Reaper','Blaze','Striker','Venom','Hunter','Crusher','Knight','Slayer','Phantom'];
  const cuteA = ['fluffy','sleepy','sugar','tiny','bubbly','peachy','cozy','honey','starry','mochi'];
  const cuteN = ['bun','cloud','kitten','berry','puff','moon','dumpling','sprout','petal','panda'];
  const techPre = ['dev','byte','null','async','cyber','data','code','root','hex','logic'];
  const techN = ['Stack','Kernel','Loop','Node','Cache','Daemon','Bit','Forge','Script','Vector'];
  const mythA = ['Aether','Obsidian','Ember','Astral','Eternal','Ashen','Solar','Abyssal','Radiant','Umbral'];
  const mythN = ['Seraph','Wyrm','Oracle','Titan','Valkyrie','Specter','Warden','Chimera','Sphinx','Leviathan'];

  const pick = a => a[Math.floor(Math.random() * a.length)];
  const cap = s => s.charAt(0).toUpperCase() + s.slice(1);

  function makeOne(style, withNum) {
    let name;
    switch (style) {
      case 'gamer': name = pick(gamerPre) + pick(gamerCore); break;
      case 'cute': name = pick(cuteA) + pick(cuteN); break;
      case 'techy': name = pick(techPre) + pick(techN); break;
      case 'mythic': name = pick(mythA) + pick(mythN); break;
      default: name = pick(adjectives) + pick(nouns);
    }
    if (withNum) {
      const n = Math.random() < 0.5 ? Math.floor(Math.random() * 100) : Math.floor(Math.random() * 9000) + 100;
      name += (Math.random() < 0.3 ? '_' : '') + n;
    }
    return name;
  }

  const listEl = document.getElementById('list');
  function generate() {
    const style = document.getElementById('style').value;
    const withNum = document.getElementById('num').checked;
    const seen = new Set();
    listEl.innerHTML = '';
    let guard = 0;
    while (seen.size < 6 && guard++ < 200) {
      const name = makeOne(style, withNum);
      if (seen.has(name)) continue;
      seen.add(name);
      const item = document.createElement('div');
      item.className = 'item';
      const span = document.createElement('span');
      span.className = 'name'; span.textContent = name;
      const btn = document.createElement('button');
      btn.textContent = 'Copy';
      btn.addEventListener('click', () => {
        navigator.clipboard?.writeText(name);
        btn.textContent = 'Copied!'; btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1200);
      });
      item.appendChild(span); item.appendChild(btn);
      listEl.appendChild(item);
    }
  }

  document.getElementById('gen').addEventListener('click', generate);
  document.getElementById('style').addEventListener('change', generate);
  document.getElementById('num').addEventListener('change', generate);
  generate();
</script>
</body>
</html>
