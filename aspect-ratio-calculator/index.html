<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aspect Ratio Calculator</title>
<style>
  :root { --accent:#38bdf8; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120); color:#e2e8f0; font-family:system-ui,-apple-system,"Segoe UI",sans-serif; padding:24px; }
  a { color:var(--accent); text-decoration:none; }
  .wrap { max-width:720px; margin:0 auto; }
  h1,h2 { font-weight:600; }
  h2 { font-size:17px; }
  .panel { background:#111827; border:1px solid #1f2937; border-radius:14px; padding:18px; margin-top:16px; }
  .row { display:flex; gap:14px; flex-wrap:wrap; align-items:flex-end; }
  label { display:flex; flex-direction:column; gap:6px; font-size:13px; color:#94a3b8; }
  input { padding:10px 12px; border-radius:10px; border:1px solid #1f2937; background:#0b1120; color:#e2e8f0; font-size:16px; width:110px; }
  .sep { font-size:22px; color:#64748b; padding-bottom:8px; }
  .chips { display:flex; gap:8px; flex-wrap:wrap; margin-top:6px; }
  .chips button { padding:7px 12px; background:#1f2937; border:1px solid #334155; color:#e2e8f0; border-radius:20px; cursor:pointer; font-size:13px; }
  .chips button:hover { border-color:var(--accent); }
  .note { color:#64748b; font-size:13px; margin-top:8px; }
  .result { color:var(--accent); font-family:ui-monospace,monospace; font-size:15px; margin-top:6px; }
</style>
</head>
<body>
<div class="wrap">
  <a href="../">← back</a>
  <h1>Aspect Ratio Calculator</h1>

  <div class="panel">
    <h2>Ratio</h2>
    <div class="row">
      <label>W ratio<input id="rw" type="number" value="16" step="any"></label>
      <span class="sep">:</span>
      <label>H ratio<input id="rh" type="number" value="9" step="any"></label>
    </div>
    <div class="chips" id="chips"></div>
  </div>

  <div class="panel">
    <h2>Solve dimensions</h2>
    <div class="row">
      <label>Width (px)<input id="w" type="number" placeholder="auto" step="any"></label>
      <span class="sep">×</span>
      <label>Height (px)<input id="h" type="number" placeholder="auto" step="any"></label>
    </div>
    <div class="note">Type into one box (leave the other empty or it auto-fills) to solve for the missing dimension at the ratio above.</div>
    <div class="result" id="result"></div>
  </div>
</div>
<script>
const rw=document.getElementById('rw'), rh=document.getElementById('rh'),
      w=document.getElementById('w'), h=document.getElementById('h'),
      result=document.getElementById('result'), chips=document.getElementById('chips');
const presets=[["16:9",16,9],["4:3",4,3],["21:9",21,9],["1:1",1,1],["3:2",3,2],["9:16",9,16],["2.39:1",2.39,1],["5:4",5,4]];
presets.forEach(([lbl,a,b])=>{
  const btn=document.createElement('button');btn.textContent=lbl;
  btn.onclick=()=>{rw.value=a;rh.value=b;recalc('w');};
  chips.appendChild(btn);
});
function ratio(){const a=parseFloat(rw.value),b=parseFloat(rh.value);return (a>0&&b>0)?a/b:null;}
let last='w';
function recalc(driver){
  const r=ratio();
  if(!r){result.textContent='Enter a valid ratio.';return;}
  driver=driver||last;
  if(driver==='w'){
    const wv=parseFloat(w.value);
    if(wv>0){h.value=+(wv/r).toFixed(3);}
  } else {
    const hv=parseFloat(h.value);
    if(hv>0){w.value=+(hv*r).toFixed(3);}
  }
  const wv=parseFloat(w.value), hv=parseFloat(h.value);
  if(wv>0&&hv>0){result.textContent=`${wv} × ${hv}  (ratio ${(wv/hv).toFixed(4)} ≈ ${rw.value}:${rh.value})`;}
  else result.textContent='';
}
w.addEventListener('input',()=>{last='w';recalc('w');});
h.addEventListener('input',()=>{last='h';recalc('h');});
rw.addEventListener('input',()=>recalc());
rh.addEventListener('input',()=>recalc());
w.value=1920;recalc('w');
</script>
</body>
</html>
