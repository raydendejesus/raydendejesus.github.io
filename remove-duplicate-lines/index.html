<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Remove Duplicate Lines</title>
<style>
  :root { --accent:#38bdf8; }
  * { box-sizing:border-box; }
  body {
    margin:0; min-height:100vh; padding:24px;
    background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    color:#e2e8f0; font-family:system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  a { color:var(--accent); text-decoration:none; }
  a:hover { text-decoration:underline; }
  h1 { font-size:1.4rem; margin:.4rem 0 1rem; }
  .panel { background:#111827; border:1px solid #1f2937; border-radius:14px; padding:16px; margin-bottom:16px; }
  textarea { width:100%; min-height:180px; resize:vertical; background:#0b1120; color:#e2e8f0;
    border:1px solid #1f2937; border-radius:10px; padding:10px; font-family:ui-monospace,Consolas,monospace; font-size:13px; }
  label { display:inline-flex; align-items:center; gap:6px; margin-right:16px; font-size:14px; }
  button { background:var(--accent); color:#06283d; border:none; border-radius:10px; padding:9px 16px;
    font-weight:600; cursor:pointer; font-size:14px; }
  button:hover { filter:brightness(1.08); }
  button.secondary { background:#1f2937; color:#e2e8f0; }
  .row { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin:12px 0; }
  .status { font-size:13px; color:#94a3b8; }
</style>
</head>
<body>
  <a href="../">&larr; back</a>
  <h1>Remove Duplicate Lines</h1>
  <div class="panel">
    <label><input type="checkbox" id="trim"> Trim whitespace when comparing</label>
    <label><input type="checkbox" id="ci"> Case-insensitive</label>
    <label><input type="checkbox" id="keepblank"> Ignore blank lines</label>
  </div>
  <div class="panel">
    <textarea id="input" placeholder="Paste text here..."></textarea>
    <div class="row">
      <button id="go">Remove duplicates</button>
      <button class="secondary" id="clear">Clear</button>
      <span class="status" id="status"></span>
    </div>
  </div>
  <div class="panel">
    <textarea id="output" placeholder="Result..." readonly></textarea>
    <div class="row"><button class="secondary" id="copy">Copy</button></div>
  </div>
<script>
  const $ = id => document.getElementById(id);
  function run() {
    const trim = $('trim').checked, ci = $('ci').checked, kb = $('keepblank').checked;
    const lines = $('input').value.split(/\r?\n/);
    const seen = new Set(); const out = []; let removed = 0;
    for (const line of lines) {
      let key = line;
      if (trim) key = key.trim();
      if (ci) key = key.toLowerCase();
      if (kb && key.trim() === '') { out.push(line); continue; }
      if (seen.has(key)) { removed++; continue; }
      seen.add(key); out.push(line);
    }
    $('output').value = out.join('\n');
    $('status').textContent = removed + ' duplicate line' + (removed === 1 ? '' : 's') + ' removed.';
  }
  $('go').onclick = run;
  $('clear').onclick = () => { $('input').value=''; $('output').value=''; $('status').textContent=''; };
  $('copy').onclick = async () => {
    await navigator.clipboard.writeText($('output').value);
    const b = $('copy'); b.textContent='Copied!'; setTimeout(()=>b.textContent='Copy',1200);
  };
</script>
</body>
</html>
