<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS clamp() Calculator</title>
<style>
  :root { --accent: #38bdf8; }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 24px;
    background: radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    color: #e2e8f0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    min-height: 100vh;
  }
  a { color: var(--accent); text-decoration: none; }
  h1 { font-size: 1.4rem; margin: 8px 0 20px; }
  .wrap { max-width: 900px; margin: 0 auto; }
  .row { display: grid; grid-template-columns: 320px 1fr; gap: 20px; align-items: start; }
  .panel { background: #111827; border: 1px solid #1f2937; border-radius: 14px; padding: 18px; }
  label { display: block; font-size: .85rem; margin: 12px 0 6px; color: #94a3b8; }
  input[type=number] { width: 100%; background:#0b1120; border:1px solid #1f2937; color:#e2e8f0; border-radius:8px; padding:9px; font-family:inherit; }
  select { width:100%; background:#0b1120; border:1px solid #1f2937; color:#e2e8f0; border-radius:8px; padding:9px; }
  .two { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  pre { background: #0b1120; border: 1px solid #1f2937; border-radius: 10px; padding: 14px; font-size: .95rem; margin-top: 14px; overflow-x:auto; white-space:pre-wrap; color:var(--accent); }
  button { background: var(--accent); color: #0b1120; border: none; font-weight: 600; padding: 10px 16px; border-radius: 8px; cursor: pointer; margin-top: 10px; }
  button:hover { filter: brightness(1.1); }
  .preview-text { line-height:1.4; }
  input[type=range] { width:100%; accent-color:var(--accent); }
  .vp { color:var(--accent); float:right; }
  .note { font-size:.78rem; color:#64748b; margin-top:10px; }
</style>
</head>
<body>
<div class="wrap">
  <a href="../">&larr; back</a>
  <h1>CSS clamp() Calculator</h1>
  <div class="row">
    <div class="panel">
      <div class="two">
        <div><label>Min viewport (px)</label><input type="number" id="minVw" value="320"></div>
        <div><label>Max viewport (px)</label><input type="number" id="maxVw" value="1280"></div>
      </div>
      <div class="two">
        <div><label>Min size</label><input type="number" id="minS" value="16" step="0.1"></div>
        <div><label>Max size</label><input type="number" id="maxS" value="48" step="0.1"></div>
      </div>
      <label>Unit</label>
      <select id="unit"><option>px</option><option>rem</option></select>
      <label>Root font size (px, for rem)</label>
      <input type="number" id="root" value="16">
      <label>Simulate viewport <span class="vp" id="simV">800px</span></label>
      <input type="range" id="sim" min="200" max="1600" value="800">
    </div>
    <div>
      <div class="panel">
        <div class="preview-text" id="preview" style="font-size:32px;">Responsive text scales with the viewport.</div>
        <div class="note">Drag "Simulate viewport" to see the computed size at that width.</div>
      </div>
      <pre id="css"></pre>
      <button id="copy">Copy clamp()</button>
    </div>
  </div>
</div>
<script>
  const $ = id => document.getElementById(id);
  const ids = ['minVw','maxVw','minS','maxS','unit','root','sim'];
  function fmt(n){ return Math.round(n*10000)/10000; }
  function render(){
    let minVw=+$('minVw').value, maxVw=+$('maxVw').value;
    let minS=+$('minS').value, maxS=+$('maxS').value;
    const unit=$('unit').value, root=+$('root').value||16;
    const sim=+$('sim').value;
    $('simV').textContent=sim+'px';
    if(maxVw===minVw){ $('css').textContent='/* min and max viewport must differ */'; return; }
    // slope in px-per-px
    const slopePx = (maxS - minS) / (maxVw - minVw);
    const slopeVw = fmt(slopePx * 100); // vw coefficient
    // intercept in px at vw=0
    const interceptPx = minS - slopePx * minVw;
    let minOut, maxOut, interceptOut, suf=unit;
    if(unit==='rem'){
      minOut=fmt(minS/root); maxOut=fmt(maxS/root); interceptOut=fmt(interceptPx/root);
    } else {
      minOut=fmt(minS); maxOut=fmt(maxS); interceptOut=fmt(interceptPx);
    }
    const pref = `${interceptOut}${suf} + ${slopeVw}vw`;
    const clamp = `clamp(${minOut}${suf}, ${pref}, ${maxOut}${suf})`;
    $('css').textContent = `font-size: ${clamp};`;
    window._clamp = clamp;
    // simulate computed value
    let sizeAtSim = interceptPx + slopePx*sim;
    sizeAtSim = Math.max(minS, Math.min(maxS, sizeAtSim));
    $('preview').style.fontSize = sizeAtSim + 'px';
  }
  ids.forEach(i=>$(i).addEventListener('input',render));
  $('copy').addEventListener('click',()=>navigator.clipboard.writeText($('css').textContent).then(()=>{const b=$('copy'),t=b.textContent;b.textContent='Copied!';setTimeout(()=>b.textContent=t,1200);}));
  render();
</script>
</body>
</html>
