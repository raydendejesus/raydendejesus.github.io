<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stack Tower</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#e2e8f0;
    background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px;}
  a.back{position:fixed;top:14px;left:16px;color:#38bdf8;text-decoration:none;font-size:14px;}
  a.back:hover{text-decoration:underline;}
  h1{margin:8px 0 4px;font-size:22px;}
  .hud{display:flex;gap:20px;margin-bottom:10px;font-size:15px;}
  .hud b{color:#38bdf8;}
  canvas{background:#0b1120;border:1px solid #1f2937;border-radius:16px;}
  .panel{background:#111827;border:1px solid #1f2937;border-radius:14px;padding:10px 16px;margin-top:10px;font-size:13px;color:#94a3b8;}
</style>
</head>
<body>
<a class="back" href="../">← back</a>
<h1>Stack Tower</h1>
<div class="hud"><div>Height <b id="score">0</b></div><div>Best <b id="best">0</b></div></div>
<canvas id="c" width="420" height="560"></canvas>
<div class="panel">Click / SPACE / tap to drop the moving block. Overhang gets sliced off — line them up perfectly for combo bonuses!</div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const W=cv.width,H=cv.height,BH=28;
let stack,current,particles,score,best=+localStorage.stackBest||0,over,speed,cam,combo,started;
document.getElementById('best').textContent=best;
function hue(i){return (i*18+200)%360;}
function init(){
  stack=[{x:W/2-70,w:140,y:H-BH}];
  score=0;over=false;speed=2.4;cam=0;combo=0;started=false;particles=[];
  spawn();document.getElementById('score').textContent=0;
}
function spawn(){
  const prev=stack[stack.length-1];
  current={x:0,w:prev.w,y:prev.y-BH,dir:1};
}
function shards(x,w,y){for(let i=0;i<14;i++){
  particles.push({x:x+Math.random()*w,y,vx:(Math.random()-.5)*4,vy:-Math.random()*3,life:1,c:'hsl('+hue(stack.length)+',70%,60%)'});}}
function drop(){
  if(over){init();return;}
  started=true;
  const prev=stack[stack.length-1];
  const cur=current;
  const left=Math.max(cur.x,prev.x),right=Math.min(cur.x+cur.w,prev.x+prev.w);
  const ov=right-left;
  if(ov<=0){over=true;shards(cur.x,cur.w,cur.y);
    if(score>best){best=score;localStorage.stackBest=best;document.getElementById('best').textContent=best;}return;}
  // slice overhang
  if(cur.x<prev.x){shards(cur.x,prev.x-cur.x,cur.y);}
  if(cur.x+cur.w>prev.x+prev.w){shards(prev.x+prev.w,cur.x+cur.w-(prev.x+prev.w),cur.y);}
  const perfect=Math.abs(cur.x-prev.x)<4;
  let nx=left,nw=ov;
  if(perfect){nx=prev.x;nw=prev.w;combo++;score+=combo;
    for(let i=0;i<20;i++)particles.push({x:prev.x+Math.random()*prev.w,y:cur.y,vx:(Math.random()-.5)*5,vy:-Math.random()*4,life:1,c:'#fbbf24'});}
  else{combo=0;score++;}
  stack.push({x:nx,w:nw,y:cur.y});
  document.getElementById('score').textContent=score;
  speed=Math.min(7,speed+0.12);
  spawn();
}
addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();drop();}});
cv.addEventListener('mousedown',drop);
cv.addEventListener('touchstart',e=>{e.preventDefault();drop();});
function update(){
  if(over)return;
  if(started){current.x+=current.dir*speed;
    if(current.x+current.w>W){current.x=W-current.w;current.dir=-1;}
    if(current.x<0){current.x=0;current.dir=1;}}
  // camera follow
  const targetCam=Math.max(0,(stack.length-8)*BH);
  cam+=(targetCam-cam)*0.1;
  for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=0.25;p.life-=0.025;}
  particles=particles.filter(p=>p.life>0);
}
function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.save();ctx.translate(0,cam);
  for(let i=0;i<stack.length;i++){const b=stack[i];drawBlock(b.x,b.y,b.w,hue(i));}
  if(!over){drawBlock(current.x,current.y,current.w,hue(stack.length));}
  for(const p of particles){ctx.globalAlpha=p.life;ctx.fillStyle=p.c;ctx.fillRect(p.x,p.y,4,4);}
  ctx.globalAlpha=1;
  ctx.restore();
  if(combo>1&&!over){ctx.fillStyle='#fbbf24';ctx.font='bold 16px system-ui';ctx.textAlign='center';
    ctx.fillText('PERFECT x'+combo,W/2,40);ctx.textAlign='left';}
  if(!started&&!over){ctx.fillStyle='#e2e8f0';ctx.font='18px system-ui';ctx.textAlign='center';
    ctx.fillText('Click to drop the block',W/2,H/2);ctx.textAlign='left';}
  if(over){ctx.fillStyle='rgba(11,17,32,.78)';ctx.fillRect(0,H/2-50,W,100);
    ctx.fillStyle='#f87171';ctx.font='bold 28px system-ui';ctx.textAlign='center';ctx.fillText('Toppled!',W/2,H/2-4);
    ctx.fillStyle='#e2e8f0';ctx.font='15px system-ui';ctx.fillText('Height '+score+' — click to retry',W/2,H/2+24);ctx.textAlign='left';}
}
function drawBlock(x,y,w,h){
  const c1='hsl('+h+',65%,58%)',c2='hsl('+h+',65%,42%)';
  const g=ctx.createLinearGradient(x,y,x,y+BH);g.addColorStop(0,c1);g.addColorStop(1,c2);
  ctx.fillStyle=g;ctx.fillRect(x,y,w,BH-2);
  ctx.fillStyle='rgba(255,255,255,.15)';ctx.fillRect(x,y,w,4);
}
function loop(){update();draw();requestAnimationFrame(loop);}
init();loop();
</script>
</body>
</html>
