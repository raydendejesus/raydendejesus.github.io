<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find and Replace</title>
<style>
  :root{--accent:#38bdf8;}
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);color:#e2e8f0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;padding:24px;}
  a.back{color:var(--accent);text-decoration:none;}
  .wrap{max-width:820px;margin:0 auto;}
  h1{font-size:1.6rem;margin:.3em 0 .6em;}
  .panel{background:#111827;border:1px solid #1f2937;border-radius:14px;padding:18px;margin-bottom:16px;}
  textarea{width:100%;min-height:200px;background:#0b1120;color:#e2e8f0;border:1px solid #1f2937;border-radius:10px;padding:12px;font-size:1rem;resize:vertical;line-height:1.5;}
  input[type=text]{background:#0b1120;color:#e2e8f0;border:1px solid #1f2937;border-radius:10px;padding:10px;font-size:1rem;width:100%;}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  label.lbl{display:block;font-size:.8rem;color:#94a3b8;margin-bottom:4px;}
  .opts{display:flex;gap:18px;flex-wrap:wrap;align-items:center;margin-bottom:12px;}
  .opts label{display:flex;gap:6px;align-items:center;font-size:.9rem;cursor:pointer;}
  button{background:var(--accent);color:#0b1120;border:none;border-radius:10px;padding:10px 16px;font-size:.95rem;font-weight:600;cursor:pointer;}
  button.sec{background:#1f2937;color:#e2e8f0;}
  .btns{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .count{color:#94a3b8;font-size:.9rem;}
  .err{color:#f87171;font-size:.85rem;margin-top:6px;}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="../">← back</a>
  <h1>Find and Replace</h1>
  <div class="panel">
    <label class="lbl">Input text</label>
    <textarea id="src" placeholder="Paste text here..."></textarea>
  </div>
  <div class="panel">
    <div class="row">
      <div><label class="lbl">Find</label><input type="text" id="find"></div>
      <div><label class="lbl">Replace with</label><input type="text" id="repl"></div>
    </div>
    <div class="opts">
      <label><input type="checkbox" id="regex"> Regex</label>
      <label><input type="checkbox" id="case"> Case sensitive</label>
    </div>
    <div class="btns">
      <button id="run">Replace</button>
      <span class="count" id="count"></span>
    </div>
    <div class="err" id="err"></div>
  </div>
  <div class="panel">
    <label class="lbl">Result</label>
    <textarea id="out" readonly></textarea>
    <div class="btns" style="margin-top:10px;"><button class="sec" id="copy">Copy</button></div>
  </div>
</div>
<script>
  const $=id=>document.getElementById(id);
  function escRe(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
  $('run').addEventListener('click',()=>{
    $('err').textContent='';
    const text=$('src').value, find=$('find').value, repl=$('repl').value;
    if(!find){$('out').value=text;$('count').textContent='0 replacements';return;}
    let flags='g'+($('case').checked?'':'i');
    let re;
    try{ re=$('regex').checked?new RegExp(find,flags):new RegExp(escRe(find),flags); }
    catch(e){$('err').textContent='Invalid regex: '+e.message;return;}
    let n=0;
    const result=text.replace(re,()=>{n++;return repl;});
    $('out').value=result;
    $('count').textContent=n+' replacement'+(n===1?'':'s');
  });
  $('copy').addEventListener('click',async()=>{
    await navigator.clipboard.writeText($('out').value);
    const b=$('copy');b.textContent='Copied!';setTimeout(()=>b.textContent='Copy',1200);
  });
</script>
</body>
</html>
