<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fireworks Canvas</title>
<style>
  :root { --accent: #38bdf8; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; }
  body {
    background: radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);
    color: #e2e8f0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  .back { position: fixed; top: 16px; left: 16px; color: var(--accent);
    text-decoration: none; font-size: 14px; opacity: 0.8; z-index: 10; }
  .back:hover { opacity: 1; }
  canvas { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }
  .panel { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(17,24,39,0.82); border: 1px solid #1f2937; border-radius: 14px;
    padding: 12px 16px; display: flex; gap: 14px; align-items: center; flex-wrap: wrap;
    backdrop-filter: blur(6px); z-index: 10; font-size: 13px; color: #cbd5e1; }
  .panel label { display: flex; align-items: center; gap: 6px; }
  input[type=range] { accent-color: var(--accent); }
  button { font-family: inherit; font-size: 13px; border-radius: 9px; border: 1px solid #1f2937;
    padding: 7px 12px; background: #0b1120; color: #e2e8f0; cursor: pointer; }
  button:hover { border-color: var(--accent); }
  button.on { background: var(--accent); color: #04293b; font-weight: 700; border-color: var(--accent); }
  .hint { position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    color: #94a3b8; font-size: 13px; z-index: 10; pointer-events: none; }
</style>
</head>
<body>
<a class="back" href="../">&larr; back</a>
<div class="hint">Click or tap anywhere to launch fireworks 🎆</div>
<canvas id="c"></canvas>
<div class="panel">
  <button id="auto" class="on">Auto-launch: ON</button>
  <label>Gravity <input id="grav" type="range" min="0" max="100" value="35"></label>
  <label>Trails <input id="trail" type="range" min="2" max="40" value="12"></label>
  <button id="clear">Clear</button>
</div>
<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W, H;
  function resize(){ W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
  addEventListener('resize', resize); resize();

  const gravEl = document.getElementById('grav');
  const trailEl = document.getElementById('trail');
  const autoBtn = document.getElementById('auto');
  const clearBtn = document.getElementById('clear');

  let rockets = [], sparks = [], autoLaunch = true;

  function rand(a, b){ return a + Math.random() * (b - a); }
  function hsl(h, s, l){ return 'hsl(' + h + ',' + s + '%,' + l + '%)'; }

  function launch(tx, ty){
    const hue = rand(0, 360);
    rockets.push({
      x: tx ?? rand(W * 0.2, W * 0.8),
      y: H,
      tx: tx ?? rand(W * 0.2, W * 0.8),
      ty: ty ?? rand(H * 0.12, H * 0.45),
      vx: 0, vy: -rand(7, 11), hue
    });
    if (tx != null){ rockets[rockets.length - 1].x = tx; rockets[rockets.length - 1].vy = -rand(8, 12); }
  }

  function explode(x, y, hue){
    const count = (rand(40, 90)) | 0;
    const type = Math.random();
    for (let i = 0; i < count; i++){
      let angle, speed;
      if (type < 0.5){ angle = rand(0, Math.PI * 2); speed = rand(1, 6); }
      else { angle = (i / count) * Math.PI * 2; speed = rand(4, 5.5); } // ring
      sparks.push({
        x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
        life: 1, decay: rand(0.008, 0.02),
        hue: hue + rand(-25, 25), size: rand(1.5, 3)
      });
    }
  }

  function tick(){
    const grav = +gravEl.value / 10000 * H;
    const trail = +trailEl.value / 100;
    ctx.fillStyle = 'rgba(8,12,24,' + trail + ')';
    ctx.fillRect(0, 0, W, H);
    ctx.globalCompositeOperation = 'lighter';

    for (let i = rockets.length - 1; i >= 0; i--){
      const r = rockets[i];
      r.x += r.vx; r.y += r.vy; r.vy += grav * 0.4;
      ctx.fillStyle = hsl(r.hue, 100, 70);
      ctx.beginPath(); ctx.arc(r.x, r.y, 2.5, 0, Math.PI * 2); ctx.fill();
      if (r.vy >= 0 || r.y <= r.ty){
        explode(r.x, r.y, r.hue);
        rockets.splice(i, 1);
      }
    }

    for (let i = sparks.length - 1; i >= 0; i--){
      const s = sparks[i];
      s.x += s.vx; s.y += s.vy; s.vy += grav; s.vx *= 0.985; s.vy *= 0.985;
      s.life -= s.decay;
      if (s.life <= 0){ sparks.splice(i, 1); continue; }
      ctx.fillStyle = hsl(s.hue, 100, 50 + s.life * 30);
      ctx.globalAlpha = Math.max(0, s.life);
      ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';

    if (autoLaunch && Math.random() < 0.04) launch();
    requestAnimationFrame(tick);
  }

  canvas.addEventListener('click', e => launch(e.clientX, e.clientY));
  canvas.addEventListener('touchstart', e => {
    for (const t of e.touches) launch(t.clientX, t.clientY);
    e.preventDefault();
  }, { passive: false });

  autoBtn.addEventListener('click', () => {
    autoLaunch = !autoLaunch;
    autoBtn.textContent = 'Auto-launch: ' + (autoLaunch ? 'ON' : 'OFF');
    autoBtn.classList.toggle('on', autoLaunch);
  });
  clearBtn.addEventListener('click', () => { rockets = []; sparks = []; ctx.clearRect(0,0,W,H); });

  ctx.fillStyle = '#080c18'; ctx.fillRect(0, 0, W, H);
  tick();
</script>
</body>
</html>
