<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metronome</title>
<style>
  :root{--accent:#38bdf8;}
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;background:radial-gradient(1200px 600px at 50% -10%, #1e293b, #0b1120);color:#e2e8f0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;padding:24px;}
  a.back{color:var(--accent);text-decoration:none;}
  .wrap{max-width:520px;margin:0 auto;text-align:center;}
  h1{font-size:1.6rem;margin:.3em 0 .6em;}
  .panel{background:#111827;border:1px solid #1f2937;border-radius:16px;padding:24px;margin-bottom:16px;}
  .bpm{font-size:4rem;font-weight:800;color:var(--accent);line-height:1;}
  .bpm small{font-size:1rem;color:#94a3b8;font-weight:400;}
  input[type=range]{width:100%;accent-color:var(--accent);margin:16px 0;}
  .beats{display:flex;justify-content:center;gap:10px;margin:18px 0;}
  .beat{width:26px;height:26px;border-radius:50%;background:#1f2937;border:1px solid #334155;}
  .beat.accent{background:#334155;}
  .beat.on{transform:scale(1.3);background:var(--accent);}
  .beat.on.accent{background:#fbbf24;}
  .row{display:flex;gap:12px;justify-content:center;align-items:center;flex-wrap:wrap;margin-top:10px;}
  button{background:var(--accent);color:#04222e;border:none;border-radius:10px;padding:12px 28px;font-weight:700;cursor:pointer;font-size:1rem;}
  button.alt{background:#1f2937;color:#e2e8f0;padding:8px 14px;}
  button:hover{filter:brightness(1.1);}
  select{background:#0b1120;color:#e2e8f0;border:1px solid #1f2937;border-radius:8px;padding:8px;}
  label{font-size:.85rem;color:#94a3b8;}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="../">← back</a>
  <h1>Metronome</h1>
  <div class="panel">
    <div class="bpm"><span id="bpmVal">120</span><small> BPM</small></div>
    <input type="range" id="bpm" min="30" max="240" value="120">
    <div class="row">
      <button class="alt" id="minus">−</button>
      <button class="alt" id="plus">+</button>
      <label>Time sig
        <select id="sig"><option>2</option><option>3</option><option selected>4</option><option>5</option><option>6</option><option>7</option></select>
      </label>
    </div>
    <div class="beats" id="beats"></div>
    <button id="toggle">Start</button>
  </div>
</div>
<script>
  let ctx,bpm=120,beats=4,cur=0,playing=false,next=0,timer;
  const lookahead=0.1;
  function buildBeats(){
    const el=document.getElementById('beats');el.innerHTML='';
    for(let i=0;i<beats;i++){const d=document.createElement('div');d.className='beat'+(i===0?' accent':'');el.appendChild(d);}
  }
  function click(time,accent){
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.frequency.value=accent?1500:900;
    g.gain.setValueAtTime(accent?0.6:0.35,time);
    g.gain.exponentialRampToValueAtTime(0.0001,time+0.05);
    o.connect(g);g.connect(ctx.destination);o.start(time);o.stop(time+0.06);
  }
  function flash(idx){
    const els=document.querySelectorAll('.beat');
    els.forEach(e=>e.classList.remove('on'));
    if(els[idx])els[idx].classList.add('on');
  }
  function scheduler(){
    while(next<ctx.currentTime+lookahead){
      const accent=cur===0;
      click(next,accent);
      const idx=cur;const t=next;
      const delay=(t-ctx.currentTime)*1000;
      setTimeout(()=>flash(idx),Math.max(0,delay));
      next+=60/bpm;
      cur=(cur+1)%beats;
    }
    timer=setTimeout(scheduler,25);
  }
  function start(){
    if(!ctx)ctx=new (window.AudioContext||window.webkitAudioContext)();
    ctx.resume();playing=true;cur=0;next=ctx.currentTime+0.05;scheduler();
    document.getElementById('toggle').textContent='Stop';
  }
  function stop(){playing=false;clearTimeout(timer);document.querySelectorAll('.beat').forEach(e=>e.classList.remove('on'));document.getElementById('toggle').textContent='Start';}
  function setBpm(v){bpm=Math.max(30,Math.min(240,v));document.getElementById('bpm').value=bpm;document.getElementById('bpmVal').textContent=bpm;}
  document.getElementById('bpm').oninput=e=>setBpm(+e.target.value);
  document.getElementById('plus').onclick=()=>setBpm(bpm+1);
  document.getElementById('minus').onclick=()=>setBpm(bpm-1);
  document.getElementById('sig').onchange=e=>{beats=+e.target.value;cur=0;buildBeats();};
  document.getElementById('toggle').onclick=()=>playing?stop():start();
  buildBeats();
</script>
</body>
</html>
